# Pre-commit hooks for rebar — CHECK-ONLY by policy (modeled on Pydantic).
#
# A commit must never silently rewrite code: these hooks FAIL the commit and tell you
# to run `make format`, but they do not mutate your files (no `ruff --fix`, no
# format-write). This avoids the unstaged-mutation footgun (pre-commit leaves a fixing
# hook's changes unstaged) and keeps an agent's in-memory view of a file valid across
# sequential edits. Mutation happens only when you explicitly run `make format`.
#
# Install: `make install` (or `pre-commit install`). The ruff used by the `lint` hook
# is the version pinned EXACTLY in pyproject's [dev] extra, so the hook, `make lint`,
# and CI all agree.
repos:
  # Lightweight, CHECK-ONLY hygiene hooks (these error; they do not reformat code).
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      # Fail a commit made directly on main/master AT COMMIT TIME, so the repo's
      # "land through Gerrit, never commit to main" rule (enforced server-side by the
      # GitHub ruleset + Gerrit gates) also fails fast locally instead of only at push.
      # Branches are listed explicitly (the tool default is already ('master','main'),
      # but explicit args document intent and survive any upstream default change).
      # Bypassable with `git commit --no-verify` by design — this is a local guardrail,
      # not the enforcement boundary.
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  # The code gate — runs `make lint` (ruff check + ruff format --check). CHECK-ONLY:
  # it fails if the code isn't formatted/clean and points you at `make format`; it
  # never rewrites files. Routed through the Makefile so the hook, CI, and local all
  # run the identical command + pinned ruff.
  - repo: local
    hooks:
      - id: lint
        name: lint (ruff check + format --check; never mutates)
        entry: make lint
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      # The type gate — runs `make typecheck` (mypy over the full src/rebar). CHECK-ONLY
      # (mypy never mutates). Fast enough for a commit hook (~0.1s warm, <0.5s cold over
      # the gated scope). Catches the class of error the ruff-only hook used to let slip
      # to CI (story urge-abbey-goal). Routed through the Makefile so the hook, `make
      # typecheck`, and CI all run the identical command + pinned mypy.
      - id: typecheck
        name: typecheck (mypy — full library; never mutates)
        entry: make typecheck
        language: system
        pass_filenames: false
        types_or: [python, pyi]
