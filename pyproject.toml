[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
# Distribution name (PyPI). The import package stays `rebar` and the console
# scripts stay `rebar` / `rebar-mcp` — those are independent of the dist name.
# `rebar` itself is taken on PyPI (Eventbrite), so we publish under `nava-rebar`.
name = "nava-rebar"
version = "0.5.0"
description = "Event-sourced ticket system with a Jira reconciler — CLI, Python library, and MCP server."
readme = "README.md"
# Floor is 3.11: the reconciler uses enum.StrEnum (new in 3.11) — see
# rebar_reconciler/mutation.py / inbound_probe.py. (Was previously declared
# >=3.10, but that never actually worked; corrected here.)
requires-python = ">=3.11"
license = "Apache-2.0"
license-files = ["LICENSE"]
dependencies = []

# The ticket engine (bash + the ticket_reducer / ticket_graph / rebar_reconciler
# Python packages + rebar_reconciler/acli.py) is stdlib-only and ships as package
# data under rebar/_engine/. System prerequisites (not pip deps): git, jq,
# flock, python3, and `acli` (only for live Jira reconciliation).

[project.optional-dependencies]
mcp = ["mcp>=1.2"]
# LLM agent-operations framework (rebar.llm). OPTIONAL — never required by core
# rebar (the engine stays stdlib-only, `dependencies = []`). The default in-process
# runner is the LangChain/LangGraph stack — the one agent runtime native to BOTH
# Langflow and Langfuse — but everything here is imported lazily, so `import rebar`
# and even `import rebar.llm` stay dependency-free; only *running* an operation
# needs this extra. langchain/langgraph are pinned to the v1 line (the
# `langchain.agents.create_agent` API); langfuse forces pydantic v2. The Langflow
# runner needs no dependency (a stubbed REST seam); custom read-only filesystem
# tools avoid langchain-community.
agents = [
    "langchain>=1,<2",
    "langgraph>=1,<2",
    "langchain-anthropic>=0.3",  # Claude (default provider)
    "langchain-openai>=0.2",     # ChatGPT / OpenAI-compatible local servers
    "langchain-mcp-adapters>=0.3",
    "langfuse>=3",
    "pydantic>=2",
    "deepagents>=0.6",  # opt-in harness runner (planning/subagents); not the review default
]
# Additional model providers are opt-in (keep the default extra lean):
#   pip install langchain-google-genai   # Gemini
dev = [
    "pytest>=8",
    "mcp>=1.2",
    "jsonschema>=4.18",
    "hatchling>=1.18",
    "ruff>=0.6",
    "mypy>=1.10",
    "pytest-cov>=5",
    # Pull the full agents stack so the rebar.llm validation tests (provider
    # construction for Claude + ChatGPT, MCP/Langfuse paths) RUN in CI rather than
    # skipping. Self-referential extra — kept here, not in core, so `pip install
    # nava-rebar` stays dependency-free.
    "nava-rebar[agents]",
]

[project.scripts]
rebar = "rebar.cli:main"
rebar-mcp = "rebar.mcp_server:main"

[tool.hatch.build.targets.wheel]
# packages includes the whole src/rebar tree (the _engine dir with its bash
# scripts, executables, wordlist, and native Python packages ships verbatim as
# package data — hatchling includes all files under the package, not just .py).
packages = ["src/rebar"]
artifacts = [
    "src/rebar/_engine/**/*",
]
# Never ship compiled bytecode. The `artifacts` glob above force-includes engine
# files that .gitignore would otherwise drop, so spell out the bytecode exclusion
# explicitly rather than relying on gitignore filtering (ticket fare-rant-clasp;
# verified by tests/unit/test_engine_dir.py::test_wheel_has_no_bytecode).
exclude = [
    "**/__pycache__",
    "**/*.pyc",
    "**/*.pyo",
]

[tool.hatch.build.targets.sdist]
include = ["src/rebar", "tests", "README.md"]

[tool.ruff]
# Engine ships as package data but is normal Python; lint it too. The gating set
# below is the subset the whole tree is CLEAN for — so `ruff check` passes and
# prevents regressions. It starts from the flake8 "real-bug" smoke set (syntax
# errors + undefined names — the class that catches NameError-on-error-path bugs
# like a missing `import urllib` in an `except`) and adds the rule families that
# were swept clean: redefinitions (F811), modernizations (UP), and the safe
# bugbear/style checks (B009, B012, F541, E401). The remaining stylistic set
# (unused imports F401, line length E501, import order I001, …) runs advisory in
# CI to ratchet down over time without a destabilizing one-shot mass-fix; F401 in
# the reconciler re-export facades is tracked as a dedicated bug (it needs
# executable reconciler integration tests + `__all__` before it can be swept).
#
# target-version is intentionally kept at the conservative py310 floor (not py311)
# even though requires-python is >=3.11: it keeps the gating UP set from pushing
# 3.11-only idioms (e.g. datetime.UTC) and a risky str+Enum -> StrEnum migration
# as mandatory fixes. Code clean for a py310 target runs fine on 3.11/3.12.
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82", "F811", "F541", "UP", "B009", "B012", "E401"]

[tool.mypy]
# Scoped, opt-in type checking. The pure in-process library core
# (reducer / graph / _store) is kept type-clean and gated in CI; the rest of the
# tree (engine helpers, reconciler) is checked advisory-only for now.
python_version = "3.11"
ignore_missing_imports = true
# Report errors ONLY in the files passed on the command line, never in modules
# reached via import. This pins the gating scope to exactly the named packages so
# the gate cannot go red because some *other* (not-yet-clean) module is later
# imported by the core. The advisory full-tree run still reports everything,
# because there every file is named on the command line.
follow_imports = "silent"

[tool.coverage.run]
source = ["rebar"]
branch = true

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "unit: unit-tier tests (network-guarded)",
    "scripts: scripts-tier tests (engine scripts / reconciler)",
    "integration: integration-tier tests (may require live services)",
    "external: external-integration tests that hit third-party services (live LLM providers, etc.); excluded from the default run; run via the external-integration workflow with credentials",
    "interface: interface-parity tests (library / CLI / MCP over one store)",
    "allow_network: opt out of the network guard for a test",
    "benchmark: performance benchmark (informational; not a pass/fail gate)",
]
