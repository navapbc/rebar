<svg xmlns="http://www.w3.org/2000/svg" width="760" height="380" viewBox="0 0 760 380" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="14" role="img" aria-label="Terminal session: rebar ready lists two ready tickets; rebar claim claims one; rebar transition closes it and unblocks the next.">
  <rect x="0" y="0" width="760" height="380" rx="10" fill="#0d1117"/>
  <rect x="0" y="0" width="760" height="32" rx="10" fill="#161b22"/>
  <rect x="0" y="16" width="760" height="16" fill="#161b22"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="16" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="16" r="6" fill="#27c93f"/>
  <text x="380" y="21" fill="#8b949e" text-anchor="middle" font-size="12">rebar — the core loop</text>
  <g>
    <text x="20" y="64" fill="#58a6ff">$ <tspan fill="#c9d1d9">rebar ready</tspan></text>
    <text x="20" y="88" fill="#7ee787">● 4a1c-… <tspan fill="#c9d1d9">task  Add retry/backoff to reconciler push</tspan></text>
    <text x="20" y="108" fill="#7ee787">● b93f-… <tspan fill="#c9d1d9">bug   Fix claim race on parent cascade</tspan></text>

    <text x="20" y="144" fill="#58a6ff">$ <tspan fill="#c9d1d9">rebar claim 4a1c --assignee alice</tspan></text>
    <text x="20" y="164" fill="#e3b341">CLAIMED: 4a1c-… (assignee: alice)</text>

    <text x="20" y="200" fill="#58a6ff">$ <tspan fill="#c9d1d9">rebar transition 4a1c in_progress closed</tspan></text>
    <text x="20" y="220" fill="#c9d1d9">4a1c-…: in_progress → closed</text>
    <text x="20" y="240" fill="#7ee787">UNBLOCKED: b93f-…</text>

    <text x="20" y="276" fill="#58a6ff">$ <tspan fill="#c9d1d9">rebar search "reconciler push"</tspan></text>
    <text x="20" y="296" fill="#c9d1d9">1 match  4a1c-…  [closed]  Add retry/backoff to reconciler push</text>

    <text x="20" y="332" fill="#58a6ff">$ <tspan fill="#8b949e">▍</tspan></text>
  </g>
</svg>
