# Blank issues are off so every report starts from a form (bug / feature /
# question). The two contact links route the two things that must NOT become a
# public issue: code changes (they go through Gerrit review) and security
# vulnerabilities (private disclosure per SECURITY.md).
blank_issues_enabled: false
contact_links:
  - name: 🛠️ Code changes / patches (via Gerrit)
    url: https://rebar.solutions.navateam.com
    about: This GitHub repo is a read-only mirror. Code review happens on our Gerrit server — see CONTRIBUTING.md. Do not open a pull request; it cannot be merged here.
  - name: 🔒 Report a security vulnerability
    url: https://github.com/navapbc/rebar/blob/main/SECURITY.md
    about: Never file a security issue publicly. Follow the private disclosure process in SECURITY.md.
