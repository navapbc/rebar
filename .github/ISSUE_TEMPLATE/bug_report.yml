name: 🐛 Bug report
description: Report a defect in rebar (CLI, Python library, MCP server, or reconciler).
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

        **Note:** rebar's GitHub repo is a read-only mirror and Issues may be
        disabled — see [SUPPORT.md](https://github.com/navapbc/rebar/blob/main/SUPPORT.md)
        for where reports are triaged. For **security** issues, do **not** file
        here — follow [SECURITY.md](https://github.com/navapbc/rebar/blob/main/SECURITY.md).
  - type: input
    id: version
    attributes:
      label: rebar version
      description: "Output of `rebar --help` header / the `nava-rebar` release or commit SHA."
      placeholder: "e.g. nava-rebar 0.6.0 (or commit c698cd2)"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      description: Which entry point does this affect?
      options:
        - CLI (`rebar`)
        - Python library (`import rebar`)
        - MCP server (`rebar-mcp`)
        - Jira reconciler
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the exact command or call.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce. Include commands, inputs, and any relevant config.
      placeholder: |
        1. Run `rebar ...`
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and how rebar was installed.
      placeholder: "macOS 14 / Python 3.12 / pipx install nava-rebar"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error output or logs. This will be rendered as code, so no backticks needed.
      render: shell
    validations:
      required: false
