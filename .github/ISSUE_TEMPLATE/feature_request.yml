name: ✨ Feature request
description: Suggest an enhancement or new capability for rebar.
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!

        **Note:** rebar's GitHub repo is a read-only mirror and Issues may be
        disabled — see [SUPPORT.md](https://github.com/navapbc/rebar/blob/main/SUPPORT.md)
        for where proposals are triaged, and
        [CONTRIBUTING.md](https://github.com/navapbc/rebar/blob/main/CONTRIBUTING.md)
        if you'd like to contribute the change yourself (via Gerrit).
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem would this feature solve? What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the capability or behavior you'd like to see.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      description: Which entry point would this touch?
      options:
        - CLI (`rebar`)
        - Python library (`import rebar`)
        - MCP server (`rebar-mcp`)
        - Jira reconciler
        - Docs
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that would help us understand the request.
    validations:
      required: false
