name: ✨ Feature request
description: Suggest an enhancement or new capability for rebar.
title: "[feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! If you'd like to contribute the
        change yourself, see [CONTRIBUTING.md](https://github.com/navapbc/rebar/blob/main/CONTRIBUTING.md)
        (code review happens on Gerrit; this GitHub repo is a read-only mirror).
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem would this feature solve? What are you trying to do that rebar makes hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the capability or behavior you'd like to see.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      description: Which entry point would this touch?
      options:
        - CLI (`rebar`)
        - Python library (`import rebar`)
        - MCP server (`rebar-mcp`)
        - Jira reconciler
        - Docs
        - Other / not sure
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about.
    validations:
      required: false
