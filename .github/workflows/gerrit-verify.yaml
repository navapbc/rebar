name: Gerrit Verified Gate

# CI second gate vote (`Verified`) for Gerrit changes — epic 1fa8 (ADR-0020).
#
# Dispatched by gerrit-to-platform (the Gerrit `hooks` plugin, running IN the Gerrit
# container — story S3) on `patchset-created` and on a `recheck` comment, with the
# nine GERRIT_* inputs below. It runs the SAME checks as test.yml against the EXACT
# patchset, then casts the Gerrit `Verified` label on the change over SSH.
#
# 3-job production shape (ONAP/O-RAN-SC pattern): clear-vote -> build-and-test -> vote.
#   - clear-vote  resets Verified->0 at run start (GerriScary-safe; CVE-2025-1568).
#   - build-and-test checks out the change (checkout-gerrit-change-action) + runs the
#     gates/suite (same commands as test.yml).
#   - vote  aggregates the run conclusion and casts Verified +1/-1, run URL in message.
#
# OPERATOR SETUP (story S4) — required for this workflow to vote:
#   repo variables: GERRIT_SERVER, GERRIT_SSH_USER, GERRIT_KNOWN_HOSTS, GERRIT_URL
#   repo secret:    GERRIT_SSH_PRIVKEY  (the CI service account's private key)
# Until they are set the vote steps fail (fail-closed: no +1 -> no submit).
#
# All third-party actions are SHA-pinned (tag in trailing comment).

on:
  workflow_dispatch:
    inputs:
      GERRIT_BRANCH:            { description: "Gerrit target branch", required: true, type: string }
      GERRIT_CHANGE_ID:         { description: "Gerrit Change-Id", required: true, type: string }
      GERRIT_CHANGE_NUMBER:     { description: "Gerrit change number", required: true, type: string }
      GERRIT_CHANGE_URL:        { description: "Gerrit change URL", required: true, type: string }
      GERRIT_EVENT_TYPE:        { description: "Gerrit event type", required: true, type: string }
      GERRIT_PATCHSET_NUMBER:   { description: "Gerrit patchset number", required: true, type: string }
      GERRIT_PATCHSET_REVISION: { description: "Gerrit patchset revision (commit SHA)", required: true, type: string }
      GERRIT_PROJECT:           { description: "Gerrit project", required: true, type: string }
      GERRIT_REFSPEC:           { description: "Gerrit refspec (refs/changes/NN/NNNN/P)", required: true, type: string }

permissions:
  contents: read
  actions: read   # workflow-conclusion queries this run's jobs

concurrency:
  # A newer patchset for the same change cancels the in-flight run (stale-run guard).
  group: gerrit-verify-${{ github.event.inputs.GERRIT_CHANGE_ID || github.run_id }}
  cancel-in-progress: true

jobs:
  clear-vote:
    name: clear Verified (reset to 0)
    runs-on: ubuntu-latest
    steps:
      - name: Reset Verified->0 at run start (GerriScary-safe)
        uses: lfreleng-actions/gerrit-review-action@a1c036a59b94c8ab89de26d378f6a28cc7378b13  # v1.1.2
        with:
          host: ${{ vars.GERRIT_SERVER }}
          username: ${{ vars.GERRIT_SSH_USER }}
          key: ${{ secrets.GERRIT_SSH_PRIVKEY }}
          known_hosts: ${{ vars.GERRIT_KNOWN_HOSTS }}
          gerrit-change-number: ${{ inputs.GERRIT_CHANGE_NUMBER }}
          gerrit-patchset-number: ${{ inputs.GERRIT_PATCHSET_NUMBER }}
          vote-type: clear

  require-ticket:
    # Fail-fast gate: every commit to main must reference a rebar ticket that RESOLVES in
    # the store (verify.require_ticket_for_commit). Runs before the matrix; its failure
    # aggregates into the run conclusion → Verified-1. See docs/commit-ticket-trailer.md.
    name: require resolvable rebar ticket
    needs: clear-vote
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Gerrit change (mirror first, Gerrit fallback)
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}
          gerrit-project: ${{ inputs.GERRIT_PROJECT }}
          gerrit-url: https://${{ vars.GERRIT_SERVER }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install rebar (core)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "rebar CI"
      - name: Require a resolvable rebar ticket in the commit message
        shell: bash
        run: |
          set -euo pipefail
          # The tickets store's source of truth is the `tickets` branch on GitHub (this repo).
          # Mount it as a real worktree so the standard resolver reads it. Idempotent
          # (prune+rm — runners are ephemeral, but this also survives a `recheck` re-run) and
          # retried, so a transient GitHub blip is never mistaken for a missing ticket.
          git worktree prune || true
          rm -rf .tickets-tracker
          ok=0
          for attempt in 1 2 3; do
            if timeout 60 git fetch --depth=1 \
                 "https://github.com/${{ github.repository }}" \
                 '+tickets:refs/remotes/gh-tickets'; then ok=1; break; fi
            echo "tickets-branch fetch attempt $attempt failed; retrying..." >&2
            sleep 5
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::could not fetch the tickets branch from GitHub after 3 attempts —" \
                 "INFRASTRUCTURE issue, not a commit problem. Comment 'recheck' to retry." >&2
            exit 1
          fi
          git worktree add --detach .tickets-tracker refs/remotes/gh-tickets
          export REBAR_TRACKER_DIR="$PWD/.tickets-tracker"
          rebar verify-commit-ticket --rev HEAD

  build-and-test:
    # The gate+suite (lint + pip-audit + the os×py test matrix) now lives in the reusable
    # _build-and-test.yml, shared verbatim with test.yml (post-merge branch CI) so the two
    # lanes cannot drift (the pattern _optionality.yml already uses). Passing the Gerrit
    # coordinates makes the reusable check out the EXACT patchset (checkout-gerrit-change-action);
    # it inherits NO secrets — the Verified vote key stays in this file. Gated behind
    # clear-vote + require-ticket as before; `vote` still lists build-and-test in `needs`, and
    # im-open/workflow-conclusion folds the reusable's job conclusions into the Verified vote
    # (the same mechanism already used for `optionality`). Splitting the former inline
    # lint/mypy/config-check/pre-commit out of the 4× matrix means they now run once, not per cell.
    name: build-and-test (gate + suite on the patchset)
    needs: [clear-vote, require-ticket]
    uses: ./.github/workflows/_build-and-test.yml
    with:
      gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}
      gerrit-project: ${{ inputs.GERRIT_PROJECT }}
      gerrit-url: https://${{ vars.GERRIT_SERVER }}

  optionality:
    # Run the lean-runtime / clean-core-wheel / per-extra / union contract ON THE PATCHSET,
    # so a no-extras import leak or packaging regression BLOCKS Verified pre-merge (build-and-test
    # installs .[dev], so the heavy stack is present there and never exercises the clean wheel).
    # Reuses the SAME jobs the push/PR lane runs (no drift). Passes the Gerrit coordinates as
    # non-secret inputs → the reusable workflow checks out the exact patchset via
    # checkout-gerrit-change-action; it inherits NO secrets (the vote key stays in this file).
    # Independent of clear-vote/require-ticket so it runs fully parallel with build-and-test; its
    # conclusion reaches the vote below because `vote` needs it (see the run-conclusion note).
    name: optionality (lean-runtime + packaging on the patchset)
    uses: ./.github/workflows/_optionality.yml
    with:
      gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}
      gerrit-project: ${{ inputs.GERRIT_PROJECT }}
      gerrit-url: https://${{ vars.GERRIT_SERVER }}

  artifact-probe:
    # Artifact-provenance probe (story 6168) ON THE PATCHSET: build wheel+sdist and assert a
    # non-null baked _build_info.COMMIT + a clean import/CLI/schema probe, so a packaging
    # regression BLOCKS Verified pre-merge. Reuses the SAME job the push/PR lane runs (no
    # drift) — the reusable checks out the exact patchset via the Gerrit coordinates below and
    # inherits NO secrets. Its conclusion reaches the vote because `vote` needs it
    # (jira-reb-1163: this job gated main but was absent from vote.needs → green-verify/red-main).
    name: artifact-probe (wheel/sdist provenance on the patchset)
    uses: ./.github/workflows/_artifact-probe.yml
    with:
      gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}
      gerrit-project: ${{ inputs.GERRIT_PROJECT }}
      gerrit-url: https://${{ vars.GERRIT_SERVER }}

  eval-discipline:
    # Offline eval-discipline gate ON THE PATCHSET: enforce eval spec/grader discipline with
    # no model/credentials, so an eval regression BLOCKS Verified pre-merge. Reuses the SAME
    # job the push/PR lane runs (no drift). Its conclusion reaches the vote because `vote`
    # needs it (jira-reb-1163: this job gated main but was absent from vote.needs).
    name: eval-discipline (offline eval gate on the patchset)
    uses: ./.github/workflows/_eval-discipline.yml
    with:
      gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}
      gerrit-project: ${{ inputs.GERRIT_PROJECT }}
      gerrit-url: https://${{ vars.GERRIT_SERVER }}

  # Golden-path on a CLEAN (non-editable) install ON THE PATCHSET (ticket 0435): the README
  # quickstart (scripts/check_readme_quickstart.py) runs against a WHEEL-installed rebar
  # (`pip install .`), so packaging/entry-point regressions the editable install in
  # build-and-test cannot catch BLOCK Verified pre-merge.
  golden-path:
    name: golden-path (clean install)
    needs: [clear-vote, require-ticket]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Gerrit change (mirror first, Gerrit fallback)
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}
          gerrit-project: ${{ inputs.GERRIT_PROJECT }}
          gerrit-url: https://${{ vars.GERRIT_SERVER }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Ensure jq is installed
        run: sudo apt-get update && sudo apt-get install -y jq && jq --version
      - name: Install rebar from a built wheel (clean, non-editable)
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "rebar CI"
          git config --global init.defaultBranch main
      - name: README quickstart golden-path (against the installed rebar)
        run: python scripts/check_readme_quickstart.py

  verify-identity:
    # PRE-MERGE whole-store authenticated-authorship gate. Mitigates the gap that let the
    # require_authenticated flip (change 759) merge green and only fail post-merge: the
    # standalone verify-identity.yaml runs on GitHub push/pull_request, i.e. only AFTER a
    # Gerrit change lands on the mirror — it never gated the Gerrit change itself. Running it
    # here folds it into the Verified vote, so the whole-store enforcement check runs BEFORE
    # merge. Enforcement posture is CONFIG-driven (identity.require_authenticated in THIS
    # change's rebar.toml): advisory (exit 0, report-only) while off, blocking once flipped on
    # — so a future re-flip's own Verified vote is the proof that the whole store verifies.
    name: verify-identity (whole-store authorship gate)
    needs: clear-vote
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Gerrit change (mirror first, Gerrit fallback)
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}
          gerrit-project: ${{ inputs.GERRIT_PROJECT }}
          gerrit-url: https://${{ vars.GERRIT_SERVER }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install rebar (core)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "rebar CI"
      - name: Mount the tickets store (FULL history for commit-ancestry era scoping)
        shell: bash
        run: |
          set -euo pipefail
          # A plain code checkout has no store, so verify-identity would exit 2 ("store not
          # found"). Mount the `tickets` branch on a real worktree — on the ACTUAL branch (not
          # detached) so tracker.branch matches, and with a FULL fetch (no --depth) so
          # merge-base / commit-ancestry scoping against identity.enforce_since works over the
          # whole history. Retried so a transient GitHub blip is not read as a store problem.
          git worktree prune || true
          rm -rf .tickets-tracker
          ok=0
          for attempt in 1 2 3; do
            if git fetch \
                 "https://github.com/${{ github.repository }}" \
                 '+tickets:refs/remotes/gh-tickets'; then ok=1; break; fi
            echo "tickets-branch fetch attempt $attempt failed; retrying..." >&2
            sleep 5
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::could not fetch the tickets branch after 3 attempts — INFRASTRUCTURE" \
                 "issue, not an authorship problem. Comment 'recheck' to retry." >&2
            exit 1
          fi
          git worktree add -B tickets .tickets-tracker refs/remotes/gh-tickets
      - name: verify-identity (config-driven posture; reads rebar.toml from this change)
        shell: bash
        run: |
          set -euo pipefail
          export REBAR_TRACKER_DIR="$PWD/.tickets-tracker"
          rebar verify-identity

  vote:
    name: cast Verified
    if: ${{ always() }}
    # optionality/golden-path are in `needs` so their jobs are TERMINAL before workflow-conclusion
    # snapshots this run's jobs — that snapshot (im-open/workflow-conclusion, a REST list-jobs read
    # enabled by `permissions: actions: read`) folds the reusable workflow's job conclusions into
    # WORKFLOW_CONCLUSION, so a clean-wheel/packaging failure casts Verified-1.
    needs: [clear-vote, require-ticket, build-and-test, optionality, artifact-probe, eval-discipline, golden-path, verify-identity]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate the run conclusion
        uses: im-open/workflow-conclusion@8eac7f17381a6917bc04fec3e2c92e70ebc37526  # v3.0.0

      # Check out ONLY the normalization script, from the TRUSTED default branch (not the
      # patchset). `workflow_dispatch` runs this workflow's definition from main, so main is
      # also where the trusted script lives — the vote decision must never run patchset-
      # controlled code (the vote SSH key is scoped to the cast step's `with:`; keeping the
      # decision logic trusted also stops a change from voting itself Verified). persist-
      # credentials:false: nothing here pushes.
      - name: Fetch the trusted conclusion-normalization script
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          sparse-checkout: scripts/normalize_ci_conclusion.sh
          sparse-checkout-cone-mode: false

      # im-open/workflow-conclusion can set WORKFLOW_CONCLUSION to `skipped` (its fallback
      # when none of success/failure/cancelled is observed) or leave it empty — neither is in
      # gerrit-review-action's vote-type domain {clear,success,failure,cancelled}. Piping it
      # verbatim made the action hit `::error::Unknown vote-type ...; exit 1` BEFORE posting
      # any label, so a green-CI change got NO Verified vote and was un-landable. Normalize
      # into the domain, using the trusted needs.*.result as the fail-closed failure signal.
      - name: Normalize the conclusion into the vote-type domain
        id: normalize
        shell: bash
        env:
          CONCLUSION: ${{ env.WORKFLOW_CONCLUSION }}
          FAILURE_OBSERVED: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          set -euo pipefail
          vote="$(scripts/normalize_ci_conclusion.sh)"
          echo "WORKFLOW_CONCLUSION='${CONCLUSION}' failure_observed='${FAILURE_OBSERVED}' -> vote-type='${vote}'"
          echo "vote-type=${vote}" >> "$GITHUB_OUTPUT"

      - name: Cast Verified from the CI conclusion
        uses: lfreleng-actions/gerrit-review-action@a1c036a59b94c8ab89de26d378f6a28cc7378b13  # v1.1.2
        with:
          host: ${{ vars.GERRIT_SERVER }}
          username: ${{ vars.GERRIT_SSH_USER }}
          key: ${{ secrets.GERRIT_SSH_PRIVKEY }}
          known_hosts: ${{ vars.GERRIT_KNOWN_HOSTS }}
          gerrit-change-number: ${{ inputs.GERRIT_CHANGE_NUMBER }}
          gerrit-patchset-number: ${{ inputs.GERRIT_PATCHSET_NUMBER }}
          # success -> Verified+1, failure|cancelled -> Verified-1 (fail-closed).
          # Fed the NORMALIZED conclusion (see the normalize step): `skipped`/empty is coerced
          # into the action's vote-type domain so it can never crash the cast pre-vote.
          # The action's vote message embeds THIS run's URL — its cast is
          # `review --message "<STATUS>: <server>/<repo>/actions/runs/<run_id>"` — so the
          # Gerrit vote always links back to the CI run's log surface (the "run URL in the
          # vote message" requirement; no custom `comment` input exists nor is needed).
          vote-type: ${{ steps.normalize.outputs.vote-type }}
