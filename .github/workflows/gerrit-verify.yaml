name: gerrit-verify

# CI second gate vote (`Verified`) for Gerrit changes — epic 1fa8 (ADR-0020).
#
# Dispatched by gerrit-to-platform (the Gerrit `hooks` plugin, running IN the Gerrit
# container — story S3) on `patchset-created` and on a `recheck` comment, with the
# nine GERRIT_* inputs below. It runs the SAME checks as test.yml against the EXACT
# patchset, then casts the Gerrit `Verified` label on the change over SSH.
#
# 3-job production shape (ONAP/O-RAN-SC pattern): clear-vote -> build-and-test -> vote.
#   - clear-vote  resets Verified->0 at run start (GerriScary-safe; CVE-2025-1568).
#   - build-and-test checks out the change (checkout-gerrit-change-action) + runs the
#     gates/suite (same commands as test.yml).
#   - vote  aggregates the run conclusion and casts Verified +1/-1, run URL in message.
#
# OPERATOR SETUP (story S4) — required for this workflow to vote:
#   repo variables: GERRIT_SERVER, GERRIT_SSH_USER, GERRIT_KNOWN_HOSTS, GERRIT_URL
#   repo secret:    GERRIT_SSH_PRIVKEY  (the CI service account's private key)
# Until they are set the vote steps fail (fail-closed: no +1 -> no submit).
#
# All third-party actions are SHA-pinned (tag in trailing comment).

on:
  workflow_dispatch:
    inputs:
      GERRIT_BRANCH:            { description: "Gerrit target branch", required: true, type: string }
      GERRIT_CHANGE_ID:         { description: "Gerrit Change-Id", required: true, type: string }
      GERRIT_CHANGE_NUMBER:     { description: "Gerrit change number", required: true, type: string }
      GERRIT_CHANGE_URL:        { description: "Gerrit change URL", required: true, type: string }
      GERRIT_EVENT_TYPE:        { description: "Gerrit event type", required: true, type: string }
      GERRIT_PATCHSET_NUMBER:   { description: "Gerrit patchset number", required: true, type: string }
      GERRIT_PATCHSET_REVISION: { description: "Gerrit patchset revision (commit SHA)", required: true, type: string }
      GERRIT_PROJECT:           { description: "Gerrit project", required: true, type: string }
      GERRIT_REFSPEC:           { description: "Gerrit refspec (refs/changes/NN/NNNN/P)", required: true, type: string }

permissions:
  contents: read
  actions: read   # workflow-conclusion queries this run's jobs

concurrency:
  # A newer patchset for the same change cancels the in-flight run (stale-run guard).
  group: gerrit-verify-${{ github.event.inputs.GERRIT_CHANGE_ID || github.run_id }}
  cancel-in-progress: true

jobs:
  clear-vote:
    name: clear Verified (reset to 0)
    runs-on: ubuntu-latest
    steps:
      - name: Reset Verified->0 at run start (GerriScary-safe)
        uses: lfreleng-actions/gerrit-review-action@a1c036a59b94c8ab89de26d378f6a28cc7378b13  # v1.1.2
        with:
          host: ${{ vars.GERRIT_SERVER }}
          username: ${{ vars.GERRIT_SSH_USER }}
          key: ${{ secrets.GERRIT_SSH_PRIVKEY }}
          known_hosts: ${{ vars.GERRIT_KNOWN_HOSTS }}
          gerrit-change-number: ${{ inputs.GERRIT_CHANGE_NUMBER }}
          gerrit-patchset-number: ${{ inputs.GERRIT_PATCHSET_NUMBER }}
          vote-type: clear

  require-ticket:
    # Fail-fast gate: every commit to main must reference a rebar ticket that RESOLVES in
    # the store (verify.require_ticket_for_commit). Runs before the matrix; its failure
    # aggregates into the run conclusion → Verified-1. See docs/commit-ticket-trailer.md.
    name: require resolvable rebar ticket
    needs: clear-vote
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Gerrit change (mirror first, Gerrit fallback)
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}
          gerrit-project: ${{ inputs.GERRIT_PROJECT }}
          gerrit-url: https://${{ vars.GERRIT_SERVER }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install rebar (core)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "rebar CI"
      - name: Require a resolvable rebar ticket in the commit message
        shell: bash
        run: |
          set -euo pipefail
          # The tickets store's source of truth is the `tickets` branch on GitHub (this repo).
          # Mount it as a real worktree so the standard resolver reads it. Idempotent
          # (prune+rm — runners are ephemeral, but this also survives a `recheck` re-run) and
          # retried, so a transient GitHub blip is never mistaken for a missing ticket.
          git worktree prune || true
          rm -rf .tickets-tracker
          ok=0
          for attempt in 1 2 3; do
            if timeout 60 git fetch --depth=1 \
                 "https://github.com/${{ github.repository }}" \
                 '+tickets:refs/remotes/gh-tickets'; then ok=1; break; fi
            echo "tickets-branch fetch attempt $attempt failed; retrying..." >&2
            sleep 5
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::could not fetch the tickets branch from GitHub after 3 attempts —" \
                 "INFRASTRUCTURE issue, not a commit problem. Comment 'recheck' to retry." >&2
            exit 1
          fi
          git worktree add --detach .tickets-tracker refs/remotes/gh-tickets
          export REBAR_TRACKER_DIR="$PWD/.tickets-tracker"
          rebar verify-commit-ticket --rev HEAD

  build-and-test:
    name: CI (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: [clear-vote, require-ticket]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Same matrix as test.yml: full Python range on Linux; macOS on the primary
      # interpreter only (platform-compat coverage — flock/mkdir lock, gtimeout).
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
        exclude:
          # macOS runs only the newest interpreter (runner cost); its value is
          # platform-compat coverage (flock/mkdir lock, gtimeout), not the rev.
          - os: macos-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - name: Checkout the Gerrit change (mirror first, Gerrit fallback)
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}
          gerrit-project: ${{ inputs.GERRIT_PROJECT }}
          gerrit-url: https://${{ vars.GERRIT_SERVER }}

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install rebar (editable) + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "rebar CI"
          git config --global init.defaultBranch main

      # --- The gates + suite, identical to test.yml (single source of truth) ---
      # Module-size GROWTH RATCHET (story S1 / 9cf3): membership in the bare-path allowlist,
      # per-file ceiling in the sibling ceilings file. Mirrors the test.yml step exactly.
      - name: Module-size gate
        shell: bash
        run: |
          allowlist=.github/module-size-allowlist.txt
          ceilings=.github/module-size-ceilings.txt
          fail=0
          # 1) Ratchet: every file with a pinned ceiling must be within it.
          echo "Allow-listed files (ceiling ratchet):"
          while read -r path ceiling _rest; do
            case "$path" in ''|\#*) continue;; esac
            if [ ! -f "$path" ]; then
              echo "::error::ceilings path does not exist: $path (remove or fix the row)"; fail=1; continue
            fi
            if ! printf '%s' "$ceiling" | grep -qE '^[0-9]+$'; then
              echo "::error::ceilings row for $path has no integer ceiling: '$ceiling'"; fail=1; continue
            fi
            loc=$(wc -l < "$path")
            printf "  %5d / %-5s  %s\n" "$loc" "$ceiling" "$path"
            if [ "$loc" -gt "$ceiling" ]; then
              echo "::error::$path is $loc LOC, over its pinned ceiling of $ceiling — shrink it (ratchet)."
              fail=1
            fi
          done < "$ceilings"
          # 2) No unlisted file over the soft cap (membership = the bare-path allowlist).
          listed=$(grep -vE '^[[:space:]]*(#|$)' "$allowlist" | awk '{print $1}' | sort -u)
          over=$(find src/rebar -name '*.py' | grep -v __pycache__ \
            | xargs wc -l 2>/dev/null \
            | awk '$2 != "total" && $1 > 800 { print $2 }' | sort)
          new_offenders=$(comm -23 <(printf '%s\n' "$over") <(printf '%s\n' "$listed") | grep -v '^$' || true)
          if [ -n "$new_offenders" ]; then
            echo "::error::New file(s) over the 800-LOC soft cap and NOT in $allowlist:"
            printf '%s\n' "$new_offenders"
            fail=1
          fi
          [ "$fail" = 1 ] && exit 1
          echo "Module-size gate: OK (all allow-listed files within ceilings; no new over-cap files)."

      - name: Prompt-index drift gate
        shell: bash
        run: |
          # The prompt library is moving rebar.llm.prompts -> rebar.llm.prompting.prompts
          # (ticket toll-clock-tier). This gate runs from main's workflow against each
          # change's tree, so invoke whichever module path that tree provides — keeping the
          # gate green across the move in both directions.
          python -m rebar.llm.prompting.prompts regenerate-index 2>/dev/null \
            || python -m rebar.llm.prompts regenerate-index
          if ! git diff --exit-code -- src/rebar/llm/reviewers/index.json; then
            echo "::error::reviewers/index.json is stale — run: python -m rebar.llm.prompting.prompts regenerate-index"
            exit 1
          fi

      # Env-var registry drift gate in the Verified gate too (mirrors test.yml):
      # docs/env-vars.md is DERIVED from the env-var reads under src/rebar. A stale
      # committed registry previously landed because this gate ran ONLY in the
      # post-merge branch CI, not the pre-merge Verified gate — closing that hole.
      - name: Env-var registry drift gate
        shell: bash
        run: |
          python scripts/gen_env_registry.py
          if ! git diff --exit-code -- docs/env-vars.md; then
            echo "::error::docs/env-vars.md is stale — regenerate it with"
            echo "  python scripts/gen_env_registry.py"
            echo "and commit the result (it is derived from env-var reads under src/rebar)."
            exit 1
          fi
          echo "Env-var registry drift gate: OK (docs/env-vars.md is up to date)."

      - name: Security-rules freshness gate (warn-only)
        shell: bash
        run: python -m rebar.grounding.detectors.security_pin

      - name: Criteria-routing parity gate
        shell: bash
        run: |
          if ! python -m rebar.llm.plan_review.registry validate-routing; then
            echo "::error::criteria_routing.json out of parity with CANONICAL_LLM."
            exit 1
          fi

      # server.json env-contract drift gate in the Verified gate too (mirrors test.yml):
      # server.json is the MCP front-door manifest; rebar.mcp_server.MCP_ENV_VARS is the
      # single source of truth for the env gates. Fails when the manifest's advertised
      # env-var set diverges from that canonical list — was previously only post-merge.
      - name: server.json env-contract drift gate
        shell: bash
        run: python scripts/check_server_manifest.py

      # Public-types drift gate in the Verified gate too (story 3a10): src/rebar/types.py
      # is DERIVED from the canonical JSON Schemas. Mirrors test.yml — a stale committed
      # types.py fails the Verified vote so it can never land on `main`.
      - name: Public-types drift gate
        shell: bash
        run: |
          python -m rebar.schemas.gen_types
          if ! git diff --exit-code -- src/rebar/types.py; then
            echo "::error::src/rebar/types.py is stale — run: python -m rebar.schemas.gen_types"
            exit 1
          fi

      - name: lint (ruff check + format --check, gating)
        run: make lint

      # pre-commit (all hooks, all files) in the Verified gate too (mirrors test.yml):
      # runs the EXACT hooks in .pre-commit-config.yaml (check-yaml/toml/merge-conflict/
      # added-large-files + the make lint/typecheck hooks), so the hook set a contributor
      # commits through is enforced pre-merge, not just post-merge. Belt-and-suspenders:
      # a green commit hook == green Verified gate.
      - name: pre-commit (all hooks, all files, gating)
        run: pre-commit run --all-files --show-diff-on-failure

      - name: mypy — full library (gating)
        run: make typecheck

      # Infra config validation (epic 88ab story 8903) — mirrors test.yml. A malformed
      # config FAILS the Verified vote, so it can never be submitted to `main`.
      - name: config-check (infra configs parse; gating)
        run: make config-check

      # Dependency-vulnerability scan in the Verified gate too (story 95dc,
      # plan-review advisory #2 — not only branch CI's test.yml). Runs once, on
      # the primary cell, to avoid 4× duplicate advisory-DB fetches; a hit fails
      # build-and-test → Verified -1. Same failure/flake policy as test.yml's
      # pip-audit job (any fixable vuln fails; network fetch retried 3×).
      - name: pip-audit (dependency vulnerabilities; gating, network-retried)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        shell: bash
        run: |
          set -uo pipefail
          python -m pip install pip-audit
          attempt=0
          until [ "$attempt" -ge 3 ]; do
            attempt=$((attempt + 1))
            echo "pip-audit attempt ${attempt}/3"
            if out=$(pip-audit --desc 2>&1); then
              echo "$out"
              echo "pip-audit: OK (no known vulnerabilities)."
              exit 0
            fi
            echo "$out"
            if printf '%s' "$out" | grep -qiE 'temporarily|timed out|timeout|connection|resolve|network|503|502|504'; then
              echo "pip-audit: transient DB error — backing off before retry." >&2
              sleep $((attempt * 5))
              continue
            fi
            echo "::error::pip-audit found dependency vulnerabilities (see output). Bump the pinned version, or add --ignore-vuln <ID> with justification if accepted." >&2
            exit 1
          done
          echo "::error::pip-audit could not reach the advisory DB after 3 attempts — INFRASTRUCTURE issue, not a vulnerability. Comment 'recheck' to retry." >&2
          exit 1

      - name: Run the default suite (Python tiers + bash collector; excludes integration + external)
        run: >-
          pytest -m "not integration and not external" -q -p no:cacheprovider
          --basetemp="${{ runner.temp }}/rebar-basetemp"
          --cov=rebar --cov-report=term-missing:skip-covered

      - name: Run the integration tier (concurrency + reconciler; network-guarded)
        run: >-
          pytest -m integration -q -p no:cacheprovider
          --basetemp="${{ runner.temp }}/rebar-basetemp-int"

  optionality:
    # Run the lean-runtime / clean-core-wheel / per-extra / union contract ON THE PATCHSET,
    # so a no-extras import leak or packaging regression BLOCKS Verified pre-merge (build-and-test
    # installs .[dev], so the heavy stack is present there and never exercises the clean wheel).
    # Reuses the SAME jobs the push/PR lane runs (no drift). Passes the Gerrit coordinates as
    # non-secret inputs → the reusable workflow checks out the exact patchset via
    # checkout-gerrit-change-action; it inherits NO secrets (the vote key stays in this file).
    # Independent of clear-vote/require-ticket so it runs fully parallel with build-and-test; its
    # conclusion reaches the vote below because `vote` needs it (see the run-conclusion note).
    name: optionality (lean-runtime + packaging on the patchset)
    uses: ./.github/workflows/_optionality.yml
    with:
      gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}
      gerrit-project: ${{ inputs.GERRIT_PROJECT }}
      gerrit-url: https://${{ vars.GERRIT_SERVER }}

  vote:
    name: cast Verified
    if: ${{ always() }}
    # optionality is in `needs` so its job(s) are TERMINAL before workflow-conclusion snapshots
    # this run's jobs — that snapshot (im-open/workflow-conclusion, a REST list-jobs read enabled
    # by `permissions: actions: read`) folds the reusable workflow's job conclusions into
    # WORKFLOW_CONCLUSION, so a clean-wheel/packaging failure casts Verified-1.
    needs: [clear-vote, require-ticket, build-and-test, optionality]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate the run conclusion
        uses: im-open/workflow-conclusion@8eac7f17381a6917bc04fec3e2c92e70ebc37526  # v3.0.0

      - name: Cast Verified from the CI conclusion
        uses: lfreleng-actions/gerrit-review-action@a1c036a59b94c8ab89de26d378f6a28cc7378b13  # v1.1.2
        with:
          host: ${{ vars.GERRIT_SERVER }}
          username: ${{ vars.GERRIT_SSH_USER }}
          key: ${{ secrets.GERRIT_SSH_PRIVKEY }}
          known_hosts: ${{ vars.GERRIT_KNOWN_HOSTS }}
          gerrit-change-number: ${{ inputs.GERRIT_CHANGE_NUMBER }}
          gerrit-patchset-number: ${{ inputs.GERRIT_PATCHSET_NUMBER }}
          # success -> Verified+1, failure|cancelled -> Verified-1 (fail-closed).
          # The action's vote message embeds THIS run's URL — its cast is
          # `review --message "<STATUS>: <server>/<repo>/actions/runs/<run_id>"` — so the
          # Gerrit vote always links back to the CI run's log surface (the "run URL in the
          # vote message" requirement; no custom `comment` input exists nor is needed).
          vote-type: ${{ env.WORKFLOW_CONCLUSION }}
