name: release

# Build and publish nava-rebar to PyPI via Trusted Publishing (OIDC) — no stored
# token. Publishing is gated to version tags (push a tag like `v0.1.0`); a manual
# run (workflow_dispatch) builds + validates the distributions but does NOT publish,
# so it doubles as a release dry-run.
#
# One-time PyPI setup (Account → Publishing → add a pending publisher):
#   PyPI project name: nava-rebar
#   Owner:             navapbc
#   Repository:        rebar
#   Workflow filename: release.yml
#   Environment:       pypi
# Also create a GitHub environment named `pypi` (Settings → Environments) — add
# required-reviewers protection there if you want a manual approval gate.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Validate metadata (PyPI-readiness)
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish on a version-tag push; a manual dispatch stops after build.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/nava-rebar
    permissions:
      id-token: write   # mint the short-lived OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # PEP 740 digital attestations: the action generates + uploads
          # provenance attestations for each artifact, signed via the same OIDC
          # identity as Trusted Publishing. On by default when id-token: write is
          # present; set explicitly so a future default flip can't silently drop
          # them. Consumers verify with `gh attestation verify` — see
          # docs/releasing.md ("Supply-chain attestations").
          attestations: true

  github_release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    # Same gate as publish: only a version-tag push creates a release. Runs after
    # PyPI so a GitHub Release never appears for a version that failed to publish.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # create the release + upload its asset
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      # Create the GitHub Release for this tag with auto-generated notes (commit/PR
      # list since the previous release) and mark it Latest, attaching the built
      # sdist + wheel. --verify-tag ensures the tag exists; the step is idempotent —
      # if a release already exists for the tag it is updated rather than failing.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          # This job does not check out the repo, so `gh` has no local git remote
          # to infer the target from — GH_REPO gives it the repo explicitly (the
          # `gh release` subcommands + --generate-notes all resolve via the API).
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --latest --draft=false
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" --title "$TAG" --generate-notes --latest --verify-tag dist/*
          fi

  mcp_registry:
    name: Publish to MCP Registry
    needs: publish
    runs-on: ubuntu-latest
    # Runs after PyPI so the registry's package-ownership check (the `mcp-name:`
    # annotation on the published PyPI release) resolves against a live version.
    # Same version-tag gate as publish, so workflow_dispatch dry-runs don't publish.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write   # mint the OIDC token that authenticates to the registry
      contents: read    # checkout server.json
    steps:
      # server.json lives in the repo tree; the tag commit already carries the
      # bumped version (the "Release X.Y.Z" commit sets it before tagging), so no
      # in-workflow version rewrite is needed.
      - uses: actions/checkout@v7
      # Fetch the mcp-publisher release binary (os/arch-detected), per
      # https://modelcontextprotocol.io/registry/github-actions.
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      # GitHub Actions OIDC: the runner's id-token proves this is navapbc/rebar,
      # which authorizes the io.github.navapbc/* namespace — no stored secret, the
      # same trust model as the PyPI Trusted Publishing above.
      - name: Authenticate to the MCP Registry via GitHub Actions OIDC
        run: ./mcp-publisher login github-oidc
      # The registry validates that the PyPI package exists before accepting the
      # server. Right after the publish job, pypi.org may not yet serve the new
      # version — that raced on v0.7.1 (registry returned "PyPI package not found
      # (404)"). Wait until PyPI serves this exact version before publishing.
      - name: Wait for PyPI to serve this version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          echo "Waiting for PyPI to serve nava-rebar ${version} (the registry validates against it)…"
          for attempt in $(seq 1 30); do   # up to 30 × 10s = 5 min
            if [ "$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/nava-rebar/${version}/json")" = "200" ]; then
              echo "PyPI is serving ${version}."
              exit 0
            fi
            echo "  attempt ${attempt}/30: not ready yet; sleeping 10s"
            sleep 10
          done
          echo "::error::PyPI did not serve nava-rebar ${version} within 5 minutes"
          exit 1
      # Publish with a bounded, idempotent retry: check the registry for this
      # version BEFORE each attempt, so a retry after a partial/duplicate publish
      # (versions are immutable) is treated as success rather than looping to failure.
      - name: Publish server.json to the MCP Registry
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          in_registry() {
            curl -fsS "https://registry.modelcontextprotocol.io/v0/servers?search=io.github.navapbc/rebar" | python3 -c "import json,sys; v='${version}'; d=json.load(sys.stdin); print(any((s.get('server',s) or {}).get('version')==v for s in d.get('servers',[])))" 2>/dev/null | grep -qx True
          }
          for attempt in $(seq 1 5); do   # up to 5 attempts × 15s backoff
            if in_registry; then
              echo "nava-rebar ${version} already in the registry — nothing to do."
              exit 0
            fi
            if ./mcp-publisher publish; then
              echo "Published nava-rebar ${version} to the MCP Registry."
              exit 0
            fi
            echo "  publish attempt ${attempt}/5 failed; retrying in 15s"
            sleep 15
          done
          echo "::error::mcp-publisher publish failed for ${version} after 5 attempts"
          exit 1
