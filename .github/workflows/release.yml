name: release

# Build and publish nava-rebar to PyPI via Trusted Publishing (OIDC) — no stored token.
#
# Release-source authorization (story fd84, Finding 1): the release is initiated ONLY by
# `workflow_dispatch` run from `refs/heads/main` — never by a pushed `v*` tag. Because the
# GitHub mirror's `main` is exactly the Gerrit-reviewed-and-landed history, releasing from
# `main` guarantees the source was reviewed **by construction** (the mainstream OSS pattern:
# release only from the protected branch). The `authorize` job asserts, BEFORE any build:
#   (1) the run is on refs/heads/main,
#   (2) version-lockstep — the `version` input == pyproject `[project].version` ==
#       server.json top-level + every packages[].version,
#   (3) ancestry — HEAD is reachable from origin/main (belt-and-suspenders vs the ref guard),
#   (4) env-preflight — the `pypi` environment has required reviewers AND a main-only
#       deployment-branch policy (fail-closed drift detection at release time).
# The guard LOGIC lives in scripts/release_guards.py (unit-tested); the wiring is enforced by
# tests/unit/test_release_workflow_pins.py. Publish happens DIRECTLY via OIDC Trusted
# Publishing (no intermediate tag relay); the `v*` tag + GitHub Release are created only AFTER
# a successful publish (record only — a tag is an output, never a trigger). A hand-pushed `v*`
# tag can no longer reach the re-keyed `pypi` environment and therefore cannot publish.
#
# Supply-chain hardening (story 08a8): every executable this workflow depends on is
# pinned to an immutable reference — actions to full commit SHAs, the build toolchain
# to a hash-locked requirements file consumed by a `--no-isolation` build, and the
# mcp-publisher binary to an exact version whose SHA-256 is verified before it is ever
# executed (in an unprivileged job, separate from the OIDC-privileged publish). See
# docs/releasing.md ("Pinning").
#
# One-time PyPI setup (Account → Publishing → add a pending publisher):
#   PyPI project name: nava-rebar
#   Owner:             navapbc
#   Repository:        rebar
#   Workflow filename: release.yml
#   Environment:       pypi   (the OIDC `sub` is environment-scoped, so it is
#                              ref-independent — dispatch-from-main matches the same entry)
# The GitHub environment named `pypi` (Settings → Environments) MUST have required-reviewers
# protection AND a `main`-only deployment-branch policy — the `authorize` env-preflight fails
# the release closed if either is missing.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version — must equal pyproject/server.json (e.g. 0.7.2)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  authorize:
    name: Authorize release source (dispatch-from-main + lockstep + ancestry + env preflight)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # (1) Ref guard — a dispatch MUST run from refs/heads/main. Because the mirror's `main`
      # is the Gerrit-reviewed history, this makes "the source is reviewed" true by construction.
      - name: Guard — dispatch must run from refs/heads/main
        env:
          REF: ${{ github.ref }}
        run: |
          if [ "$REF" != "refs/heads/main" ]; then
            echo "::error::release must be dispatched from refs/heads/main (got: $REF)"
            exit 1
          fi
      # fetch-depth: 0 so the ancestry check below sees full history (a shallow clone defeats it).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      # (2) Version-lockstep — the intended version and every manifest must agree BEFORE build.
      - name: Guard — version lockstep (input == pyproject == server.json)
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python scripts/release_guards.py version-lockstep \
            --version "$VERSION" --pyproject pyproject.toml --server-json server.json
      # (3) Ancestry — HEAD must be reachable from origin/main (redundant with the ref guard
      # under dispatch-from-main, kept as defense-in-depth).
      - name: Guard — HEAD is an ancestor of origin/main
        env:
          SHA: ${{ github.sha }}
        run: |
          git fetch --no-tags origin main
          python scripts/release_guards.py ancestry --sha "$SHA" --ref origin/main
      # (4) Env-preflight — fail the release CLOSED if the pypi environment lost its required
      # reviewers or its main-only branch policy (drift detected exactly when it matters).
      - name: Guard — pypi environment preflight (required reviewers + main-only branch policy)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh api "/repos/${GH_REPO}/environments/pypi" > env.json
          gh api "/repos/${GH_REPO}/environments/pypi/deployment-branch-policies" > branch-policies.json
          python scripts/release_guards.py env-preflight \
            --response env.json --branch-policies branch-policies.json

  evidence_shapin:
    name: Record pinned action SHAs (evidence)
    runs-on: ubuntu-latest
    steps:
      # The supply-chain-pin evidence fragment: the immutable action references this
      # release run trusts. Kept in-workflow (not resolved at runtime) so the evidence
      # is exactly what the file pins.
      - name: Write evidence-shapin fragment
        run: |
          {
            echo "== pinned action SHAs (evidence-shapin) =="
            echo "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0"
            echo "actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0"
            echo "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1"
            echo "actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1"
            echo "pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0"
          } > evidence-shapin.txt
          cat evidence-shapin.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: evidence-shapin
          path: evidence-shapin.txt

  build:
    name: Build distributions (build-once)
    # Gated on the release-source authorization: no artifact is built (and therefore nothing
    # can flow to publish) until dispatch-from-main + version-lockstep + ancestry + env-preflight
    # all pass. Every publishing job is a `needs:` descendant of build, so authorize gates them all.
    needs: authorize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      # BUILD ONCE (story 6168): the wheel + sdist are built exactly once here, their
      # SHA-256 digests recorded, and the SAME bytes flow to test + publish — the tested
      # artifact IS the published artifact (no rebuild between test and publish). The
      # release commit's short SHA is baked into the wheel/sdist via REBAR_BUILD_COMMIT so
      # the sdist→wheel rebuild path can't lose provenance to `COMMIT = None` (see
      # hatch_build.py / docs/releasing.md "Build-once").
      #
      # Hash-locked, --no-isolation build. Instead of pulling `build`/`twine` from PyPI
      # unpinned, install the EXACT toolchain from the hash-locked lock into a fresh venv
      # (--require-hashes fails on any unpinned/mismatched hash; --no-deps installs only the
      # lock's entries), capture it as evidence, assert nothing ambient leaked into the env
      # (the guard closes the --no-isolation hole), then build without a second isolated env.
      - name: Build sdist + wheel (hash-locked, --no-isolation)
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python -m venv .release-venv
          # shellcheck disable=SC1091
          . .release-venv/bin/activate
          python -m pip install --require-hashes --no-deps -r .github/release-requirements.txt
          pip list --format=freeze > tool-versions.txt
          python scripts/check_build_env_locked.py \
            --lock .github/release-requirements.txt \
            --freeze <(pip freeze)
          # Bake the exact release commit (short SHA) into the artifacts. Set BEFORE the
          # build so the sdist ships it and the wheel-from-sdist rebuild sees it (env wins).
          REBAR_BUILD_COMMIT="${GITHUB_SHA::7}"
          export REBAR_BUILD_COMMIT
          echo "Baking REBAR_BUILD_COMMIT=${REBAR_BUILD_COMMIT} into the distributions"
          python -m build --no-isolation
      - name: Validate metadata (PyPI-readiness)
        run: |
          # shellcheck disable=SC1091
          . .release-venv/bin/activate
          python -m twine check dist/*.whl dist/*.tar.gz
      # Record the SHA-256 of each built artifact into a SHA256SUMS manifest that travels
      # WITH the bytes. Every downstream job (publish especially) re-verifies against it, so
      # a substituted/corrupted artifact between jobs fails the release fast.
      - name: Record SHA256SUMS over the built artifacts
        run: |
          ( cd dist && sha256sum ./*.whl ./*.tar.gz > SHA256SUMS )
          echo "===== dist/SHA256SUMS ====="
          cat dist/SHA256SUMS
      # ONE named bundle: wheel + sdist + SHA256SUMS. Downstream jobs download THIS and
      # promote the exact bytes — they never rebuild.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
      # The build-toolchain evidence fragment (the frozen tool versions actually used).
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: evidence-build
          path: tool-versions.txt
      # The built-artifact evidence fragment (the wheel/sdist digests). consolidate_evidence
      # concatenates every evidence-* fragment, so this is picked up automatically.
      - name: Write evidence-artifacts fragment
        run: |
          {
            echo "== built artifact digests (evidence-artifacts) =="
            echo "REBAR_BUILD_COMMIT: ${GITHUB_SHA::7}"
            cat dist/SHA256SUMS
          } > evidence-artifacts.txt
          cat evidence-artifacts.txt
        env:
          GITHUB_SHA: ${{ github.sha }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: evidence-artifacts
          path: evidence-artifacts.txt

  wheel_test:
    name: Test the built wheel
    needs: build
    runs-on: ubuntu-latest
    # NO repo checkout: the working dir has no `src/rebar` on the path, so `import rebar`
    # resolves to the INSTALLED wheel — never the source tree. This is what catches a
    # packaging defect (missing data files, a `COMMIT = None` bake) that an editable
    # install would mask.
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: Install the exact wheel by filename
        run: |
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
      - name: Probe the installed wheel
        run: |
          python -c "import rebar"
          rebar --help
          rebar-mcp --help
          # Every packaged JSON schema loads (proves the data files shipped + parse).
          python -c "import importlib.resources as r, json, rebar; fs=[f for f in r.files('rebar').rglob('*.json')]; assert fs; [json.loads(f.read_text()) for f in fs]"
          # The build-baked provenance SHA survived the sdist→wheel path (not None).
          python -c "from rebar import _build_info; assert _build_info.COMMIT, 'wheel baked COMMIT is empty/None'"

  sdist_test:
    name: Test install-from-sdist
    needs: build
    runs-on: ubuntu-latest
    # NO repo checkout and REBAR_BUILD_COMMIT UNSET: installing from the sdist rebuilds the
    # wheel in a tree with no `.git` and no env override, so a non-null `_build_info.COMMIT`
    # here PROVES the preserve-existing precedence step (the sdist shipped the baked SHA).
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: Install from the sdist (REBAR_BUILD_COMMIT unset, no .git)
        env:
          REBAR_BUILD_COMMIT: ""
        run: |
          # Explicitly clear the env override so the rebuild exercises preserve-existing.
          unset REBAR_BUILD_COMMIT
          python -m pip install --upgrade pip
          python -m pip install dist/*.tar.gz
      - name: Probe the sdist install
        run: |
          python -c "import rebar"
          rebar --help
          rebar-mcp --help
          python -c "import importlib.resources as r, json, rebar; fs=[f for f in r.files('rebar').rglob('*.json')]; assert fs; [json.loads(f.read_text()) for f in fs]"
          # Preserve-existing must have kept the SHA the sdist shipped — non-null.
          python -c "from rebar import _build_info; assert _build_info.COMMIT, 'sdist install lost the baked COMMIT (preserve-existing failed)'"

  publish:
    name: Publish to PyPI
    needs: [build, wheel_test, sdist_test]
    runs-on: ubuntu-latest
    # Publish on an authorized dispatch-from-main run (the `authorize` job upstream of `build`
    # already enforced ref==main + version-lockstep + ancestry + env-preflight). The `pypi`
    # environment's required reviewers below are the second human gate on every publish.
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: pypi
      url: https://pypi.org/p/nava-rebar
    permissions:
      id-token: write   # mint the short-lived OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      # HASH GATE: the bytes we publish must be byte-identical to what build-once produced
      # and the test jobs exercised. Verify against SHA256SUMS and FAIL on any mismatch;
      # there is deliberately NO `python -m build` here — publish promotes, never rebuilds.
      - name: Verify the bundle against SHA256SUMS (no rebuild)
        run: |
          ( cd dist && sha256sum -c SHA256SUMS )
          # twine/PyPI must not see the manifest as a distribution — drop it post-verify.
          rm -f dist/SHA256SUMS
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          # PEP 740 digital attestations: the action generates + uploads
          # provenance attestations for each artifact, signed via the same OIDC
          # identity as Trusted Publishing. On by default when id-token: write is
          # present; set explicitly so a future default flip can't silently drop
          # them. Consumers verify with `gh attestation verify` — see
          # docs/releasing.md ("Supply-chain attestations").
          attestations: true

  github_release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    # Runs after a successful publish so a GitHub Release never appears for a version that
    # failed to publish. The `v*` tag is an OUTPUT here (created at the release SHA), never a
    # trigger — the workflow is dispatch-only, so this tag cannot start another release run.
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write   # create the tag + release + upload its asset
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      # Create the GitHub Release for this version with auto-generated notes (commit/PR list
      # since the previous release) and mark it Latest, attaching the built sdist + wheel. The
      # version comes from the dispatch input (NOT a pre-pushed tag). `gh release create`
      # without `--verify-tag` CREATES the lightweight `v<version>` tag at --target (the run
      # SHA, already asserted an ancestor of main) when it does not pre-exist — no tag relay /
      # PAT needed. The step is idempotent: an existing release for the tag is updated in place.
      - name: Create the v* tag + GitHub Release (record only, post-publish)
        env:
          GH_TOKEN: ${{ github.token }}
          # This job does not check out the repo, so `gh` has no local git remote to infer
          # the target from — GH_REPO gives it the repo explicitly (the `gh release`
          # subcommands + --generate-notes all resolve via the API).
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ inputs.version }}
          SHA: ${{ github.sha }}
        run: |
          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --latest --draft=false
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" --target "$SHA" --title "$TAG" --generate-notes --latest dist/*
          fi

  mcp_verify:
    name: Verify pinned mcp-publisher
    runs-on: ubuntu-latest
    # UNPRIVILEGED by design: this job downloads + digest-verifies the mcp-publisher
    # binary but holds NO id-token: write. The OIDC token lives only in mcp_registry,
    # which consumes the verified artifact — so an unverified/substituted archive can
    # never be executed with the registry-publishing OIDC identity.
    permissions:
      contents: read
    steps:
      # Download → verify → extract as three discrete steps (never a piped
      # download-into-extract, which would unpack an unverified stream). The URL +
      # SHA-256 are the immutable mcp-publisher pin;
      # `sha256sum -c --strict` fails the job on any byte mismatch BEFORE extraction.
      # Regenerate the pair with docs/releasing.md ("Pinning"); verify locally with
      # `make verify-mcp-pin`.
      - name: Download + digest-verify mcp-publisher
        env:
          MCP_PUBLISHER_URL: "https://github.com/modelcontextprotocol/registry/releases/download/v1.8.0/mcp-publisher_linux_amd64.tar.gz"
          MCP_PUBLISHER_SHA256: "1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf"
        run: |
          curl -fsSL "$MCP_PUBLISHER_URL" -o mcp-publisher.tar.gz
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c --strict
          tar xzf mcp-publisher.tar.gz mcp-publisher
      # The mcp-publisher evidence fragment (the pinned version + verified digest).
      - name: Write evidence-mcp fragment
        env:
          MCP_PUBLISHER_URL: "https://github.com/modelcontextprotocol/registry/releases/download/v1.8.0/mcp-publisher_linux_amd64.tar.gz"
          MCP_PUBLISHER_SHA256: "1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf"
        run: |
          {
            echo "== mcp-publisher (evidence-mcp) =="
            echo "version: v1.8.0"
            echo "url: ${MCP_PUBLISHER_URL}"
            echo "sha256 (verified): ${MCP_PUBLISHER_SHA256}"
          } > evidence-mcp.txt
          cat evidence-mcp.txt
      # Hand the verified binary to the OIDC-privileged job as an artifact.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: mcp-publisher-verified
          path: mcp-publisher
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: evidence-mcp
          path: evidence-mcp.txt

  mcp_registry:
    name: Publish to MCP Registry
    needs: [publish, mcp_verify]
    runs-on: ubuntu-latest
    # Runs after PyPI so the registry's package-ownership check (the `mcp-name:`
    # annotation on the published PyPI release) resolves against a live version.
    # Same authorized-dispatch gate as publish (version comes from the dispatch input).
    if: github.event_name == 'workflow_dispatch'
    # zizmor:ignore[excessive-permissions] -- id-token: write is consumed by mcp-publisher login github-oidc (runtime OIDC token request; zizmor cannot introspect shell commands)
    permissions:
      id-token: write   # mint the OIDC token that authenticates to the registry
      contents: read    # checkout server.json
    steps:
      # server.json lives in the repo tree at the dispatched `main` SHA, which already carries
      # the bumped version (asserted by the authorize job's version-lockstep against the same
      # dispatch input), so no in-workflow version rewrite is needed.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      # Use the digest-verified binary from mcp_verify — not a fresh unverified
      # download. upload-artifact drops the exec bit, so restore it before running.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: mcp-publisher-verified
      - name: Restore exec bit on the verified binary
        run: chmod +x mcp-publisher
      # GitHub Actions OIDC: the runner's id-token proves this is navapbc/rebar,
      # which authorizes the io.github.navapbc/* namespace — no stored secret, the
      # same trust model as the PyPI Trusted Publishing above.
      - name: Authenticate to the MCP Registry via GitHub Actions OIDC
        run: ./mcp-publisher login github-oidc
      # The registry validates that the PyPI package exists before accepting the
      # server. Right after the publish job, pypi.org may not yet serve the new
      # version — that raced on v0.7.1 (registry returned "PyPI package not found
      # (404)"). Wait until PyPI serves this exact version before publishing.
      - name: Wait for PyPI to serve this version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          version="${VERSION}"
          echo "Waiting for PyPI to serve nava-rebar ${version} (the registry validates against it)…"
          for attempt in $(seq 1 30); do   # up to 30 × 10s = 5 min
            if [ "$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/nava-rebar/${version}/json")" = "200" ]; then
              echo "PyPI is serving ${version}."
              exit 0
            fi
            echo "  attempt ${attempt}/30: not ready yet; sleeping 10s"
            sleep 10
          done
          echo "::error::PyPI did not serve nava-rebar ${version} within 5 minutes"
          exit 1
      # Publish with a bounded, idempotent retry: check the registry for this
      # version BEFORE each attempt, so a retry after a partial/duplicate publish
      # (versions are immutable) is treated as success rather than looping to failure.
      - name: Publish server.json to the MCP Registry
        env:
          VERSION: ${{ inputs.version }}
        run: |
          version="${VERSION}"
          in_registry() {
            curl -fsS "https://registry.modelcontextprotocol.io/v0/servers?search=io.github.navapbc/rebar" | python3 -c "import json,sys; v='${version}'; d=json.load(sys.stdin); print(any((s.get('server',s) or {}).get('version')==v for s in d.get('servers',[])))" 2>/dev/null | grep -qx True
          }
          for attempt in $(seq 1 5); do   # up to 5 attempts × 15s backoff
            if in_registry; then
              echo "nava-rebar ${version} already in the registry — nothing to do."
              exit 0
            fi
            if ./mcp-publisher publish; then
              echo "Published nava-rebar ${version} to the MCP Registry."
              exit 0
            fi
            echo "  publish attempt ${attempt}/5 failed; retrying in 15s"
            sleep 15
          done
          echo "::error::mcp-publisher publish failed for ${version} after 5 attempts"
          exit 1

  consolidate_evidence:
    name: Consolidate release evidence
    # The fragment producers: action-pin evidence, build-toolchain evidence, the built-
    # artifact digests (evidence-artifacts — wheel/sdist SHA-256s from the build-once job,
    # story 6168), and the mcp-publisher digest evidence. This job's evidence-* glob picks
    # up every fragment; `needs: build` covers both evidence-build and evidence-artifacts.
    needs: [evidence_shapin, build, mcp_verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: evidence-*
          path: evidence
      - name: Concatenate fragments into release-evidence.txt
        run: |
          : > release-evidence.txt
          for f in $(find evidence -name '*.txt' | sort); do
            cat "$f" >> release-evidence.txt
            echo >> release-evidence.txt
          done
          echo "===== release-evidence.txt ====="
          cat release-evidence.txt
