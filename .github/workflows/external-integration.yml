name: external-integration

# Manually-triggered EXTERNAL-integration suite (tests/external/): tests that hit
# third-party services and make REAL, billable LLM calls, so they are deliberately
# NOT part of the automatic `test` workflow. Trigger from the Actions tab.
#
# Two jobs:
#   * external        — the live rebar.llm runner validation (model only).
#   * langfuse-trace  — stands up an EPHEMERAL self-hosted Langfuse stack
#                       (docker-compose.langfuse.yml, headless-init) and asserts a
#                       review run emits a trace fetchable via the Langfuse API.
#
# Both require the `ANTHROPIC_API_KEY` (or `OPENAI_API_KEY`) repository secret.
# langfuse-trace needs NO Langfuse secret — the stack is ephemeral with
# deterministic headless-init keys baked into the compose file.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  external:
    name: external integration (live services)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Fail loudly if no key is configured — otherwise the LLM tests would simply
      # skip and the job would go green without validating anything.
      - name: Require an LLM API key secret
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ] && [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::Set the ANTHROPIC_API_KEY (or OPENAI_API_KEY) repository secret to run the external suite."
            exit 1
          fi

      # The rebar_repo fixture initializes a git-backed store via the bash engine,
      # which shells out to jq + git (mirrors the main test workflow).
      - name: Ensure jq is installed
        run: sudo apt-get update && sudo apt-get install -y jq && jq --version

      - name: Install rebar + the full agents stack
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "rebar CI"
          git config --global init.defaultBranch main

      - name: Run the external-integration suite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # The external tier is inert unless this opt-in is set (a safety guard
          # against accidental billable calls); the job above already required a key.
          REBAR_RUN_EXTERNAL: "1"
        # -p no:cacheprovider + a runner-temp basetemp mirror the main workflow.
        # The Langfuse trace test skips here (no LANGFUSE_HOST) — see langfuse-trace.
        run: >-
          pytest -m external tests/external -q
          -p no:cacheprovider --basetemp="${{ runner.temp }}/rebar-basetemp"

  langfuse-trace:
    name: langfuse tracing round-trip (ephemeral self-hosted)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Require an LLM API key secret
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ] && [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::Set the ANTHROPIC_API_KEY (or OPENAI_API_KEY) repository secret to run the tracing round-trip."
            exit 1
          fi

      - name: Ensure jq is installed
        run: sudo apt-get update && sudo apt-get install -y jq && jq --version

      - name: Install rebar + the full agents stack
        run: |
          python -m pip install --upgrade pip
          # [tracing] pulls the OpenTelemetry SDK + OTLP exporter so setup_tracing()
          # actually exports spans to Langfuse (rebar emits traces via OTLP, NOT the
          # Langfuse SDK — see src/rebar/llm/tracing.py). Without it this job would run
          # tracing as a silent no-op and validate nothing.
          python -m pip install -e '.[dev,tracing]'

      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "rebar CI"
          git config --global init.defaultBranch main

      # The deterministic headless-init keys live in docker-compose.langfuse.yml.
      - name: Bring up the ephemeral Langfuse stack
        run: docker compose -f docker-compose.langfuse.yml up -d

      - name: Wait for Langfuse to be ready
        run: |
          # 1) HTTP liveness — the web container answers /api/public/health.
          ok=
          for i in $(seq 1 60); do
            if curl -fsS --head http://localhost:3000/api/public/health >/dev/null 2>&1; then
              echo "health OK after ${i} tries"; ok=1; break
            fi
            sleep 5
          done
          [ -n "$ok" ] || { echo "::error::Langfuse web never became healthy"; docker compose -f docker-compose.langfuse.yml logs --tail=80 langfuse-web; exit 1; }
          # 2) Auth/readiness — the server reports healthy BEFORE headless-init +
          #    ClickHouse/MinIO migrations finish, so confirm the project resolves.
          #    Probe the PUBLIC REST API with the baked headless-init keys (Basic
          #    auth pk:sk) — NOT the langfuse Python SDK, which is intentionally not a
          #    rebar dependency (tracing is write-only OTLP; see src/rebar/llm/tracing.py).
          #    stderr is NOT suppressed: a probe failure must surface, never masquerade
          #    as a timeout (a swallowed ModuleNotFoundError is exactly the bug this
          #    replaces — see rebar-ticket 416d-c02a-5be4-46ad).
          for i in $(seq 1 24); do
            if curl -fsS -u pk-lf-1234567890:sk-lf-1234567890 \
                 http://localhost:3000/api/public/projects >/dev/null; then
              echo "langfuse project API OK after ${i} tries"; exit 0
            fi
            sleep 5
          done
          echo "::error::Langfuse project did not initialize in time"
          docker compose -f docker-compose.langfuse.yml logs --tail=80
          exit 1

      - name: Run the Langfuse trace round-trip test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Point rebar at the ephemeral stack with its baked-in headless-init keys.
          LANGFUSE_HOST: http://localhost:3000
          LANGFUSE_PUBLIC_KEY: pk-lf-1234567890
          LANGFUSE_SECRET_KEY: sk-lf-1234567890
          REBAR_RUN_EXTERNAL: "1"
        run: >-
          pytest -m external tests/external/test_llm_trace.py -q
          -p no:cacheprovider --basetemp="${{ runner.temp }}/rebar-basetemp"

      - name: Langfuse logs on failure
        if: failure()
        run: docker compose -f docker-compose.langfuse.yml logs --tail=120

      - name: Tear down the Langfuse stack
        if: always()
        run: docker compose -f docker-compose.langfuse.yml down -v
