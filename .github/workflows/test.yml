name: test

# Run the full test suite on every push and PR. rebar's safety story leans on
# "the suite catches it", so this is the gate that makes that automatic (ticket
# coily-conch-tag / Rec 3 of the 2026-06-09 architecture review).
#
# Coverage: the Python tiers (unit / scripts / interface) run under pytest, plus
# the integration tier (concurrency + reconciler —
# network-guarded / mocked, so CI-safe) as a separate step. Live Jira validation is
# done via manual probes (bridge-probe, reconcile dry-run), not pytest. The external
# tier (live LLM providers — tests/external/) is excluded from the default run via
# `-m "not integration and not external"` and runs separately with credentials via
# the external-integration workflow.

on:
  push:
    # every branch EXCEPT the S3-replicated feature/** (those fan out redundant mirror CI
    # that casts no Verified vote — the gerrit-verify workflow_dispatch is the sole Verified
    # source; see fern-belief-gap). Nested depths matched by **.
    branches-ignore: ["feature/**"]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install rebar (editable) + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      # GATING: the flake8 "real-bug" smoke set (configured in pyproject
      # [tool.ruff.lint]) — syntax errors + undefined names — plus formatting
      # consistency (ruff format --check). Routed through `make lint` (the single
      # source of truth shared by local + the pre-commit hook), running the EXACT
      # ruff pinned in pyproject's [dev] extra so CI and local never drift. CHECK-ONLY
      # (never mutates) — a failure means "run `make format`". This is the gate that
      # catches NameError-on-error-path bugs + format drift.
      - name: lint (ruff check + format --check, gating)
        run: make lint

      # GATING: parity between the local pre-commit gate and CI. Runs the EXACT hooks
      # in .pre-commit-config.yaml across all files (check-yaml/toml/merge-conflict/
      # added-large-files + the `make lint` hook), so the hook set a contributor commits
      # through is also enforced server-side — not just `make lint`. This is the
      # belt-and-suspenders that guarantees a green commit hook == green CI.
      - name: pre-commit (all hooks, all files, gating)
        run: pre-commit run --all-files --show-diff-on-failure

      # GATING: mypy over the WHOLE library. Previously core-only (reducer/graph/
      # _store) with the rest tracked as an advisory "full tree" ratchet — that debt
      # was driven to zero (story urge-abbey-goal), so `make typecheck` now covers all
      # of src/rebar and gates. Same command local + the pre-commit hook run.
      #
      # The former "advisory ruff (full set)" ratchet step is also removed: `make lint`
      # (above) already gates the full ruff select set (E,F,W,I,UP,B + BLE001/T201)
      # across src+tests, so a separate advisory ruff view was redundant.
      - name: mypy — full library (gating)
        run: make typecheck

      # Validate every infra config so a MALFORMED config can never reach `main` (epic 88ab
      # story 8903). Also mirrored inline in gerrit-verify.yaml (the Verified gate), so this
      # fails the two-vote gate, not just branch CI.
      - name: config-check (infra configs parse; gating)
        run: make config-check

  pip-audit:
    # GATING dependency-vulnerability scan (story 95dc). Audits rebar's actual
    # installed dependency closure against the PyPI advisory / OSV database and
    # FAILS on any known vulnerability. We scan the base runtime install (no
    # extras) — that is what a plain `pip install nava-rebar` consumer gets —
    # plus the [dev] extra so build/test tooling is covered too.
    #
    # Failure policy (plan-review advisory #3):
    #   - ANY vulnerability with a known fix version fails the job (→ Verified -1
    #     when mirrored in gerrit-verify.yaml). Remediate by bumping the pin.
    #   - An advisory that is a false positive / unfixable / accepted risk is
    #     silenced with `--ignore-vuln <GHSA/PYSEC-ID>` below and a one-line
    #     justification — deliberate, reviewed, and greppable (never a blanket
    #     skip). No ignores are needed today; the list is intentionally empty.
    #   - Network flake: the OSV/PyPI advisory DB fetch is retried (3× with
    #     backoff). If every attempt fails to REACH the DB it is an INFRA error,
    #     not a vuln — comment `recheck` (Gerrit) / re-run the job (branch CI).
    name: pip-audit (dependency vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install rebar (runtime + dev) and pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pip install pip-audit
      - name: pip-audit (scan installed environment; gating, network-retried)
        shell: bash
        run: |
          set -uo pipefail
          # Retry only the network-bound advisory-DB fetch so a transient OSV/PyPI
          # blip casts no spurious -1; a real vuln fails on the first try and the
          # exit code is preserved. `--desc` prints advisory detail on a hit.
          attempt=0
          until [ "$attempt" -ge 3 ]; do
            attempt=$((attempt + 1))
            echo "pip-audit attempt ${attempt}/3"
            if out=$(pip-audit --desc 2>&1); then
              echo "$out"
              echo "pip-audit: OK (no known vulnerabilities)."
              exit 0
            fi
            echo "$out"
            # Distinguish a real finding from a DB-unreachable infra flake: only
            # retry when the failure looks network-related.
            if printf '%s' "$out" | grep -qiE 'temporarily|timed out|timeout|connection|resolve|network|503|502|504'; then
              echo "pip-audit: transient DB error — backing off before retry." >&2
              sleep $((attempt * 5))
              continue
            fi
            echo "::error::pip-audit found dependency vulnerabilities (see output). Bump the pinned version, or add --ignore-vuln <ID> with justification if accepted." >&2
            exit 1
          done
          echo "::error::pip-audit could not reach the advisory DB after 3 attempts — INFRASTRUCTURE issue, not a vulnerability. Re-run the job / comment 'recheck'." >&2
          exit 1

  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # requires-python is >= 3.11 (the reconciler uses enum.StrEnum, new in
        # 3.11), so test the full supported range on Linux. macOS runs only the
        # primary interpreter (runner cost) — its value is the platform-compat
        # coverage (flock/mkdir lock, gtimeout), not the Python rev.
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
        exclude:
          # macOS runs only the newest interpreter (runner cost); its value is
          # platform-compat coverage (flock/mkdir lock, gtimeout), not the rev.
          - os: macos-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install rebar (editable) + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      # Git identity is required by the suites that build throwaway commit stores.
      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "rebar CI"
          git config --global init.defaultBranch main

      # Module-size gate (policy: target 200-500 LOC, soft cap 800; docs/architecture.md).
      # A GROWTH RATCHET (story S1). Two sibling files, so the gate stays green across the
      # ratchet rollout in BOTH directions (a change adding the ratchet is verified by
      # `main`'s bare-path gate; see the allowlist header):
      #   * .github/module-size-allowlist.txt — soft-cap-exempt MEMBERSHIP (bare paths).
      #   * .github/module-size-ceilings.txt  — per-file pinned CEILING ("<path> <max>").
      # The gate FAILS when an allow-listed file EXCEEDS its ceiling (a grandfathered file
      # cannot creep upward) — shrinking is free — and when a NEW file over the 800 soft cap
      # is NOT listed. Raising a ceiling / adding a row is a deliberate, reviewed act (with a
      # docs/architecture.md remedy row). Runs on every OS (pure wc/shell). Mirrored by
      # tests/unit/test_module_size_contract.py.
      - name: Module-size gate
        shell: bash
        run: |
          allowlist=.github/module-size-allowlist.txt
          ceilings=.github/module-size-ceilings.txt
          fail=0
          # 1) Ratchet: every file with a pinned ceiling must be within it.
          echo "Allow-listed files (ceiling ratchet):"
          while read -r path ceiling _rest; do
            case "$path" in ''|\#*) continue;; esac
            if [ ! -f "$path" ]; then
              echo "::error::ceilings path does not exist: $path (remove or fix the row)"; fail=1; continue
            fi
            if ! printf '%s' "$ceiling" | grep -qE '^[0-9]+$'; then
              echo "::error::ceilings row for $path has no integer ceiling: '$ceiling'"; fail=1; continue
            fi
            loc=$(wc -l < "$path")
            printf "  %5d / %-5s  %s\n" "$loc" "$ceiling" "$path"
            if [ "$loc" -gt "$ceiling" ]; then
              echo "::error::$path is $loc LOC, over its pinned ceiling of $ceiling — shrink it (ratchet)."
              fail=1
            fi
          done < "$ceilings"
          # 2) No unlisted file over the soft cap (membership = the bare-path allowlist).
          listed=$(grep -vE '^[[:space:]]*(#|$)' "$allowlist" | awk '{print $1}' | sort -u)
          over=$(find src/rebar -name '*.py' | grep -v __pycache__ \
            | xargs wc -l 2>/dev/null \
            | awk '$2 != "total" && $1 > 800 { print $2 }' | sort)
          new_offenders=$(comm -23 <(printf '%s\n' "$over") <(printf '%s\n' "$listed") | grep -v '^$' || true)
          if [ -n "$new_offenders" ]; then
            echo "::error::New file(s) over the 800-LOC soft cap and NOT in $allowlist:"
            printf '%s\n' "$new_offenders" | while read -r f; do [ -n "$f" ] && printf "  %5d  %s\n" "$(wc -l < "$f")" "$f"; done
            echo "Split it along an existing call-graph seam, or (if genuinely cohesive) add it to"
            echo "$allowlist AND $ceilings with a ceiling AND a docs/architecture.md remedy row."
            fail=1
          fi
          [ "$fail" = 1 ] && exit 1
          echo "Module-size gate: OK (all allow-listed files within ceilings; no new over-cap files)."

      # Prompt-index drift gate (story afe6): reviewers/index.json is DERIVED from the
      # prompt front-matter and committed. Regenerate it and fail if the working tree
      # now differs — a stale index means a prompt's front-matter changed without the
      # committed index being regenerated. Style mirrors the Module-size gate above.
      - name: Prompt-index drift gate
        shell: bash
        run: |
          # The prompt library is moving rebar.llm.prompts -> rebar.llm.prompting.prompts
          # (ticket toll-clock-tier); invoke whichever module path this checkout provides so
          # the gate stays green across the move.
          python -m rebar.llm.prompting.prompts regenerate-index 2>/dev/null \
            || python -m rebar.llm.prompts regenerate-index
          if ! git diff --exit-code -- src/rebar/llm/reviewers/index.json; then
            echo "::error::reviewers/index.json is stale — regenerate it with"
            echo "  python -m rebar.llm.prompting.prompts regenerate-index"
            echo "and commit the result (it is derived from the prompt front-matter)."
            exit 1
          fi
          echo "Prompt-index drift gate: OK (index.json is up to date)."

      # Env-var registry drift gate (story 0f21): docs/env-vars.md is DERIVED by scanning
      # env-var reads under src/rebar and committed. Regenerate and fail if the working tree
      # now differs — a stale registry means a new REBAR_* read shipped without regenerating.
      # Style mirrors the Prompt-index drift gate above.
      - name: Env-var registry drift gate
        shell: bash
        run: |
          python scripts/gen_env_registry.py
          if ! git diff --exit-code -- docs/env-vars.md; then
            echo "::error::docs/env-vars.md is stale — regenerate it with"
            echo "  python scripts/gen_env_registry.py"
            echo "and commit the result (it is derived from env-var reads under src/rebar)."
            exit 1
          fi
          echo "Env-var registry drift gate: OK (docs/env-vars.md is up to date)."

      # Docs-index completeness / dead-link gate (ticket f088): every living top-level
      # docs/*.md must be linked from docs/README.md (allowlist: *.local.md), and every
      # relative markdown link that resolves inside docs/ must point at an existing file.
      # Fails the build on an unindexed living doc or a broken docs-internal link.
      - name: Docs-index completeness gate
        shell: bash
        run: |
          python scripts/check_docs_index.py --check
          echo "Docs-index completeness gate: OK (index complete, no broken docs links)."

      # README golden-path gate (ticket 0435): extract the bash block under the README
      # '## Quickstart' heading and RUN those exact lines end-to-end in a throwaway git
      # repo. A wrong command *printed* in the README (e.g. a bad subcommand or a stale
      # hard-coded id) then fails the build — command TEXT rot, not just executability.
      - name: README quickstart golden-path gate
        shell: bash
        run: |
          python scripts/check_readme_quickstart.py

      # CLI-reference drift gate (ticket e866): docs/cli-reference.md is DERIVED from the
      # CLI's own help data (known_subcommands() + the curated intercept table). Regenerate
      # and fail on any diff, so a new/renamed command cannot ship undocumented.
      - name: CLI-reference drift gate
        shell: bash
        run: |
          python scripts/gen_cli_reference.py
          if ! git diff --exit-code -- docs/cli-reference.md; then
            echo "::error::docs/cli-reference.md is stale — regenerate it with"
            echo "  python scripts/gen_cli_reference.py"
            exit 1
          fi
          echo "CLI-reference drift gate: OK (docs/cli-reference.md is up to date)."

      # MCP-reference drift gate (ticket 235a): docs/mcp-reference.md is DERIVED from the
      # MCP server's own registrars (read/llm/write), classified by gate tier. Regenerate
      # and fail on any diff, so a newly-registered MCP tool cannot ship undocumented.
      - name: MCP-reference drift gate
        shell: bash
        run: |
          python scripts/gen_mcp_reference.py
          if ! git diff --exit-code -- docs/mcp-reference.md; then
            echo "::error::docs/mcp-reference.md is stale — regenerate it with"
            echo "  python scripts/gen_mcp_reference.py"
            exit 1
          fi
          echo "MCP-reference drift gate: OK (docs/mcp-reference.md is up to date)."

      # Security-rules freshness gate (epic b744 / WS5; ADR 0012). The vendored security rule
      # subset is pinned for reproducibility; this WARNS (never fails) when the recorded
      # `vendored_at` is older than the quarterly cadence, prompting a deliberate
      # `make vendor-security-rules` refresh PR. Time-based + network-free (an upstream-version
      # diff is the documented follow-on). Warn-only so a lapsed cadence never blocks unrelated PRs.
      - name: Security-rules freshness gate (warn-only)
        shell: bash
        run: python -m rebar.grounding.detectors.security_pin

      # Criteria-routing parity gate (epic 3156): criteria_routing.json is hand-authored
      # (thresholds/applies_at are judgement, no derivation source), so this is a PARITY gate
      # (not a regenerate-and-diff): it fails when the committed routing drifts out of sync
      # with the canonical vocabulary (missing/orphan entry) or carries a malformed entry.
      - name: Criteria-routing parity gate
        shell: bash
        run: |
          if ! python -m rebar.llm.plan_review.registry validate-routing; then
            echo "::error::src/rebar/llm/plan_review/criteria_routing.json is out of parity"
            echo "with CANONICAL_LLM (a missing/orphan/malformed criterion routing entry)."
            exit 1
          fi

      # server.json env-contract drift gate (epic sail-shoe-smear): server.json is the
      # MCP front-door manifest; rebar.mcp_server.MCP_ENV_VARS is the single source of
      # truth for the env gates. This fails when the manifest's advertised env-var set
      # diverges from that canonical list (missing/extra var). Style mirrors the
      # prompt-index / criteria-routing drift gates above.
      - name: server.json env-contract drift gate
        shell: bash
        run: python scripts/check_server_manifest.py

      # Public-types drift gate (story 3a10): src/rebar/types.py is DERIVED from the
      # canonical JSON Schemas (the schema-backed rebar.* return shapes). Regenerate
      # it and fail if the working tree now differs — a stale types.py means a
      # schema changed without the committed TypedDicts being regenerated. Style
      # mirrors the prompt-index drift gate above.
      - name: Public-types drift gate
        shell: bash
        run: |
          python -m rebar.schemas.gen_types
          if ! git diff --exit-code -- src/rebar/types.py; then
            echo "::error::src/rebar/types.py is stale — regenerate it with"
            echo "  python -m rebar.schemas.gen_types"
            echo "and commit the result (it is derived from the canonical JSON Schemas)."
            exit 1
          fi
          echo "Public-types drift gate: OK (types.py is up to date)."

      - name: Run the default suite (Python tiers; excludes integration + external)
        # Pin --basetemp under the runner temp (not /tmp): on long (10-16 min) runs
        # the macOS tmp-cleaner reaps pytest's default /tmp/pytest-of-* basetemp
        # mid-run, producing a spurious FileNotFoundError cascade. -p no:cacheprovider
        # keeps a stale cache from leaking across runs.
        #
        # Coverage is reported (term-missing) and carries a conservative floor
        # (fail_under in [tool.coverage.report], pyproject.toml): the floor sits well
        # below the measured in-process total because several tests run rebar as a
        # subprocess and so don't count toward in-process coverage. It guards against
        # a large regression without pinning the exact number; see docs/coverage.md.
        # Parallelized with pytest-xdist (story 8d36). `-n` is PINNED to the runner's
        # real vCPU count (ubuntu-latest = 4, macos arm = 3), NOT `-n auto` (which
        # over-subscribes on larger local hosts). Coverage combines correctly only
        # because `parallel = true` is set in [tool.coverage.run] (pyproject.toml).
        run: >-
          pytest -m "not integration and not external"
          -n ${{ matrix.os == 'macos-latest' && '3' || '4' }} --dist worksteal
          -q -p no:cacheprovider --durations=25
          --basetemp="${{ runner.temp }}/rebar-basetemp"
          --cov=rebar --cov-report=term-missing:skip-covered

      - name: Run the integration tier (concurrency + reconciler; network-guarded)
        # These need no live services (mocked acli / local git), so they run in CI
        # for cross-process concurrency + reconciler coverage. Live-Jira validation
        # stays a manual probe (bridge-probe / reconcile dry-run).
        # Parallelized (story 8d36) with `--dist loadgroup` so xdist_group-marked
        # tests (the live reconciler E2E) co-locate on one worker and stay serial.
        run: >-
          pytest -m integration
          -n ${{ matrix.os == 'macos-latest' && '3' || '4' }} --dist loadgroup
          -q -p no:cacheprovider --durations=25
          --basetemp="${{ runner.temp }}/rebar-basetemp-int"

  # External-integration tier (tests/external/): live, billable, real-mutation
  # tests (live Jira via the `acli` SUBPROCESS, live LLM calls). This is the ONLY
  # job that:
  #   * sets REBAR_RUN_EXTERNAL=1 (the env opt-in that makes tests/external/ tests
  #     non-inert — see tests/external/conftest.py), AND
  #   * exposes Jira / LLM credentials.
  # The default `test` job above sets NEITHER, so external tests are structurally
  # unable to leak into it (bug 4a48-6dd5-aef3-4c8e).
  #
  # Fork guard: only run on the canonical repo (owner == actor), never on a PR
  # from a fork, so secrets are never exposed to untrusted code. Manual dispatch
  # only — keep live mutations off the every-push/every-PR path.
  external:
    name: external-integration (live Jira + LLM)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.repository_owner == github.actor }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install rebar (editable) + test deps + agents extra
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,agents]'
      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "rebar CI"
          git config --global init.defaultBranch main
      - name: Run the external tier (live; opt-in + credential scoped)
        # REBAR_RUN_EXTERNAL=1 lifts the default skip; each test still self-skips
        # unless its own creds/extra are present. Attach real secrets below by
        # wiring repository/organization secrets to these env keys, e.g.:
        #   JIRA_URL: ${{ secrets.JIRA_URL }}
        #   JIRA_USER: ${{ secrets.JIRA_USER }}
        #   JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        #   ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # (Until secrets are wired, the tests self-skip on absent creds — the job
        # still validates that the tier is reachable only here.)
        env:
          REBAR_RUN_EXTERNAL: "1"
          # JIRA_URL: ${{ secrets.JIRA_URL }}
          # JIRA_USER: ${{ secrets.JIRA_USER }}
          # JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: >-
          pytest -m external -q -p no:cacheprovider
          --basetemp="${{ runner.temp }}/rebar-basetemp-ext"

  # Golden-path on a CLEAN (non-editable) install (ticket 0435): the README quickstart
  # and the full CLI probe run against a WHEEL-installed rebar (`pip install .`), so
  # packaging/entry-point regressions (MANIFEST, package data, console-script
  # registration) — which the editable install in the `test` job cannot catch — fail the
  # build.
  golden-path:
    name: golden-path (clean install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Ensure jq is installed
        run: sudo apt-get update && sudo apt-get install -y jq && jq --version
      - name: Install rebar from a built wheel (clean, non-editable)
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "rebar CI"
          git config --global init.defaultBranch main
      - name: README quickstart golden-path (against the installed rebar)
        run: python scripts/check_readme_quickstart.py

  # Artifact-provenance probe (story 6168). Builds the wheel + sdist the way `python -m
  # build` does (sdist first, then wheel FROM the extracted sdist — a tree with no .git),
  # then runs the same import/CLI/schema probes the release wheel-test/sdist-test jobs run
  # and asserts a non-null baked `_build_info.COMMIT`. This catches the "wheel bakes
  # COMMIT = None" packaging defect in ordinary CI, not only in a release run.
  artifact-probe:
    name: artifact provenance (wheel/sdist probe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Build wheel + sdist (REBAR_BUILD_COMMIT baked)
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python -m pip install --upgrade pip build
          REBAR_BUILD_COMMIT="${GITHUB_SHA::7}" python -m build
      - name: Probe the built wheel (no source tree on the path)
        run: |
          python -m venv /tmp/wheel-probe
          # shellcheck disable=SC1091
          . /tmp/wheel-probe/bin/activate
          pip install dist/*.whl
          python -c "import rebar"
          rebar --help
          rebar-mcp --help
          python -c "import importlib.resources as r, json, rebar; fs=[f for f in r.files('rebar').rglob('*.json')]; assert fs; [json.loads(f.read_text()) for f in fs]"
          python -c "from rebar import _build_info; assert _build_info.COMMIT, 'wheel baked COMMIT is empty/None'"
      - name: Probe install-from-sdist (REBAR_BUILD_COMMIT unset, preserve-existing)
        run: |
          python -m venv /tmp/sdist-probe
          # shellcheck disable=SC1091
          . /tmp/sdist-probe/bin/activate
          unset REBAR_BUILD_COMMIT
          pip install --upgrade pip
          pip install dist/*.tar.gz
