name: test

# Run the full test suite on every push and PR. rebar's safety story leans on
# "the suite catches it", so this is the gate that makes that automatic (ticket
# coily-conch-tag / Rec 3 of the 2026-06-09 architecture review).
#
# Coverage: the Python tiers (unit / scripts / interface) AND every standalone
# bash suite under tests/scripts/test-*.sh, which the test_bash_suites.py collector
# runs under pytest. The integration tier (live Jira / network) and the external
# tier (live LLM providers — tests/external/) are excluded from the default run via
# `-m "not integration and not external"`; the external tier runs separately with
# credentials via the external-integration workflow.

on:
  push:
    branches: ["main"]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install rebar (editable) + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      # GATING: the flake8 "real-bug" smoke set (configured in pyproject
      # [tool.ruff.lint]) — syntax errors + undefined names. This is the gate that
      # catches NameError-on-error-path bugs (e.g. a missing `import urllib` used
      # only inside an `except` clause).
      - name: ruff — real-bug rules (gating)
        run: ruff check src tests

      # ADVISORY: the broader stylistic set (unused imports, etc.). Reported into
      # the job summary as a ratchet view; the step always SUCCEEDS (green) so the
      # pre-existing nits don't show as a perpetual red ✗ that erodes signal —
      # promote a rule to the gating set above once its count reaches zero.
      - name: ruff — full set (advisory, non-gating)
        run: |
          echo "### Advisory ruff (full set) — non-gating ratchet" >> "$GITHUB_STEP_SUMMARY"
          ruff check --select E,F,W,I,UP,B --statistics src tests \
            | tee -a "$GITHUB_STEP_SUMMARY" || true

      # GATING: the pure in-process library core is kept type-clean.
      - name: mypy — library core (gating)
        run: mypy src/rebar/reducer src/rebar/graph src/rebar/_store

      # ADVISORY: the rest of the tree (engine helpers, reconciler) — same
      # green-with-summary treatment as the advisory ruff step above.
      - name: mypy — full tree (advisory, non-gating)
        run: |
          echo "### Advisory mypy (full tree) — non-gating ratchet" >> "$GITHUB_STEP_SUMMARY"
          mypy src/rebar 2>&1 | tail -1 | tee -a "$GITHUB_STEP_SUMMARY" || true

  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # requires-python is >= 3.11 (the reconciler uses enum.StrEnum, new in
        # 3.11), so test the full supported range on Linux. macOS runs only the
        # primary interpreter (runner cost) — its value is the platform-compat
        # coverage (flock/mkdir lock, gtimeout), not the Python rev.
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
        exclude:
          - os: macos-latest
            python-version: "3.11"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # The bash suites shell out to jq (ticket_show's reducer path). Ensure it is
      # present on both runners (platform-compat lessons live in
      # test-ticket-platform-compat.sh).
      - name: Ensure jq is installed
        shell: bash
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            if [ "$RUNNER_OS" = "Linux" ]; then sudo apt-get update && sudo apt-get install -y jq; fi
            if [ "$RUNNER_OS" = "macOS" ]; then brew install jq; fi
          fi
          jq --version

      - name: Install rebar (editable) + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      # Git identity is required by the suites that build throwaway commit stores.
      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "rebar CI"
          git config --global init.defaultBranch main

      # Warn-only module-size report (policy: target 200-500 LOC, soft cap 800;
      # see docs/architecture.md). Informational — never fails the build; it just
      # surfaces files that grew past the cap so new offenders are visible in PRs.
      - name: Module-size report (warn-only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "Files over the 800-LOC soft cap (policy: docs/architecture.md):"
          over=$(find src/rebar -name '*.py' -o -name '*.sh' | grep -v __pycache__ \
            | xargs wc -l 2>/dev/null \
            | awk '$2 != "total" && $1 > 800 { printf "  %5d  %s\n", $1, $2 }' | sort -rn)
          if [ -n "$over" ]; then echo "$over"; else echo "  (none — all units within the soft cap)"; fi

      - name: Run the full suite (Python tiers + bash collector; excludes live-Jira + external)
        # Pin --basetemp under the runner temp (not /tmp): on long (10-16 min) runs
        # the macOS tmp-cleaner reaps pytest's default /tmp/pytest-of-* basetemp
        # mid-run, producing a spurious FileNotFoundError cascade. -p no:cacheprovider
        # keeps a stale cache from leaking across runs.
        #
        # Coverage is reported (term-missing) but NOT gated: the bash suites run
        # rebar as a subprocess so they don't count toward in-process coverage, and
        # a hard floor would be misleading until that's reconciled. The number is
        # surfaced for visibility / ratcheting, not as a pass/fail.
        run: >-
          pytest -m "not integration and not external" -q -p no:cacheprovider
          --basetemp="${{ runner.temp }}/rebar-basetemp"
          --cov=rebar --cov-report=term-missing:skip-covered
