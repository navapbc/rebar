name: mirror-guard

# Ticket a774 (epic b744) — continuous guardian for the Gerrit->GitHub mirror lock.
#
# After the WS7 cutover, GitHub `main` is a read-only mirror that only advances via Gerrit's
# replication deploy key. This scheduled job verifies REPLICATION HEALTH: it FAILS
# (-> GitHub notification) if Gerrit `main` SHA != GitHub `main` SHA, i.e. replication has
# stalled and GitHub `main` has fallen behind/ahead of Gerrit.
#
# It runs `python -m rebar.mirror_guard --replication`. Both reads are cheap and need no
# elevated auth: the Gerrit `main` SHA is read anonymously, and the GitHub `main` SHA is a
# public-repo read (the Actions-native GITHUB_TOKEN is passed only to lift API rate limits).
# So this runs on the default token with no fine-grained PAT.
#
# NOTE: the lock-ruleset-drift check (`--ruleset`) is intentionally NOT run here — it needs
# `administration:read`, which the default GITHUB_TOKEN cannot be granted. Ruleset drift is
# covered out-of-band; this workflow is scoped to replication only.

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes (default-branch version only)
  workflow_dispatch: {}

permissions:
  contents: read # read the GitHub main SHA (public read; token only lifts rate limits)

concurrency:
  group: mirror-guard
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install rebar (core, stdlib-only)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: mirror-guard — replication health (Gerrit vs GitHub main SHA)
        env:
          # Default token only — passed to lift GitHub API rate limits on the public
          # main-SHA read; no elevated scope needed for the replication check.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m rebar.mirror_guard --replication
