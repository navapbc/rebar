name: codeql

# CodeQL static analysis (SAST) for the Python source — the consumer-facing OSS
# security surface (epic sail-shoe-smear, story 95dc). Results upload to the
# repo's Security → Code scanning alerts tab; findings are ALERTS ONLY (no
# auto-fix PRs — GitHub PRs cannot merge here, the tree is Gerrit-gated, so any
# fix lands as an ordinary Gerrit change; see CONTRIBUTING.md §5).
#
# Triggers:
#   - push to main   — post-merge scan of what actually landed (main only ever
#     advances via Gerrit replication, so this is the authoritative gate re-run
#     on the merged tree; feature/** mirror pushes are skipped as redundant).
#   - pull_request   — scans the mirror's PR diffs for surfacing alerts.
#   - schedule       — weekly baseline sweep so newly-published CodeQL queries
#     re-scan an unchanged tree.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly (Mondays 07:17 UTC) — off-peak, avoids the top-of-hour stampede.
    - cron: "17 7 * * 1"

# Least privilege: the analyze job needs security-events: write to upload the
# SARIF results (plan-review advisory #1); everything else stays read-only.
permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL analyze (python)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF to the code-scanning alerts tab
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # security-and-quality broadens the default security-extended pack
          # with maintainability queries; drop to "security-extended" for a
          # tighter, security-only alert set.
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
