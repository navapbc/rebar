# rebar — Jira <-> rebar Reconcile Bridge
#
# Runs the drift-healing reconciler on a ~20-minute cadence to keep the Jira
# project (JIRA_PROJECT) and the local rebar `tickets` store in sync.
#
# This is a TEMPLATE: client projects copy this file verbatim and set the repo
# variables/secrets listed in docs/jira-sync-setup.md. The only project-specific
# inputs are GitHub repo Variables/Secrets — nothing in this file changes.
#
# Single-flight concurrency (cancel-in-progress: false) ensures a running pass
# completes before the next scheduled invocation starts; the reconciler's own
# pass-lock (refs/reconciler/lock, the self-healing ref-lock; ADR 0031) is a second
# guard (exit 3 == "another pass already running", treated as benign here).
#
# Continuous loop (OPT-IN, default OFF): set repo Variable RECONCILE_CONTINUOUS=true
# to have each run re-dispatch the next via workflow_dispatch (the documented
# exception where the default GITHUB_TOKEN *does* create a new run), giving
# ~pass-duration cadence instead of the */20 floor — without shrinking pass scope.
# The */20 schedule stays as a backstop that re-seeds the chain if it ever stops.
# Leave the Variable unset (the TEMPLATE default) and the bridge behaves exactly as
# before: a plain */20 schedule. Enable it ONLY on a public repo or a self-hosted
# runner — hosted runners bill wall-clock for the near-continuous chain.
#
# rebar divergences from DSO's reconcile-bridge (see docs/jira-sync-setup.md
# "Necessary & sufficient"):
#   * invocation is `rebar reconcile --mode <mode>` (== python -m rebar_reconciler)
#   * exit 75 = reschedule (next cron retries), exit 3 = pass-in-flight — both benign
#   * the reconciler writes inbound events as UNCOMMITTED files AND makes its own
#     binding commit but never pushes — so the commit-back step must push whenever
#     the worktree is dirty OR the local tickets branch is ahead of origin.

name: Reconcile Bridge

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Reconciler rollout-safety mode'
        required: false
        default: 'live'
        type: choice
        options:
          - reconcile-check   # read-only diagnostic (no lock, no writes) — safe first run
          - dry-run           # compute mutations, apply none
          - bootstrap-strict
          - bootstrap-throttle
          - live

concurrency:
  group: reconcile-bridge
  cancel-in-progress: false

permissions:
  contents: write   # push reconciler events back to the tickets orphan branch
  actions: write    # re-dispatch this workflow to sustain the continuous loop (opt-in; see RECONCILE_CONTINUOUS)

jobs:
  reconcile:
    name: Run rebar reconciler
    runs-on: ubuntu-latest
    # A one-time initial sync creates one Jira issue per local ticket serially via
    # acli (~4s each), so a first-time bulk cutover of a few hundred tickets needs
    # well over the steady-state budget. 60 is a ceiling, not a duration: incremental
    # passes finish in a few minutes; commit-back only persists on a COMPLETED pass,
    # so the budget must cover a full bulk pass or progress never converges.
    timeout-minutes: 60

    env:
      MODE: ${{ github.event.inputs.mode || 'live' }}
      # NOTE: REBAR_IDENTITY_SIGNING_KEY is exported by the "Materialize the Rebar Bot signing
      # key" step (via $GITHUB_ENV) and is deliberately NOT set here. Job-level `env:` cannot
      # reference ${{ runner.temp }} — the `runner` context is unavailable outside steps, so a
      # job-level entry using it is a parse-time startup failure that produces ZERO jobs (the
      # reconciler never runs). Both rebar-write steps (Run reconciler, Commit reconciler events
      # back) run after Materialize, so they see identity.signing_key without a job-level entry.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: true   # the mounted worktree reuses these creds to push
          # Full history (NOT shallow). A shallow graft defeats git's merge-base
          # computation, so reconciling a compaction (which deletes source event
          # files) against the remote resurrects those files — SNAPSHOT_INCONSISTENT
          # corruption (bug saggy-pupil-plant / f193). The tickets store MUST be
          # reconciled with full history + merge, never shallow + rebase.
          fetch-depth: 0

      - name: Validate Jira configuration
        env:
          JIRA_URL: ${{ vars.JIRA_URL }}
          JIRA_USER: ${{ vars.JIRA_USER }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          set -euo pipefail
          missing=""
          [ -z "${JIRA_URL:-}" ] && missing="$missing JIRA_URL(var)"
          [ -z "${JIRA_USER:-}" ] && missing="$missing JIRA_USER(var)"
          [ -z "${JIRA_API_TOKEN:-}" ] && missing="$missing JIRA_API_TOKEN(secret)"
          if [ -n "$missing" ]; then
            echo "::error::Missing required Jira config:$missing — see docs/jira-sync-setup.md"
            exit 1
          fi

      - name: Mount tickets branch as a worktree
        # The store lives on the `tickets` orphan branch at the repo root. Mount it
        # as .tickets-tracker on the ACTUAL `tickets` branch (not detached) so
        # tracker.branch matches and `rebar fsck` does not WARN on a mismatch.
        run: |
          set -euo pipefail
          # Full fetch (no --depth): a shallow tickets history defeats merge-base and
          # corrupts compaction reconciliation (bug f193). See fetch-depth note above.
          git fetch origin '+tickets:refs/remotes/origin/tickets'
          rm -rf .tickets-tracker
          git worktree add -B tickets .tickets-tracker origin/tickets

      - name: Sync reconciler lock refs (ref-lock backend)
        # The self-healing pass-lock/phase-gate live on refs/reconciler/* (epic
        # dust-troth-naval, ADR 0031), NOT in the tickets tree. Sync them before the
        # pass so acquire sees the authoritative remote state. Best-effort: absent
        # refs (first run / file backend) simply fetch nothing. The reconciler's own
        # acquire/renew/release also force-sync + --force-with-lease on each op.
        run: |
          set -euo pipefail
          git fetch origin '+refs/reconciler/*:refs/reconciler/*' || true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install rebar
        # TEMPLATE NOTE: client projects use `pip install nava-rebar==<pinned>`.
        # This repo IS rebar, so it installs the checked-out source to reconcile
        # against the code on `main`. Reconcile does NOT need the [agents] extra.
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Cache acli binary
        id: cache-acli
        uses: actions/cache@v6
        with:
          path: ~/.acli
          key: acli-${{ runner.os }}-${{ vars.ACLI_VERSION || 'unset' }}

      - name: Download + verify + install acli
        if: steps.cache-acli.outputs.cache-hit != 'true'
        env:
          ACLI_VERSION: ${{ vars.ACLI_VERSION }}
          ACLI_SHA256: ${{ vars.ACLI_SHA256 }}
        run: |
          set -euo pipefail
          if [ -z "${ACLI_VERSION:-}" ] || [ "$ACLI_VERSION" = "latest" ]; then
            echo "::error::ACLI_VERSION repo variable is unset or 'latest'. Pin a specific version (e.g. 1.3.14-stable) and set ACLI_SHA256 to its digest."
            exit 1
          fi
          mkdir -p ~/.acli
          curl -sSL "https://acli.atlassian.com/linux/${ACLI_VERSION}/acli_${ACLI_VERSION}_linux_amd64.tar.gz" -o ~/.acli/acli.tar.gz
          if [ -n "${ACLI_SHA256:-}" ]; then
            echo "${ACLI_SHA256}  $HOME/.acli/acli.tar.gz" | sha256sum -c --strict
          else
            echo "::warning::ACLI_SHA256 unset — proceeding without checksum verification. Set it to: $(sha256sum ~/.acli/acli.tar.gz | awk '{print $1}')"
          fi
          tar xzf ~/.acli/acli.tar.gz -C ~/.acli/ --strip-components=1
          chmod +x ~/.acli/acli
          rm -f ~/.acli/acli.tar.gz
          if [ ! -s "$HOME/.acli/acli" ] || [ ! -x "$HOME/.acli/acli" ]; then
            echo "::error::Extracted acli binary missing, empty, or not executable"
            ls -la ~/.acli/ || true
            exit 1
          fi
          if ! "$HOME/.acli/acli" --version >/dev/null 2>&1; then
            echo "::error::Extracted acli binary failed --version smoke check"
            exit 1
          fi

      - name: Add acli to PATH and authenticate
        env:
          JIRA_URL: ${{ vars.JIRA_URL }}
          JIRA_USER: ${{ vars.JIRA_USER }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          set -euo pipefail
          sudo ln -sf "$HOME/.acli/acli" /usr/local/bin/acli
          echo "$JIRA_API_TOKEN" | acli jira auth login \
            --site "$JIRA_URL" \
            --email "$JIRA_USER" \
            --token

      - name: Configure git identity for the bridge bot
        # --global so every worktree (the checkout, the mounted .tickets-tracker,
        # and any temp worktrees the reconciler's advisory lock creates) inherits
        # it. Without an identity, `git commit` fails exit 128 ("empty ident name")
        # on CI runners.
        env:
          BRIDGE_BOT_NAME: ${{ vars.BRIDGE_BOT_NAME || 'rebar-bridge[bot]' }}
          # Default to the Rebar Bot authorship identity's email (story 9e76) so the inline
          # signing seam's git-email fallback resolves reconciler-authored events to identity
          # 594c-9dcf-5ad6-4e6d. Overridable via the BRIDGE_BOT_EMAIL repo variable.
          BRIDGE_BOT_EMAIL: ${{ vars.BRIDGE_BOT_EMAIL || 'joeoakhart+bot@navapbc.com' }}
        run: |
          set -euo pipefail
          git config --global user.name "${BRIDGE_BOT_NAME}"
          git config --global user.email "${BRIDGE_BOT_EMAIL}"

      - name: Materialize the Rebar Bot signing key
        # Story 9e76: the reconciler's inbound writer now stamps + signs events inline; it
        # signs only when identity.signing_key resolves. Materialize the key to a 0600 file
        # under $RUNNER_TEMP (discarded at job end) and export its path. Unset ⇒ events are
        # written unsigned (verify-identity is advisory until require_authenticated flips on).
        env:
          REBAR_BOT_SIGNING_KEY: ${{ secrets.REBAR_BOT_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${REBAR_BOT_SIGNING_KEY:-}" ]; then
            echo "REBAR_BOT_SIGNING_KEY unset — reconciler writes will be unsigned (advisory)"
            exit 0
          fi
          echo "::add-mask::${REBAR_BOT_SIGNING_KEY}"
          KEYFILE="${RUNNER_TEMP}/rebar-bot-signing-key"
          install -m 600 /dev/null "${KEYFILE}"
          printf '%s\n' "${REBAR_BOT_SIGNING_KEY}" > "${KEYFILE}"
          echo "REBAR_IDENTITY_SIGNING_KEY=${KEYFILE}" >> "${GITHUB_ENV}"
          echo "Materialized bot signing key to ${KEYFILE} (0600)"

      - name: Run reconciler
        # Exit-code contract (src/rebar/_engine/rebar_reconciler/__main__.py):
        #   0  converged
        #   75 reschedule (rebase-retry exhausted) — the next cron run retries
        #   3  another pass already in flight — benign under */20 cadence
        #   *  unrecoverable — fail the job
        env:
          JIRA_URL: ${{ vars.JIRA_URL }}
          JIRA_USER: ${{ vars.JIRA_USER }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT: ${{ vars.JIRA_PROJECT }}
          REBAR_ENV_ID: ${{ vars.REBAR_ENV_ID || 'reconciler' }}
        run: |
          set -uo pipefail
          echo "Reconciling in mode: $MODE"
          set +e
          rebar reconcile --mode "$MODE"
          rc=$?
          set -e
          case "$rc" in
            0)  echo "Reconcile converged." ;;
            75) echo "::notice::Reconcile rescheduled (exit 75) — next scheduled run will retry." ;;
            3)  echo "::notice::Another reconcile pass is in flight (exit 3) — benign, skipping." ;;
            *)  echo "::error::Reconcile failed (exit $rc)"; exit "$rc" ;;
          esac

      - name: Commit reconciler events back and push to origin/tickets
        # rebar-specific: the reconciler leaves inbound events UNCOMMITTED and makes
        # its own binding-store commit WITHOUT pushing. So we (a) commit any dirty
        # state, then (b) push whenever the local tickets branch is ahead of origin
        # — a clean worktree does NOT imply nothing to push.
        env:
          BRIDGE_BOT_NAME: ${{ vars.BRIDGE_BOT_NAME || 'rebar-bridge[bot]' }}
          # Same Rebar Bot authorship email default as the "Configure git identity" step
          # above (story 9e76) — both BRIDGE_BOT_EMAIL fallbacks must agree so the identity
          # resolver sees the bot email on this commit path too.
          BRIDGE_BOT_EMAIL: ${{ vars.BRIDGE_BOT_EMAIL || 'joeoakhart+bot@navapbc.com' }}
        run: |
          set -euo pipefail
          cd .tickets-tracker
          git config user.name "${BRIDGE_BOT_NAME}"
          git config user.email "${BRIDGE_BOT_EMAIL}"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: sync events from rebar reconciler [run ${{ github.run_id }}]"
          fi

          git fetch origin tickets || true
          ahead=$(git rev-list --count origin/tickets..HEAD 2>/dev/null || echo 0)
          if [ "$ahead" -eq 0 ]; then
            echo "Local tickets branch not ahead of origin — nothing to push."
            exit 0
          fi
          echo "Local tickets branch is ahead by $ahead commit(s) — pushing."

          max_retries=5
          attempt=0
          while [ "$attempt" -lt "$max_retries" ]; do
            attempt=$((attempt + 1))
            push_stderr=""
            push_exit=0
            push_stderr=$(git push origin HEAD:tickets 2>&1) || push_exit=$?

            if [ "$push_exit" -eq 0 ]; then
              echo "Push succeeded (attempt $attempt)."
              exit 0
            fi

            if echo "$push_stderr" | grep -qiE 'non-fast-forward|rejected|fetch first'; then
              printf 'Push rejected (attempt %d):\n%s\n' "$attempt" "$push_stderr" >&2
              git fetch origin tickets 2>&1 || echo "Fetch failed — retrying with stale remote" >&2
            else
              echo "Push failed (non-retryable, exit $push_exit): $push_stderr" >&2
              exit 1
            fi

            # Reconcile with MERGE, not rebase. Event files are write-once and
            # union by unique filename, so a merge resolves cleanly; a rebase
            # re-applies this stale worktree over a remote compaction and resurrects
            # the source files it deleted (SNAPSHOT_INCONSISTENT, bug f193). This
            # mirrors the local client path (_store/push.py) and invariant I1
            # (docs/concurrency.md: "merge unions cleanly, rebase conflicts").
            if ! git merge --no-edit origin/tickets 2>&1; then
              git merge --abort 2>/dev/null || true
              echo "Merge conflict during push retry (attempt $attempt)" >&2
              exit 1
            fi

            if [ "$attempt" -lt "$max_retries" ]; then
              backoff=$(( (1 << attempt) + RANDOM % 3 ))
              echo "Waiting ${backoff}s before retry $((attempt + 1))..." >&2
              sleep "$backoff"
            fi
          done

          echo "Push failed after $max_retries retries. Last stderr: $push_stderr" >&2
          exit 1

      - name: Notify on bridge failure
        if: failure()
        env:
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## :rotating_light: Reconcile Bridge run FAILED"
            echo ""
            echo "- **Workflow:** \`${{ github.workflow }}\`"
            echo "- **Run:** $GH_RUN_URL"
            echo "- **Mode:** \`${MODE}\`"
            echo "- **Triggered by:** \`${{ github.event_name }}\`"
            echo ""
            echo "The Reconciler Heartbeat Canary will open a bug ticket if this stays stale."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error title=Reconcile Bridge failed::See run summary — $GH_RUN_URL"

      - name: Re-dispatch to sustain the continuous loop (opt-in)
        # Self-rescheduling chain: queue the next run via workflow_dispatch, which
        # is the documented exception where the default GITHUB_TOKEN *does* create a
        # new run (GitHub changelog 2022-09-08). Needs `actions: write` (declared
        # above). The concurrency group + the reconciler pass-lock keep at most one
        # pass running and one queued, so a long full pass is never interrupted and
        # the chain cannot fan out.
        #
        # Gated on RECONCILE_CONTINUOUS so the template default (Variable unset) keeps
        # the plain */20 schedule — clients on private repos are unaffected.
        #
        # if: !cancelled() — a FAILED pass still re-seeds the chain (resilience),
        # while CANCELLING a run is a clean kill switch. Flipping the Variable off
        # also stops the chain after the next run completes.
        if: ${{ !cancelled() && vars.RECONCILE_CONTINUOUS == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "RECONCILE_CONTINUOUS=true — re-dispatching to sustain the loop (mode=${MODE})."
          gh workflow run reconcile-bridge.yml --ref "${{ github.ref_name }}" --field mode="${MODE}"
