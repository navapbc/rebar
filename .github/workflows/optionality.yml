name: optionality

# Enforce that rebar's runtime stays LEAN (epic a88f / WS-J3). Extras can only ADD
# dependencies, so without CI the base silently grows heavy. The checks themselves live
# in the reusable ._optionality.yml (workflow_call) so the SAME job definitions run here
# (push / pull_request) AND in the Verified gate (gerrit-verify.yaml, on the patchset) —
# no drift. This lane checks out the branch head (no gerrit-refspec) and casts no vote;
# gerrit-verify is the sole Verified source (see fern-belief-gap).

on:
  push:
    # every branch EXCEPT the S3-replicated feature/** (redundant mirror CI).
    branches-ignore: ["feature/**"]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  optionality:
    # No inputs → the reusable workflow does a branch-head actions/checkout.
    uses: ./.github/workflows/_optionality.yml
