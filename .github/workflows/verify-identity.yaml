name: verify-identity

# Authenticated-authorship merge-gate (epic gnu-whale-ichor, AC7). Re-verifies every
# in-scope mutating event's signature against its author identity's commit-ancestry-scoped
# keyring, so a forged / unsigned / wrong-key event cannot land on `main`.
#
# Enforcement follows PROJECT CONFIG, not a CI-forced flag: the gate enforces (non-zero
# exit on any unverified in-scope event) only when `identity.require_authenticated` is on
# in rebar.toml, and is advisory (exit 0, report-only) otherwise. The grandfather boundary
# is `identity.enforce_since` in rebar.toml — events introduced up to that ref are
# reported but never fail the gate. This lets the gate go live report-only today (nothing
# is signed yet) and become blocking the moment write-signing is rolled out and the config
# flag is flipped, with all pre-rollout events already grandfathered.

# CI-trigger audit (op-cert lane, story 4214): every on: trigger is classified so no
# merge path silently skips the gate.
#   push              — INCLUDED (branches-ignore feature/**; NO_FILTER on main — no paths filter)
#   pull_request      — INCLUDED (NO_FILTER: no paths filter, so every PR runs the gate)
#   workflow_dispatch — INCLUDED (manual)
on:
  push:
    branches-ignore: ["feature/**"]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify-identity:
    name: verify-identity (authenticated-authorship gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install rebar
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Mount tickets branch as a worktree
        # The store lives on the `tickets` orphan branch at the repo root, materialized
        # as the gitignored `.tickets-tracker` worktree. A plain code checkout does not
        # contain it, so verify-identity would exit 2 ("ticket store not found").
        # Mount it on the ACTUAL `tickets` branch (not detached) so tracker.branch
        # matches. Full fetch (no --depth) so merge-base / commit-ancestry scoping works
        # against the whole tickets history. Mirrors reconcile-bridge.yml.
        run: |
          set -euo pipefail
          git fetch origin '+tickets:refs/remotes/origin/tickets'
          rm -rf .tickets-tracker
          git worktree add -B tickets .tickets-tracker origin/tickets
      - name: verify-identity (gating)
        # No --require-authenticated / --since flags: enforcement posture and the
        # grandfather boundary are read from rebar.toml (`identity.require_authenticated`,
        # `identity.enforce_since`). See the header comment.
        run: rebar verify-identity
      - name: verify-opcert (required-environment op-cert gate)
        # Same merged-log walk; posture + grandfather boundary from rebar.toml
        # (verify.require_environment, verify.opcert_enforce_since) — no CI variable.
        run: rebar verify-opcert
