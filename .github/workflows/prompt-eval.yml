name: Prompt Eval

# Prompt evaluation gating (epic a88f / WS-G; live tier wired by epic 6f2d / WS-EVAL).
# Two tiers, the community-standard split:
#   * OFFLINE (every PR/push) — the eval DISCIPLINE is enforced with NO model/credentials:
#     spec validity (incl. STRICT: registered scorers + balanced dataset + gold_set for
#     specs that ship a dataset), grader discipline (pinned cross-family judge, temp 0,
#     seed, snapshot), at_least(k) over explicit epochs, coverage, kappa/JUnit, the
#     scorer registry, and the eval solver/run_eval aggregation — all via the unit tests.
#     This is the only REQUIRED check and costs nothing.
#   * LIVE (gated; needs the [agents,eval] extras + credentials) — actually runs each
#     dataset-bearing spec through run_eval (the reviewer's real op via the eval solver),
#     emits JUnit, and reports pass/coverage. Deliberately OFF the PR critical path
#     (manual dispatch + a weekly schedule), NON-BLOCKING (continue-on-error), and
#     fork-safe (same-repo only) so PRs/forks/Dependabot never spend tokens. Provider
#     spend caps belong at the Anthropic/OpenAI dashboard (CI has no native $ cap).

on:
  push:
    # every branch EXCEPT the S3-replicated feature/** (redundant mirror CI; casts no
    # Verified vote — gerrit-verify is the sole Verified source; see fern-belief-gap).
    branches-ignore: ["feature/**"]
  pull_request: {}
  workflow_dispatch: {}
  schedule:
    - cron: "0 7 * * 1"  # Mondays 07:00 UTC — weekly drift detector for the live tier

permissions:
  contents: read

# Rapid pushes shouldn't fan out concurrent (paid, on the live tier) runs.
concurrency:
  group: prompt-eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval-discipline:
    # The job body now lives in the reusable _eval-discipline.yml (workflow_call), shared
    # verbatim with gerrit-verify.yaml (the Verified gate) so the eval-discipline gate runs
    # on BOTH lanes and cannot drift (jira-reb-1163 — it previously ran on THIS mirror lane
    # only, so a breaking change earned Verified +1 yet reddened main). No inputs => the
    # reusable checks out the branch head; gerrit-verify passes the Gerrit patchset refspec.
    # Skip the redundant push run for PR branches (pull_request already covers them);
    # schedule has nothing to add to the offline tier.
    if: ${{ github.event_name != 'schedule' }}
    uses: ./.github/workflows/_eval-discipline.yml

  eval-live:
    name: eval live (gated — needs [agents,eval] + credentials)
    # Manual dispatch or the weekly schedule ONLY, and only on the canonical repo —
    # forks/Dependabot get no secrets and must never reach this job.
    if: >-
      ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
          && github.repository == 'navapbc/rebar' }}
    runs-on: ubuntu-latest
    continue-on-error: true  # advisory: a live regression reports, it does not block
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          # pip caching is now the setup-python built-in (keyed on pyproject.toml),
          # replacing the previous manual `actions/cache@v4` step here (task bad4).
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install with the agents + eval extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[agents,eval]'
      - name: Run dataset-bearing prompt evals (live) → JUnit
        # Cost rails: cases run SEQUENTIALLY (run_eval has no model fan-out) under the
        # workflow-level concurrency cap, and REBAR_EVAL_MAX_CASES caps cases per spec
        # per run. Hard dollar caps live at the provider dashboard (CI has none).
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REBAR_EVAL_MAX_CASES: "12"
          # Durable token-usage record for this billable job (rebar.llm.usage_log). The
          # runner appends one JSONL line per LLM call; the next step summarizes it into
          # the job summary and uploads the raw file. Step-level so ${{ runner.temp }} is
          # in scope — a JOB-level env entry using runner.* is a parse-time startup
          # failure (Bug 8002; see tests/unit/test_ci_actionlint_scope.py).
          REBAR_USAGE_LOG: ${{ runner.temp }}/usage.jsonl
        run: |
          python - <<'PY'
          import glob, os
          from pathlib import Path
          import yaml
          from rebar.llm.evals import eval as ev
          cap = int(os.environ.get("REBAR_EVAL_MAX_CASES", "0")) or None
          out = Path("eval-junit"); out.mkdir(exist_ok=True)
          summary, failed = [], []
          for p in sorted(glob.glob("src/rebar/llm/eval_specs/*.eval.yaml")):
              spec = yaml.safe_load(Path(p).read_text())
              if not spec.get("dataset"):
                  continue  # gold-only spec — nothing to run live
              pid = spec["prompt"]
              res = ev.run_eval(pid, max_cases=cap)
              (out / f"{pid}.xml").write_text(res["junit"])
              summary.append(f"{pid}: {'PASS' if res['passed'] else 'FAIL'} (coverage {res['coverage']:.2f})")
              if not res["passed"]:
                  failed.append(pid)
          print("\n".join(summary) or "no dataset-bearing specs")
          if failed:
              print(f"::warning::live eval regressions (advisory): {failed}")
          PY
      - name: Summarize LLM token usage → job summary
        if: ${{ always() }}
        env:
          REBAR_USAGE_LOG: ${{ runner.temp }}/usage.jsonl
        run: |
          python -m rebar.llm.usage_log summarize "$REBAR_USAGE_LOG" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload LLM token-usage log
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: eval-usage-log
          path: ${{ runner.temp }}/usage.jsonl
          if-no-files-found: ignore
      - name: Upload eval JUnit
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: eval-junit
          path: eval-junit/
          if-no-files-found: ignore
