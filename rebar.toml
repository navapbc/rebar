# rebar project configuration (tracked/shared — the per-project `rebar.toml`,
# preferred by config discovery over the git-ignored `.rebar/config.conf`).
# See docs/llm-framework.md and AGENTS.md for the close gate + LLM module.

[verify]
# Run the LLM completion-verifier when a client closes a work ticket: a FAIL verdict
# (or an unavailable LLM) blocks the close (fail-closed); on PASS the verdict is signed
# onto the ticket. `--force-close="<reason>"` closes without verifying or signing, so a
# closed-without-signature ticket is the durable signal that validation did not pass.
# This is an ALTERNATIVE to require_signature_for_close (do not enable both).
# Requires the `nava-rebar[agents]` extra + a model API key (e.g. ANTHROPIC_API_KEY).
require_completion_verification_for_close = true

# Plan-review claim gate (epic 5fd2): claiming a work ticket (open->in_progress)
# requires a fresh, certified plan-review attestation — run `rebar review-plan <id>`
# to earn one. Absent/stale/material-edited signatures BLOCK the claim; `--force`
# bypasses with an audit comment. A FAST local HMAC check only (no LLM on the claim
# path); the heavy three-pass review runs out-of-band. Bugs/session_logs are exempt.
# Independent of the close gates (this gates CLAIM, they gate CLOSE). See
# docs/plan-review-gate.md. Turning this off is the rollback.
require_plan_review_for_claim = true

# Store-wide cross-ticket overlap detection (epic only-crave-art, ADR 0037): when on,
# plan-review runs an advisory two-stage retrieve-then-rerank pass (BM25F candidate
# generation with graph exclusion → bounded LLM pairwise judge over enrichment digests)
# and surfaces `overlap[]` suggestions on the verdict. Advisory only — it NEVER blocks a
# claim or close. Ships gated OFF by default; turned on here (rebar-ticket ade2-8c73-e010-491d).
# Also activates the opportunistic enrichment drain on ticket write paths; scope that to
# plan-review only with `[tool.rebar.llm] overlap_drain = "off"`. Rollback: set this to false.
overlap_enabled = true

# Commit-ticket gate (docs/commit-ticket-trailer.md): the CI `require-ticket` job (the
# Gerrit Verified leg) requires every commit to `main` to reference a rebar ticket that
# RESOLVES in the store — via a `rebar-ticket: <id>` trailer (or a leading `<id>:`), any of
# alias / full id / short id / Jira key. Setting this to false is the rollback (the CI job
# then no-ops). Enforced by `.github/workflows/gerrit-verify.yaml`.
require_ticket_for_commit = true

# Pass-3 completion floor (epic 66ac / story 6533; dogfooded here per story c366). On a
# re-fired epic/story-with-children plan-review, an advisory finding is DROPPED iff its
# completion sub-answers say it is fully about DELIVERED, settled plan text (attribution =
# delivered-now child AND containment = limited-to-closed AND layer = plan-semantics) AND
# its priority is below `completion_priority_floor` AND none of `completion_preserve_criteria`
# are flipped. Advisory-only, container-only, fail-safe-to-keep — it can NEVER change a
# PASS/BLOCK verdict, and every drop is recoverable from the plan-review sidecar `dropped[]`
# (tagged `drop_reason="completion"`; see docs/calibration/completion_floor.md "Monitoring").
# Calibrated before flip: gold-set 30/30 floor decisions correct, κ=1.0, zero must-never-
# suppress anchors dropped. The schema default stays False for other clients; this is a
# per-project opt-in. Rollback is cheap and needs no data cleanup: set this back to false.
completion_floor_active = true

[ticket]
# Default assignee `claim` uses when no --assignee is given (story c36c). Applied at
# CLAIM time (not at ticket create). Use a Jira-RESOLVABLE identity (email/accountId),
# not a bare handle, so it survives reconcile (a bare ambiguous handle is left
# unassigned — bug 544e). Override per-checkout with the env var REBAR_DEFAULT_ASSIGNEE.
default_assignee = "joeoakhart@navapbc.com"

[mcp]
# Enable the LLM agent operations over the MCP server (review_ticket / review_code /
# scan_spec / verify_completion). They make live, billable LLM calls.
allow_llm = true

[jira]
# Jira reconciliation target (Atlassian-standard, UNPREFIXED env overrides).
# The SECRET `JIRA_API_TOKEN` is env-only — never a config key (see docs/config.md).
url     = "https://navasage.atlassian.net"   # env JIRA_URL
user    = "joeoakhart@navapbc.com"           # env JIRA_USER
project = "REB"                              # env JIRA_PROJECT; the "Rebar" project

# [reconciler]: the convergence-rollout flags baseline_dual_write /
# baseline_consumer_swap were retired (story d6bd) — the per-binding baseline is
# now ALWAYS dual-written and ALWAYS consumed as the outbound field differ's
# arbitration ancestor (ADR 0026). No reconciler keys remain to configure here.

[identity]

# Authenticated-authorship merge-gate (epic gnu-whale-ichor, AC7). The CI workflow
# `.github/workflows/verify-identity.yaml` runs `rebar verify-identity` with NO forced
# flags, so its enforcement posture and grandfather boundary come from HERE.
#
# require_authenticated: ENFORCEMENT ON (epic dc09 / pristine-horrible-whapuku, story 8d39).
# Write-signing is rolled out across ALL writers — local (identity.signing_key), CI
# (reconcile-bridge REBAR_BOT_SIGNING_KEY), and Gerrit-side (review-bot) all produce signed,
# `verified` events; the transactional write path signs too (bug 0ba4). Confirmed by the
# pre-flip validation: no active process writes unsigned non-SNAPSHOT in-scope events. With
# this ON the merge-gate FAILS on any ENFORCED in-scope event that is not `verified`, so a
# forged / unsigned / wrong-key write cannot land on `main`. Rollback = set back to `false` in
# a single Gerrit change (no data cleanup). Env override: REBAR_IDENTITY_REQUIRE_AUTHENTICATED.
require_authenticated = true

# Grandfather boundary — a git ref on the `tickets` tracker branch. Only events whose
# introducing commit is this ref or a descendant are ENFORCED; everything at/before it is
# reported but never fails the gate. Pinned to the tracker HEAD at the rollout-prep point
# so that when require_authenticated is flipped on, all pre-signing historical events are
# grandfathered and only newly-signed writes are enforced. Pinned (story 8d91) to the
# enforcement-cutover marker: an existing gate-exempt session_log commit chosen AFTER the
# pre-flip validation confirmed every active writer signs, so ALL pre-signing historical +
# mixed-build unsigned events are grandfathered. Env override: REBAR_IDENTITY_ENFORCE_SINCE.
enforce_since = "8dcef776c3dd9e68935b74b82137e1ffd8f04f10"
