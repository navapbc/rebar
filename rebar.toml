# rebar project configuration (tracked/shared — the per-project `rebar.toml`,
# preferred by config discovery over the git-ignored `.rebar/config.conf`).
# See docs/llm-framework.md and CLAUDE.md for the close gate + LLM module.

[verify]
# Run the LLM completion-verifier when a client closes a work ticket: a FAIL verdict
# (or an unavailable LLM) blocks the close (fail-closed); on PASS the verdict is signed
# onto the ticket. `--force-close="<reason>"` closes without verifying or signing, so a
# closed-without-signature ticket is the durable signal that validation did not pass.
# This is an ALTERNATIVE to require_signature_for_close (do not enable both).
# Requires the `nava-rebar[agents]` extra + a model API key (e.g. ANTHROPIC_API_KEY).
require_completion_verification_for_close = true

# Plan-review claim gate (epic 5fd2): claiming a work ticket (open->in_progress)
# requires a fresh, certified plan-review attestation — run `rebar review-plan <id>`
# to earn one. Absent/stale/material-edited signatures BLOCK the claim; `--force`
# bypasses with an audit comment. A FAST local HMAC check only (no LLM on the claim
# path); the heavy three-pass review runs out-of-band. Bugs/session_logs are exempt.
# Independent of the close gates (this gates CLAIM, they gate CLOSE). See
# docs/plan-review-gate.md. Turning this off is the rollback.
require_plan_review_for_claim = true

[mcp]
# Enable the LLM agent operations over the MCP server (review_ticket / review_code /
# scan_spec / verify_completion). They make live, billable LLM calls.
allow_llm = true
