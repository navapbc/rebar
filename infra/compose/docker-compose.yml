# ---------------------------------------------------------------------------
# rebar Gerrit + review-bot compose stack (epic d251 / story S2).
#
# Runs the two containers on the AL2023 arm64 box: Gerrit (the code-review server)
# and the rebar review-bot (the FastAPI webhook receiver). nginx is NOT in this
# stack — it runs as a HOST package (dnf nginx + host certbot) and proxies to the
# published container ports (see infra/nginx/rebar.conf.template and
# infra/scripts/install-certbot-timer.sh, and ADR-0007).
#
# Secrets come from infra/compose/.env, regenerated each boot from SSM by
# infra/scripts/fetch-secrets.sh (ADR-0008). Compose auto-loads a sibling `.env`.
#
# PERSISTENCE MODEL (important): the official `gerritcodereview/gerrit` image runs
# the server from the baked site at `/var/gerrit` (`-d /var/gerrit`) and IGNORES a
# GERRIT_SITE override. Mounting one volume over the whole `/var/gerrit` would hide
# the baked binaries (bin/, lib/, gerrit.war). So we persist only the STATEFUL
# SUBDIRECTORIES by bind-mounting them from the EBS-backed host path
# `/var/gerrit/site/*` into the container's `/var/gerrit/*`. Bind mounts onto the
# persistent EBS mount are inherently safe from `docker compose down -v` (which only
# removes named volumes), satisfying the "data survives down -v" requirement, and
# they ride the EBS data volume's DLM daily snapshots (S7). compose-up.sh seeds
# `site/etc/gerrit.config` (and copies the baked plugins) before first boot.
# ---------------------------------------------------------------------------

services:
  # --- Gerrit code-review server -------------------------------------------
  gerrit:
    # Extends gerritcodereview/gerrit:3.14.1 with Python + gerrit-to-platform so the
    # `hooks` plugin can exec the g2p CI hooks in-container (epic 1fa8 / ADR-0022).
    # The base image still publishes arm64; the added apt/pip layers are arch-neutral.
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.gerrit
    restart: unless-stopped
    ports:
      # 8080: Gerrit HTTP — published to host loopback so the HOST nginx (TLS
      # terminator) proxies to 127.0.0.1:8080; NOT directly internet-exposed.
      - "127.0.0.1:8080:8080"
      # 29418: Gerrit SSH (git-over-SSH) — exposed directly (SG opens 29418).
      - "29418:29418"
    volumes:
      # Persist the stateful site subdirs via EXTERNAL named volumes (declared
      # external: true below; created out-of-band by compose-up.sh as local `bind`
      # volumes onto the EBS-backed host path /var/gerrit/site/*). external:true means
      # `docker compose down -v` will NOT destroy them. Only the STATEFUL subdirs are
      # mounted, so the image's baked binaries (bin, lib, gerrit.war) are NOT shadowed.
      - gerrit_git:/var/gerrit/git
      - gerrit_index:/var/gerrit/index
      - gerrit_cache:/var/gerrit/cache
      - gerrit_db:/var/gerrit/db
      - gerrit_etc:/var/gerrit/etc
      - gerrit_logs:/var/gerrit/logs
      - gerrit_plugins:/var/gerrit/plugins
      # S5 replication: the GitHub deploy key + known_hosts + ssh config live in
      # the gerrit user's ~/.ssh (HOME=/var/gerrit -> /var/gerrit/.ssh). A DIRECT
      # host bind mount (not an external named volume) onto /var/gerrit/site/dotssh,
      # which infra/gerrit/materialize-deploy-key.sh populates (as uid 1000) from
      # SSM BEFORE Gerrit starts. The replication plugin's `git push` reads this
      # dir to authenticate to github.com:navapbc/rebar.
      - /var/gerrit/site/dotssh:/var/gerrit/.ssh
      # epic 1fa8 (S3): gerrit-to-platform config + GitHub PAT, materialised from SSM
      # by infra/gerrit/materialize-g2p-config.sh BEFORE boot (like the deploy key
      # above). g2p (in-container) reads gerrit_to_platform.ini + replication.config here.
      - /var/gerrit/site/g2p-config:/var/gerrit/.config/gerrit_to_platform
    environment:
      # Public HTTPS origin (nginx-terminated). The entrypoint writes this into
      # etc/gerrit.config; it mirrors the canonicalWebUrl we pre-seed there.
      CANONICAL_WEB_URL: https://rebar.solutions.navateam.com/
    # Ship container stdout/stderr to the host journal (journald), per the S2
    # observability AC; `journalctl CONTAINER_NAME=compose-gerrit-1` then works.
    logging:
      driver: journald

  # --- rebar review-bot webhook receiver -----------------------------------
  review-bot:
    build:
      # Build context is the REPO ROOT so `pip install .` sees the whole package.
      context: ../..
      dockerfile: infra/compose/Dockerfile.reviewbot
    restart: unless-stopped
    # Give the graceful in-memory-queue drain (app.py lifespan) time to finish before Docker
    # escalates SIGTERM → SIGKILL on a redeploy/restart, so acknowledged (202) webhooks are not
    # abandoned. Must exceed SHUTDOWN_DRAIN_SECONDS (default 45s). Default would be 10s (SIGKILL
    # mid-drain). Anything not drained in the window still falls to the backfill reconciler.
    stop_grace_period: 60s
    env_file:
      - .env
    environment:
      # Data capture (story limestone-unethical-zebrafinch): auto-push every code_review artifact
      # ticket event to origin/tickets as it is written. The push credential is a URL-scoped git
      # credential helper materialized by the entrypoint from REVIEWBOT_TICKETS_PAT (see .env /
      # fetch-secrets.sh); the persistent tickets worktree below is its store.
      REBAR_SYNC_PUSH: "always"
      # Point rebar's ambient tickets store (config.tracker_dir, read by the reviewbot's
      # create_ticket/link/emit calls that pass repo_root=None) at the PERSISTENT tickets worktree,
      # NOT the container's /app cwd — so artifact writes land in the pushable clone.
      REBAR_TRACKER_DIR: "/var/gerrit/site/reviewbot-tickets"
      # Trust the persistent tickets volume for git. The container runs as root (no USER in
      # Dockerfile.reviewbot) but that named volume is owned uid 1000 (a legacy population that
      # survives rebuilds), so git's dubious-ownership guard (>=2.35.2) refused EVERY op on it —
      # the ensure-tickets convergence AND rebar's runtime `git commit` in emit_code_review_artifact
      # — making 100% of code_review artifact emissions fail (ARTIFACT_EMIT_ERROR). safe.directory
      # is only honored from command-line/system/global config (never repo-local), so inject it via
      # GIT_CONFIG_* — equivalent to `git -c safe.directory=...` (confirmed to resolve the guard on
      # the box), HOME-independent (HOME is unset here), applied to every git process from startup.
      # Keep the path in sync with REBAR_TRACKER_DIR above.
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: "safe.directory"
      GIT_CONFIG_VALUE_0: "/var/gerrit/site/reviewbot-tickets"
    ports:
      # Publish on host loopback for the HOST nginx /review/ proxy. Host port is
      # single-sourced from .env (REVIEW_BOT_PORT, default 8000); container port
      # is fixed at 8000 (uvicorn --port in the Dockerfile).
      - "127.0.0.1:${REVIEW_BOT_PORT:-8000}:8000"
    volumes:
      # Persist the dedup ledger + reconcile cursor across container recreation. Auto-deploy
      # rebuilds this container on every deploy; without a volume the reconcile cursor resets
      # to empty each time, forcing a full events-log re-scan on every deploy (the bug c943
      # amplifier). Bind onto the EBS host path like the gerrit_* site volumes; the external
      # volume is created by compose-up.sh (and pre-provisioned on the host). The review-bot
      # image runs as root, so the root-owned host dir is writable.
      - gerrit_reviewbot:/var/gerrit/site/reviewbot
      # Persistent tickets worktree (story limestone-unethical-zebrafinch): a durable clone of the
      # `tickets` branch that survives container recreation, so the reviewbot's code_review artifact
      # writes accumulate + auto-push (REBAR_SYNC_PUSH=always) instead of living in an ephemeral
      # /tmp dir. Materialized once by the entrypoint (see Dockerfile.reviewbot).
      - gerrit_reviewbot_tickets:/var/gerrit/site/reviewbot-tickets
    # REBAR_MCP_ALLOW_LLM deliberately NOT set (gates only the stdio MCP server;
    # the receiver calls the rebar.llm library directly — S4b).
    logging:
      driver: journald

  # --- trusted op-cert gate service (story 76d2) ---------------------------
  # The FastAPI gate service (infra/compose/Dockerfile.opcert / rebar.opcert_service.app).
  # Reached ONLY through the SigV4-authenticated API Gateway -> HOST nginx /opcert/ (which
  # enforces the X-Opcert-Guard origin guard) -> this container's loopback-published port.
  # It fetches authoritative state itself and NEVER pushes (REBAR_SYNC_PUSH=off), so a gate's
  # SIGNATURE append lands only in the discarded per-job workspace.
  opcert:
    build:
      # Build context is the REPO ROOT so `pip install .` sees the whole package.
      context: ../..
      dockerfile: infra/compose/Dockerfile.opcert
    restart: unless-stopped
    # ANTHROPIC_API_KEY (the gate's LLM ops) + REBAR_OPCERT_GUARD (appended by
    # infra/scripts/materialize-opcert-guard.sh, the SSM-materialized origin guard) come
    # from the regenerated .env.
    env_file:
      - .env
    environment:
      # The environment's identity (the DSSE principal / SSHSIG key id). MUST equal the
      # env_id pinned in .rebar/trusted_environments.yaml. Operator overrides at deploy.
      REBAR_OPCERT_ENV_ID: "${REBAR_OPCERT_ENV_ID:-9f1c8e42-7a3b-4d5e-b6c1-2f0a9d8e7c65}"
      # The SSM SecureString holding the passphrase-free Ed25519 op-cert PRIVATE key. The
      # worker fetches + materializes it per-job to a 0600 temp file (rebar.opcert_service.keyprov).
      REBAR_OPCERT_SSM_KEY_PARAM: "/rebar/prod/opcert-ed25519-key"
      # boto3 (the SSM key fetch) needs a region; the instance profile supplies the credentials
      # via IMDS, but the region is not auto-discovered inside the container -> set it explicitly
      # (else the job fails "You must specify a region").
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
      # Authoritative-state sources the worker fetches ITSELF (never trusts the client): the
      # review remote's `main` tip becomes the signed merged_log_commit; the tickets branch is
      # mounted read-only as a rebar tracker worktree.
      REBAR_OPCERT_REVIEW_REMOTE_URL: "${REBAR_OPCERT_REVIEW_REMOTE_URL:-https://github.com/navapbc/rebar.git}"
      REBAR_OPCERT_TICKETS_REMOTE_URL: "${REBAR_OPCERT_TICKETS_REMOTE_URL:-https://github.com/navapbc/rebar.git}"
      REBAR_OPCERT_REVIEW_BRANCH: "main"
      # STORE-READ-ONLY: never push a gate write to the shared tickets branch.
      REBAR_SYNC_PUSH: "off"
    ports:
      # Publish on host loopback for the HOST nginx /opcert/ proxy. Host port 8090 (Gerrit
      # owns 8080, review-bot owns REVIEW_BOT_PORT); container port is fixed 8080 (uvicorn).
      - "127.0.0.1:8090:8080"
    logging:
      driver: journald

# External named volumes for the stateful Gerrit site subdirs. Declared external:true
# so `docker compose down -v` does NOT destroy them. compose-up.sh creates each one
# (idempotently) as a local `bind` volume onto /var/gerrit/site/<subdir> on the EBS
# data volume BEFORE `docker compose up`. (Per-subdir, not one volume over the whole
# /var/gerrit, so the image's baked binaries are not shadowed.)
volumes:
  gerrit_git:
    external: true
  gerrit_index:
    external: true
  gerrit_cache:
    external: true
  gerrit_db:
    external: true
  gerrit_etc:
    external: true
  gerrit_logs:
    external: true
  gerrit_plugins:
    external: true
  # rebar review-bot state (dedup ledger + reconcile cursor) — bind onto
  # /var/gerrit/site/reviewbot; created by compose-up.sh alongside the gerrit_* volumes.
  gerrit_reviewbot:
    external: true
  # /var/gerrit/site/reviewbot-tickets — the persistent tickets worktree for code_review artifacts
  # (story limestone-unethical-zebrafinch); created by compose-up.sh alongside the others.
  gerrit_reviewbot_tickets:
    external: true
