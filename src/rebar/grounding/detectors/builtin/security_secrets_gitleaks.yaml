# rebar built-in SENTINEL detector — secrets via gitleaks (epic b744 / WS5).
#
# gitleaks has rules COMPILED INTO the binary (TOML, no per-rule YAML to point a matcher at), so
# this is a SENTINEL descriptor, NOT a matcher rule: it has no `rules:`/`rule:` body. Its presence
# registers ONE Detector on the `sarif` backend, so Engine B's registry-driven dispatch routes to
# the `_run_sarif` runner (which subprocess-invokes `gitleaks detect --report-format sarif` and
# ingests the SARIF). No language is declared, so it always applies (the secrets scan is
# repo-wide; the code-review gate diff-scopes the findings as a post-filter).
#
# Fail-OPEN here (gitleaks absent/errored -> abstain(no_tool)); the code-review gate's verdict
# assembly turns a `secret-detection` abstain into a fail-CLOSED BLOCK. The id prefix
# `rebar.builtin.security.` is how the gate identifies the secrets/security detectors.
id: rebar.builtin.security.secrets-gitleaks
metadata:
  rebar_envelope:
    tier: T1
    job: smell
    namespace: builtin
    dimension: smell_generic
    backend: sarif
