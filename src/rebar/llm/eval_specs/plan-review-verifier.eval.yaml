# Standing eval spec for the plan-review Pass-2 VERIFIER (epic 5fd2 / child acc1 + 7284).
# The DISCRIMINATION proving check: a labeled set of {true finding, planted FALSE
# finding}; Pass-2 must return `no`/`insufficient` (or LOWER graded validity) on the
# false ones while leaving true findings standing — so the verifier DISCRIMINATES and
# does not rubber-stamp. Distinct from the per-criterion finder cases. Also measures the
# INVERSE (sycophancy) axis: the verifier must not charitably PASS a real defect.
# Validate offline: `rebar prompt eval plan-review-verifier`.
prompt: plan-review-verifier
model: anthropic:claude-opus-4-8
epochs: 3
gate: at_least(2)
coverage_threshold: 0.8

scorers:
  - type: deterministic
    name: emits_valid_verification
    description: The output validates against the plan_review_verification contract.
  - type: deterministic
    name: discriminates_true_from_false
    description: >
      For each {true, planted-false} pair, the planted-false finding's graded validity
      (the Pass-3 fraction of yes/insufficient/no binary sub-answers) is STRICTLY LOWER
      than the true finding's — and false findings tend to no/insufficient. No
      rubber-stamping (not all-yes), no over-suppression of true findings.
  - type: deterministic
    name: no_sycophancy_on_real_defects
    description: >
      A true, high-impact finding is not charitably dismissed: its graded validity stays
      >= 0.5 (the Pass-3 drop floor) so a real defect is not silently passed.
  - type: deterministic
    name: discriminates_impact_levels
    description: >
      The IMPACT axis must discriminate, not just validity: on a {high-impact,
      low-impact} pair the verifier's severity attributes map (Pass-3 `impact`) to
      >= 0.5 ("major"+) for the high case and < 0.5 for the low case. Guards the
      rising-floor convergence mechanism against a verifier that rates every finding the
      same (the severity-saturation the floor would be blind to).

  - type: llm-judge
    name: verification_reasoning_quality
    gates: false
    threshold: 0.7
    pointwise: true
    rubric: >
      Score 0..1 whether the per-finding binary sub-answers are justified by the plan
      text (verdict-with-citation, not verdict-with-fix), atomic, and independent of the
      finding's own asserted conclusion.
    grader:
      model: openai:gpt-4o-2024-08-06
      temperature: 0
      seed: 11
      snapshot: "2024-08-06"

# Labeled discrimination pairs. `kind: true` = a genuine defect Pass-2 should uphold
# (graded validity high); `kind: false` = a planted false-fire Pass-2 should knock down
# (low validity). `pair` links a true/false case on the same criterion + axis.
dataset:
  - id: D1-true
    criterion: E5
    kind: "true"
    pair: testing-plan
    finding: "The payments-webhook plan states no idempotency test; a retried webhook would double-charge."
    expect: high_validity
  - id: D1-false
    criterion: E5
    kind: "false"
    pair: testing-plan
    mode: already-mitigated
    finding: "The plan has no tests at all."
    note: "Planted-false: the plan DOES specify request specs + an idempotency test elsewhere."
    expect: low_validity
  - id: D2-true
    criterion: T5c
    kind: "true"
    pair: security
    finding: "The OAuth host logs the raw bearer token at debug level (plan §logging)."
    expect: high_validity
  - id: D2-false
    criterion: T5c
    kind: "false"
    pair: security
    mode: speculative-from-text
    finding: "Secrets 'baked at deploy' almost certainly means env-var leakage."
    note: "Planted-false: speculation; the code uses Secrets Manager + constant-time compare."
    expect: low_validity
  - id: D3-false
    criterion: T2
    kind: "false"
    pair: library-contract
    mode: library-guaranteed-capability
    finding: "Provider-agnosticism is unproven because completion was only run on Anthropic."
    note: >
      Planted-false (FP6): provider-agnosticism is the adopted library's documented
      contract — no_existing_mitigation should be YES; the verifier must DROP this.
    expect: low_validity
  - id: D3-true
    criterion: T3
    kind: "true"
    pair: library-contract
    finding: "Pydantic AI NativeOutput for Anthropic specifically is a maturing feature, not proven here."
    note: "True (the FP6-vs-T3 boundary): a specific immature integration point IS worth flagging."
    expect: high_validity

  # IMPACT-axis pairs (the `discriminates_impact_levels` scorer). Both findings are
  # TRUE/real — they differ only in stakes, so the verifier's SEVERITY attributes (not
  # its validity) are what's under test: the high one must map to impact >= 0.5
  # ("major"+), the low one below it. This is the axis the Pass-3 rising-floor relies on.
  - id: I1-high
    criterion: T4
    kind: "true"
    pair: impact-dataloss
    finding: "The migration drops the legacy `events` table before backfilling, with no rollback path — irreversible data loss on a bad deploy (system-wide, hard to reverse)."
    expect: high_impact
  - id: I1-low
    criterion: E2
    kind: "true"
    pair: impact-dataloss
    finding: "A scope bullet uses the word 'improve' without a metric, so the success target is slightly ambiguous (cosmetic; local; trivially fixed in the AC text)."
    expect: low_impact
  # WS1 (epic cite-stone-sea): committed_work_relies_on_unbacked_claim discrimination.
  # A committed scope-EXCLUSION resting on an UNVERIFIED factual claim upholds (recall);
  # the same finding drops when the plan backs the claim with a run Verify command.
  - id: D4-true-committed-claim
    criterion: E4
    kind: "true"
    pair: committed-claim
    finding: "The story's 'OUT: rate-limiter — already exists in the gateway' excludes building one, but no task, AC, or Verify command establishes that the gateway limiter exists or covers this path."
    expect: high_validity
  - id: D4-false-committed-claim
    criterion: E4
    kind: "false"
    pair: committed-claim
    mode: claim-is-backed
    finding: "The 'OUT: rate-limiter already exists' exclusion is an unverified claim."
    note: >
      Planted-false: the plan's ## Assumptions block cites the gateway config and a run
      `curl` Verify command proving the limiter covers this route —
      committed_work_relies_on_unbacked_claim should be `no`, dropping validity.
    expect: low_validity
  # WS1: respects_artifact_altitude discrimination. A finding pitched at the artifact's OWN
  # level upholds; a finding demanding a child/implementation detail the story defers drops.
  - id: D5-true-altitude
    criterion: T5c
    kind: "true"
    pair: altitude
    finding: "The story commits to a new public endpoint but declares no access posture at all — an undeclared access decision at the story's own level."
    expect: high_validity
  - id: D5-false-altitude
    criterion: A1
    kind: "false"
    pair: altitude
    mode: altitude-error
    finding: "The story does not specify the retry-backoff schedule or the lock-acquisition ordering for the worker."
    note: >
      Planted-false: retry/lock detail is implementation-level that the story legitimately
      defers to its task children — respects_artifact_altitude should be `no`, dropping validity.
    expect: low_validity

gold_set:
  - input: "A planted-false 'no tests' finding when the plan specifies tests (D1-false)."
    label: should_drop
  - input: "A true missing-idempotency-test finding on a payments webhook (D1-true)."
    label: should_uphold
  - input: "FP6 'provider-agnosticism unproven' against an adopted library's contract (D3-false)."
    label: should_drop
  - input: "A real raw-token-logged security finding with a plan citation (D2-true)."
    label: should_uphold
  - input: "An irreversible drop-table-before-backfill data-loss finding (I1-high)."
    label: high_impact
  - input: "A cosmetic 'improve without a metric' AC-wording finding (I1-low)."
    label: low_impact
