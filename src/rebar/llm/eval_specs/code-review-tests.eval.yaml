# Standing eval spec for the code-review TEST-SUFFICIENCY overlay (Pass-1) — story f93a.
# Recall (seeded test-defect) + no-fire families, seeded from the DSO code-review incidents.
# The tests overlay reviews the change along the test-sufficiency dimension and emits kernel
# evidence findings; it is scored on FINDINGS presence, not a FAIL/BLOCK verdict.
# Validate offline: `rebar prompt eval code-review-tests`.
prompt: code-review-tests
model: anthropic:claude-opus-4-8
epochs: 3
gate: at_least(2)
coverage_threshold: 0.8

scorers:
  - type: deterministic
    name: code_review_emits_valid_findings
    description: The overlay output is a dict carrying a `findings` list (native Pass-1 shape).
  - type: deterministic
    name: code_review_recall
    description: A diff with an insufficient / tautological test produces a finding.
  - type: deterministic
    name: code_review_no_fire
    description: A diff with a valid observable-postcondition test produces no finding.

dataset:
  # ── recall: seeded test defects (bad diff → finding) ─────────────────────────
  - id: R-tautological-test
    corpus: dso
    expect: finding
    mode: tautological-test
    diff: |
      --- a/tests/test_reducer.py
      +++ b/tests/test_reducer.py
      @@ -1,3 +1,6 @@
      +def test_apply_event(monkeypatch):
      +    m = Mock(return_value=42)
      +    # asserts the mock's OWN configured return — proves nothing about the code
      +    assert m() == 42
  - id: R-missing-regression-test
    corpus: dso
    expect: finding
    mode: bugfix-without-regression-test
    diff: |
      --- a/rebar/claim.py
      +++ b/rebar/claim.py
      @@ -8,3 +8,4 @@ def claim(tid, assignee):
           if held_by_other(tid):
      -        return 0            # BUG: swallowed a concurrency conflict
      +        raise ConcurrencyError(tid)   # fix — but NO test added exercising this path
  # ── no-fire: GOOD test diffs the tests overlay must NOT flag ─────────────────
  - id: FP-valid-observable-test
    corpus: dso
    expect: pass
    mode: observable-postcondition-test
    diff: |
      --- a/tests/test_claim.py
      +++ b/tests/test_claim.py
      @@ -1,3 +1,7 @@
      +def test_claim_conflict_raises(store):
      +    store.claim("t1", "a")
      +    with pytest.raises(ConcurrencyError):
      +        store.claim("t1", "b")   # asserts a REAL observable postcondition
  - id: FP-nit-only-style
    corpus: dso
    expect: pass
    mode: nit-only-style
    note: >
      NIT-FRAMING experiment (story f93a) — a test-file diff whose ONLY changes are
      style/format/import nits the linter enforces. The tests overlay must NOT fire (nits are
      linter-owned). Committed as the baseline the overlay is held to.
    diff: |
      --- a/tests/test_util.py
      +++ b/tests/test_util.py
      @@ -1,4 +1,4 @@
      -import pytest,os
      +import os
      +
      +import pytest
      @@ -9,2 +9,2 @@ def test_slug():
      -    assert to_slug('A B')=='a b'
      +    assert to_slug("A B") == "a b"
  - id: FP-rule5-structural-grep
    corpus: dso
    expect: pass
    mode: rule5-structural-grep
    note: >
      Rule-5 structural-artifact exception (story f93a) — a test that greps SOURCE to assert a
      STRUCTURAL invariant (here: every reviewer prompt declares canonical front-matter). Grepping
      source IS the correct tool for a structural-artifact assertion, so the tests overlay must NOT
      flag it as the source-grepping antipattern (which applies to grepping for BEHAVIOR).
    diff: |
      --- a/tests/unit/test_prompt_frontmatter.py
      +++ b/tests/unit/test_prompt_frontmatter.py
      @@ -1,3 +1,9 @@
      +def test_all_reviewer_prompts_declare_category(reviewers_dir):
      +    # structural invariant over source text — Rule-5 exception, not a behavior grep
      +    for md in reviewers_dir.glob("code-review-*.md"):
      +        front = md.read_text().split("---", 2)[1]
      +        assert "category: code-review-pass" in front, md.name
  # ── recall: additional seeded antipatterns (story 0f8f) ──────────────────────
  - id: R-change-detector-internal-state
    corpus: dso
    expect: finding
    mode: change-detector
    diff: |
      --- a/tests/test_formatter.py
      +++ b/tests/test_formatter.py
      @@ -1,3 +1,6 @@
      +def test_indent_tracking():
      +    f = Formatter("  x")
      +    f.format()
      +    # asserts INTERNAL state — breaks on any refactor of how indent is tracked
      +    assert f._indent_level == 2
  - id: R-over-mocking-internal-helper
    corpus: dso
    expect: finding
    mode: over-mocking
    diff: |
      --- a/tests/test_parser.py
      +++ b/tests/test_parser.py
      @@ -1,3 +1,7 @@
      +def test_parse(monkeypatch):
      +    # mocks a helper INTERNAL to the unit under test — asserts structure, not behavior
      +    monkeypatch.setattr("parser._tokenize", lambda s: ["fake"])
      +    assert parse("x") is not None
  - id: R-source-grepping
    corpus: dso
    expect: finding
    mode: source-grepping
    diff: |
      --- a/tests/test_claim.py
      +++ b/tests/test_claim.py
      @@ -1,3 +1,6 @@
      +def test_claim_raises_on_conflict():
      +    # greps the SOURCE UNDER TEST for a line — tests text, not behavior
      +    src = pathlib.Path("rebar/claim.py").read_text()
      +    assert "raise ConcurrencyError" in src
  - id: R-existence-only
    corpus: dso
    expect: finding
    mode: existence-only
    diff: |
      --- a/tests/test_skill.sh
      +++ b/tests/test_skill.sh
      @@ -1,2 +1,4 @@
      +test_skill_file_present() {
      +  # existence-only: a standalone -f check with no structural contract — a change-detector
      +  test -f "skills/sprint/SKILL.md"
      +}
  # ── no-fire: valid patterns the FP-guards must protect (story 0f8f) ──────────
  - id: FP-four-criterion-philosophy
    corpus: dso
    expect: pass
    mode: four-criterion-philosophy-disagreement
    note: >
      Four-Criterion Test — the assertion targets an OBSERVABLE output (the argument the bridge
      passes to its dependency), exercises real code, survives refactoring, and has no isolation
      issue. No defect criterion holds, so it is a philosophy disagreement, NOT a defect — the
      overlay must NOT flag it as implementation-coupled / change-detector.
    diff: |
      --- a/tests/test_bridge.py
      +++ b/tests/test_bridge.py
      @@ -1,3 +1,7 @@
      +def test_bridge_passes_parent(fake_jira):
      +    bridge.sync(ticket, parent="DSO-9999")
      +    # asserts the observable arg passed to the external dep — an output contract
      +    assert fake_jira.create.call_args.kwargs["parent"] == "DSO-9999"
  - id: FP-table-driven-exact-value
    corpus: dso
    expect: pass
    mode: table-driven-pure-function
    note: >
      Table-driven / classifier test — exact-value assertions on a PURE function's output that
      "look tautological" are valid (VALID-patterns-not-to-flag). The overlay must NOT call it
      tautological or a change-detector.
    diff: |
      --- a/tests/test_slug.py
      +++ b/tests/test_slug.py
      @@ -1,3 +1,8 @@
      +@pytest.mark.parametrize("raw,expected", [("A B", "a-b"), ("X_Y", "x-y")])
      +def test_to_slug(raw, expected):
      +    # exact-value assertion on a pure function's observable output — valid
      +    assert to_slug(raw) == expected
  - id: FP-boundary-mock
    corpus: dso
    expect: pass
    mode: external-boundary-mock
    note: >
      Mocks at the EXTERNAL boundary (an HTTP client) to isolate the unit — correct per Rule 3.
      The overlay must NOT flag it as "tests the mock, not the logic".
    diff: |
      --- a/tests/test_fetch.py
      +++ b/tests/test_fetch.py
      @@ -1,3 +1,8 @@
      +def test_fetch_retries(monkeypatch):
      +    # mock the EXTERNAL http boundary, then assert observable retry behavior
      +    client = Mock(side_effect=[Timeout(), Response(200)])
      +    monkeypatch.setattr(fetch, "_http", client)
      +    assert fetch("/x").status == 200 and client.call_count == 2

gold_set:
  - input: "A test that asserts a mock's own configured return value (tautological)."
    label: useful
  - input: "A bug fix that changes control flow with no regression test added."
    label: useful
  - input: "A test asserting a real observable postcondition (raises on conflict)."
    label: not_useful
  - input: "A test-file diff that only reorders imports and normalizes quotes (linter-owned)."
    label: not_useful
