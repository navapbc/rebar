# Standing eval spec for the plan-review Pass-1 FINDER (epic 5fd2 / child 7284).
# Per-criterion recall / false-accept / false-fire cases for the plan-review gate,
# drawn from all three corpuses (DSO read-only · snap-oakhart-manual · rebar's own
# tickets) and seeded from REAL observed false-fires
# (docs/experiments/plan-review-gate/eval/observed-false-positives.md).
# Validate offline: `rebar prompt eval plan-review-finder`. The live model run needs
# the [eval] extra + credentials (the eval CI). The gold_set is the human-adjudicated
# subset the llm-judge is aligned to (Cohen's kappa); the labels here are a best-effort
# seed pending human adjudication — see eval_specs/README.plan-review.md.
prompt: plan-review-finder
model: anthropic:claude-opus-4-8
epochs: 3
gate: at_least(2)
coverage_threshold: 0.8

scorers:
  # Deterministic scorers GATE the build.
  - type: deterministic
    name: emits_valid_findings
    description: The output validates against the plan_review_findings contract.
  - type: deterministic
    name: no_fire_on_good_cases
    description: >
      A finding's criteria are confined to the chunk's rubric ids, and a GOOD-case
      (false-fire) plan produces no finding for the criterion under test.
  - type: deterministic
    name: recall_on_seeded_defects
    description: A plan with a planted defect produces a finding for the right criterion.

  # LLM-judge REPORTS only (cross-family grader; no self-grading).
  - type: llm-judge
    name: finding_is_grounded_and_actionable
    gates: false
    threshold: 0.7
    pointwise: true
    rubric: >
      Score 0..1 how well each finding is grounded in the plan (a quote / section /
      absence rationale) and is actionable (a criterion + location + checklist line);
      length-neutral. A finding manufactured from sound phrasing scores low.
    grader:
      model: openai:gpt-4o-2024-08-06
      temperature: 0
      seed: 7
      snapshot: "2024-08-06"

# The labeled case set (recall / false-accept / false-fire), drawn from the 3 corpuses.
# `expect: finding` = the criterion SHOULD fire (recall); `expect: pass` = a GOOD case
# the criterion must NOT fire on (false-fire). `mode` ties false-fires to the taxonomy.
dataset:
  # ── recall (bad plan → finding) ──────────────────────────────────────────────
  - id: R-E2-rebar
    corpus: rebar
    criterion: E2
    expect: finding
    input: >
      A task whose only acceptance criterion is "improve the reconciler so it is more
      robust" — no observable outcome, no verification.
  - id: R-E5-snap
    corpus: snap
    criterion: E5
    expect: finding
    input: >
      A Rails story adding a payments webhook with acceptance criteria but no testing
      plan at all (no request specs, no idempotency test).
  - id: R-E5-proxy-validation-cutover
    corpus: rebar
    criterion: E5
    expect: finding
    input: >
      A rebar STORY that CUTS OVER the plan-review gate to a new "workflow" engine path
      and DEFAULTS to it. AC: "Integration tests cover claim+close pass/fail through the
      workflow path with intact signing." Those tests use canned/fake agents that never
      invoke the real prompt-resolution boundary, so the suite passes OFFLINE without the
      new live path ever running. No acceptance criterion exercises the defaulted workflow
      path end-to-end against a live model. E5 SHOULD fire (recall): the PROXY-VALIDATION
      anti-pattern — the AC is satisfiable without the changed, defaulted risky path ever
      executing (the B5/super-plant-liver root cause).
  - id: R-E6-cutover-no-live-ac
    corpus: rebar
    criterion: E6
    expect: finding
    input: >
      A rebar TASK that flips a gate's default engine to a new code path. Its only proving
      command is an offline unit test with a mocked dependency that short-circuits the new
      path; no acceptance criterion exercises the defaulted path end-to-end (live). E6
      SHOULD fire (recall): a cutover/defaulted path with no criterion that exercises it
      end-to-end — green offline tests + a signed verdict are necessary but not sufficient.
  - id: R-G5-dso
    corpus: dso
    criterion: G5
    expect: finding
    input: >
      An epic-sized task bundling schema migration + API + UI + docs into one ticket
      with a flat 18-item AC list and no decomposition.
  - id: R-G5-mixed-kinds
    corpus: rebar
    criterion: G5
    expect: finding
    input: >
      A single task that bundles THREE heterogeneous change kinds: fix a concurrency bug in
      the reducer, ADD a new `--json` output flag to the CLI, AND reformat/refactor an
      unrelated module for tidiness. Each is an independently-releasable outcome with its own
      reason to change. G5 SHOULD fire (recall): mixing a bug-fix + a new feature + an
      unrelated refactor fails single-concern; each belongs in its own child.
  - id: R-G5-multi-outcome
    corpus: snap
    criterion: G5
    expect: finding
    input: >
      A Rails story titled "Add CSV export AND migrate the auth provider to OAuth" — two
      independently-valuable, independently-releasable outcomes joined by a structural 'and',
      serving different personas (a data-exporting end user vs the auth/security concern).
      G5 SHOULD fire (recall): each outcome would be independently valuable and testable on
      its own, so the unit should decompose into two children.
  - id: R-F4-rebar
    corpus: rebar
    criterion: F4
    expect: finding
    input: >
      A story with a solution but no statement of the user/problem it serves.
  - id: R-T12-snap
    corpus: snap
    criterion: T12
    expect: finding
    input: >
      A plan that changes the live behavior of a DEPLOYED, long-running web service —
      switching the production payments provider for all traffic at once — with no
      staged rollout, no feature flag, and no rollback path. T12 SHOULD fire (recall):
      the change is to a deployed runtime and lacks staged-rollout/rollback/deploy-
      ordering. This validates T12 DISCRIMINATION, not just its library/CLI suppression.
  # ── false-fire GOOD cases (sound plan → NO finding), seeded from observed FPs ──
  - id: FP1-T5c
    corpus: rebar
    criterion: T5c
    expect: pass
    mode: domain-inappropriate-standard-import
    input: >
      A rebar (git-backed library/CLI) change; the plan has no "access level" concept
      because the domain has none. T5c must NOT import a generic web-app access-control
      requirement.
  - id: FP4-G6
    corpus: rebar
    criterion: G6
    expect: pass
    mode: debatable-misinterpretation-of-intent
    input: >
      A gate that is fail-open at the DET floor and advisory-by-default WITH per-criterion
      blocking levers (thresholds high during calibration BY DESIGN). G6 must not read this
      as a "hollow signal" — it is a deliberate, documented posture.
  - id: FP5-T5a
    corpus: rebar
    criterion: T5a
    expect: pass
    mode: low-impact-nitpick
    input: >
      A plan that sets initial latency targets from UX/timeout projections and refines
      them from passive logging. T5a must not demand an upfront benchmark step (immaterial).
  - id: FP6-T2
    corpus: rebar
    criterion: T2
    expect: pass
    mode: library-guaranteed-capability
    input: >
      A plan adopting Pydantic AI for provider-agnostic LLM calls. T2 must NOT demand the
      plan re-prove provider-agnosticism (the library's documented headline contract);
      adoption IS the mitigation. (A specific immature FEATURE of the library would differ.)
  - id: T12-suppress-rebar
    corpus: rebar
    criterion: T12
    expect: pass
    mode: not-applicable-library-or-cli
    input: >
      A change to rebar itself (a git-backed library + CLI), which is not a deployed,
      long-running system with production traffic. T12 must PASS not-applicable — the
      core anti-FP that pairs with the R-T12-snap recall case (discrimination, not
      blanket suppression).
  - id: FP7-A1
    corpus: rebar
    criterion: A1
    expect: pass
    mode: rebuild-of-designated-experiment-reference
    input: >
      A plan to build a production workflow engine where a v1 POC/reference exists
      (designated experimental validation). A1 must not flag NIH/rebuild — rebuilding a
      designated probe for production is the intended lifecycle (coach to confirm framing
      when production-vs-reference is ambiguous from location).
  - id: FP8-E5-cutover-has-live-ac
    corpus: rebar
    criterion: E5
    expect: pass
    mode: cutover-has-live-e2e-acceptance-criterion
    input: >
      A rebar story that cuts over a gate to a new default engine path AND includes an
      acceptance criterion that exercises the new path end-to-end against a LIVE model
      (plus the offline suite). E5 must NOT fire proxy-validation: the defaulted path IS
      exercised live — the anti-FP pair for R-E5-proxy-validation-cutover (discrimination,
      not blanket firing on every cutover).
  # ── G5 decomposition false-fires (the coherent-but-broad cases our tuning protects) ──
  - id: FP-G5-vertical-slice
    corpus: rebar
    criterion: G5
    expect: pass
    mode: coherent-vertical-slice-spans-layers
    input: >
      A story implementing ONE feature — "let a user rename a ticket from the board" — as a
      coherent vertical slice: it touches the UI (the board component), the request handler,
      the domain/reducer, and the store (four files across three architectural layers).
      Single concern, one user-facing outcome, delivered end-to-end. G5 must PASS: spanning
      layers/files is the SHAPE OF A GOOD vertical slice, not a decomposition trigger.
  - id: FP-G5-many-files-one-concern
    corpus: rebar
    criterion: G5
    expect: pass
    mode: many-files-one-coherent-area
    input: >
      A task that renames one domain concept ("assignee" → "owner") consistently across 6
      files within a single coherent module (the model, its serializer, two call sites, and
      two tests). One reason to change, one releasable outcome, tightly cohesive. G5 must
      PASS: many files within one coherent area is not diffusion across unrelated subsystems.
  - id: FP-G5-new-interface-with-consumer
    corpus: rebar
    criterion: G5
    expect: pass
    mode: new-interface-with-colocated-consumer
    input: >
      A story that adds a new `TicketExporter` interface AND its first concrete
      implementation AND the single call site that uses it, all shipped together in one unit.
      G5 must PASS: introducing an interface whose consumer ships in the same unit is a
      complete logical change — splitting the producer from its only consumer would leave a
      valueless half.
  - id: FP-G5-coupled-not-splittable
    corpus: snap
    criterion: G5
    expect: pass
    mode: parts-not-independently-valuable
    input: >
      A story adding one atomic capability — "sign the completion manifest with an HMAC and
      verify it on read" — whose sign and verify halves are useless apart (a signature no one
      verifies, or a verifier with nothing to check) and must ship together to deliver any
      value. G5 must PASS the value-preservation test: the parts would not each be
      independently valuable/releasable, so the unit is right-sized whole.
  # WS6 (epic cite-stone-sea): the G-9 scale-inference anchors are FINDER-side (A1/T5a),
  # so their proof is fire/no-fire here. (1) evidenced high scale -> T5a FIRES; (2) scale
  # invented by interpolation from the subject -> T5a must NOT fire (small-scale default).
  - id: R-T5a-scale-evidenced
    corpus: rebar
    criterion: T5a
    expect: finding
    mode: evidenced-high-scale
    input: >
      A story states an explicit scale AC ("ingest ~10M events/day") and plans a synchronous
      per-event LLM classification call on the hot path with no batching or async fan-out
      control. T5a SHOULD fire: the O(n)-LLM-call pattern is unjustified at the stated,
      evidenced scale.
  - id: FP-T5a-inflated-scale
    corpus: rebar
    criterion: T5a
    expect: pass
    mode: inflated-scale-interpolation
    input: >
      A story adds an internal admin report with no stated scale, no volume AC, and no profiling
      result. T5a must NOT fire a performance finding by interpolating scale upward from the
      domain ("it's a government portal, so millions of requests") — the small-scale default
      holds and scale sensitivity is orthogonal to volume.
  # WS2 (epic cite-stone-sea): E4 scope-exclusion sub-check (G-4) — FIRE on a codebase exclusion
  # the tools refute; ABSTAIN-with-coverage (no fire) on an external-fact exclusion.
  - id: R-E4-scope-exclusion-codebase
    corpus: rebar
    criterion: E4
    expect: finding
    mode: scope-exclusion-false
    input: >
      A story's scope says 'OUT: rate-limiting — already exists in gateway.py' and creates no task
      or AC to build one, but gateway.py contains no rate-limiter for this path. E4 must FIRE: the
      descoping claim is an unverified codebase assertion that deletes work invisibly.
  - id: FP-E4-scope-exclusion-external
    corpus: rebar
    criterion: E4
    expect: pass
    mode: scope-exclusion-external
    input: >
      A story's scope says 'OUT: billing integration — owned and operated by the payments team'.
      This is an external-fact exclusion the repo tools cannot settle. E4 must NOT fire — it
      abstains with coverage (records it as unverifiable) rather than asserting an ungroundable gap.
  # WS2: hedged-requirement finder (`hedge`, 1-TURN) — a committed element on a hedged assumption
  # FIRES; a hedge inside an AC proving-command clause is E6's territory (dedup -> not-applicable).
  - id: R-hedge-committed-assumption
    corpus: rebar
    criterion: hedge
    expect: finding
    mode: hedged-commitment
    input: >
      A story commits 'the importer returns a sorted list (we assume the upstream API already
      returns results sorted)' with no verification and no fallback sort. The `hedge` finder must
      FIRE — a committed edit rests on a hedged, unbacked assumption (Pass-2 then grades it via
      committed_work_relies_on_unbacked_claim).
  - id: FP-hedge-ac-clause-e6-territory
    corpus: rebar
    criterion: hedge
    expect: pass
    mode: ac-clause-e6-territory
    input: >
      An acceptance criterion reads 'AC: the /health endpoint should probably work'. The hedge sits
      inside an AC proving-command clause — E6.no_hedges owns that. The `hedge` criterion must mark
      itself not-applicable here (rubric-level dedup) and NOT report it.
  # WS3 (epic cite-stone-sea): T13 prohibition-enumeration overlay (gap-report G-5).
  - id: R-T13-prohibition-uncovered
    corpus: rebar
    criterion: T13
    expect: finding
    mode: prohibition-uncovered-call-site
    input: >
      A plan adds a CI gate that REQUIRES tests to pass before any merge, but the repo still has
      direct `gh pr merge` call sites and a release workflow that merges without the new gate, none
      of which the plan migrates or exempts. T13 must FIRE: those call sites are UNCOVERED — the new
      prohibition will start rejecting them with no migration path.
  - id: FP-T13-describes-enforcement
    corpus: rebar
    criterion: T13
    expect: pass
    mode: describes-existing-enforcement
    input: >
      A plan merely DESCRIBES the already-existing branch-protection rule ('merges already require a
      green build') without introducing any new prohibition. T13 must PASS not-applicable — no
      newly-outlawed behavior means no invisible affected set to enumerate.
  # WS3: T14 CI-trigger / release-infra overlay (gap-report G-10).
  - id: R-T14-excluded-workflow
    corpus: rebar
    criterion: T14
    expect: finding
    mode: new-ref-excluded-workflow
    input: >
      A plan introduces a new `release/*` branch namespace, but the CI test workflow is filtered
      `on: push: branches: [main]` and does not include `release/*`. T14 must FIRE: that workflow is
      EXCLUDED for the new ref pattern and will silently skip release branches.
  - id: FP-T14-unknown-ci-failopen
    corpus: rebar
    criterion: T14
    expect: pass
    mode: unknown-ci-fail-open
    input: >
      A plan adds a new tag pattern, but CI runs on a third-party system whose trigger config the
      repo tools cannot read/parse. T14 must FAIL OPEN — abstain with coverage for that workflow
      rather than asserting an EXCLUDED gap it cannot ground; it must not fail closed on unknown CI.
  # WS11 (epic cite-stone-sea): removal-rationale (Chesterton's Fence — removal-side dual of A1).
  - id: FP-removal-rationale-dead-code
    corpus: rebar
    criterion: removal-rationale
    expect: pass
    mode: dead-code-exempt
    input: >
      A plan deletes a private helper with zero call sites and no observable-behavior delta (a pure
      internal simplification). removal-rationale must PASS not-applicable — dead-code / behavior-
      preserving cleanup is exempt; rebar values legitimate simplification.
  - id: R-removal-rationale-error-path
    corpus: rebar
    criterion: removal-rationale
    expect: finding
    mode: error-handling-change
    input: >
      A 'refactor' replaces a retry-with-backoff around a flaky network call with a single fail-fast
      call and swallows the timeout exception, with no grounded scenario for why the retry no longer
      matters. removal-rationale must FIRE — failure-mode behavior is outward-facing, and the plan
      shows no understanding of why the guard existed.
  - id: R-removal-rationale-intent-marker
    corpus: rebar
    criterion: removal-rationale
    expect: finding
    mode: intent-marker
    input: >
      A plan deletes a code block preceded by a comment '# workaround for upstream bug #4821 — do
      not remove until fixed' with no happy-path behavior delta and no evidence the upstream bug is
      fixed. removal-rationale must FIRE on the explicit intent marker even absent a happy-path delta.
  - id: R-removal-rationale-fabricated
    corpus: rebar
    criterion: removal-rationale
    expect: finding
    mode: fabricated-scenario
    checklist_expect:
      removal_scenario_grounded: "no"
    input: >
      A plan removes an input-validation guard and justifies it with an invented scenario ('callers
      surely always pass valid input') that cites no comment, test, blame, or ticket. removal-
      rationale must FIRE: removal_scenario_grounded is no — an ungrounded/fabricated justification
      does not satisfy the grounded-scenario bar.
  - id: R-removal-rationale-e5-overlap
    corpus: rebar
    criterion: removal-rationale
    expect: finding
    mode: e5-overlap-coach-grouped
    input: >
      A plan removes a boundary-condition behavior AND deletes the test that pinned it, with no
      grounded rationale. Both removal-rationale and E5 (changed-behavior-tests) fire; the Pass-4
      coaching pass GROUPS them (move 6, specification-by-example) rather than double-reporting.

  # ── G1G2 upstream-dependency carve-out (bug: forward-ref FPs on greenfield epics) ──
  - id: FP-G1G2-upstream-dep-provided-symbol
    corpus: rebar
    criterion: G1G2
    expect: pass
    mode: upstream-dependency-forward-artifact
    input: >
      A story whose "## Dependencies" section states it depends_on ticket abcd, which creates
      the `Autosubmit` Gerrit label; this story's plan references `Autosubmit` (a symbol not yet
      in the codebase because abcd builds it). G1G2 must NOT flag `Autosubmit` as a
      missing/hallucinated artifact — a symbol created by a depends_on ancestor (evaluated
      recursively) is treated as existing.
  - id: R-G1G2-forward-ref-no-producer
    corpus: rebar
    criterion: G1G2
    expect: finding
    input: >
      A story references `docs/adr/0042-foo.md` as an existing document to cite in a `--help`
      string, but no ticket it depends_on creates ADR-0042 — it is authored by a DOWNSTREAM
      sibling that itself depends_on this story. The artifact does not exist and no upstream
      dependency provides it: a forward reference. G1G2 SHOULD fire (a forward reference must not
      be made until the artifact is created).

# Frozen human-gold subset (kappa alignment for the llm-judge). SEED labels — pending
# human adjudication (the gating gold subset; auto-labels seed the bulk corpus).
gold_set:
  - input: "A criterion finding grounded in a quoted AC line with a checklist fix."
    label: useful
  - input: "T5c flagging 'no access level' on a git-backed CLI (FP1)."
    label: not_useful
  - input: "T2 demanding re-proof of an adopted library's documented contract (FP6)."
    label: not_useful
  - input: "A real missing-testing-plan finding on a payments webhook with a path."
    label: useful
  - input: "G1G2 flagging a symbol as missing when a depends_on ancestor creates it."
    label: not_useful
