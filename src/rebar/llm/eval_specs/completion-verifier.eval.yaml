# Built-in prompt eval spec (epic 6f2d / WS-EVAL-EXISTING) for the `completion-verifier`.
# Measures recall on INCOMPLETE work (verdict must be FAIL), no false-fail on COMPLETE
# work (must PASS), and the completion_verdict contract (PASS/FAIL; FAIL<=>findings;
# each FAIL finding cites a source). Offline: validate_eval_spec(strict=True). Live: the
# eval CI ([eval] extra + credentials) runs it through the context-injection solver — the
# verifier reads the ticket + repo via tools, so each case is backed by injected
# `ticket_context` + a fixture repo described in `note` (see the WS-EVAL solver task).
prompt: completion-verifier
model: anthropic:claude-opus-4-8
epochs: 3
gate: at_least(2)
coverage_threshold: 0.8

scorers:
  - type: deterministic
    name: emits_valid_verdict
    description: A completion_verdict — verdict in {PASS,FAIL}, FAIL<=>findings, each FAIL finding cites a source.
  - type: deterministic
    name: recall_on_incomplete
    description: On a ticket with an unmet requirement, the verdict is FAIL.
  - type: deterministic
    name: no_false_fail_on_complete
    description: On a ticket whose requirements are all demonstrably met, the verdict is PASS.
  - type: llm-judge
    name: finding_cites_criterion_and_is_grounded
    gates: false
    threshold: 0.7
    pointwise: true
    rubric: >
      Score 0..1 whether each FAIL finding names the specific unmet completion
      requirement AND grounds it in the implementation (a real file/symbol), rather
      than asserting incompleteness vaguely. Judge substance, not length.
    grader:
      model: openai:gpt-4o-2024-08-06
      temperature: 0
      seed: 7
      snapshot: "2024-08-06"

# Each case carries a `files` fixture (the disposable repo the verifier's file tools
# read). Fail cases ship code that does NOT satisfy an AC item; pass cases ship code
# that does. The fed `ticket_context` never names the answer — repo state is the
# evidence. (Seed fixtures; labels provisional pending human adjudication, per
# README.plan-review.md.)
dataset:
  - id: CV-missing-ac-item
    corpus: rebar
    expect: fail
    note: "Implements `foo` but no --json flag → the second AC item is unmet."
    ticket_context: |
      ## Acceptance Criteria
      - [ ] add a `foo` subcommand
      - [ ] support `--json` output on `foo`
    files:
      src/cli.py: |
        import argparse

        def foo(args):
            print("foo")

        def main():
            p = argparse.ArgumentParser()
            sub = p.add_subparsers()
            f = sub.add_parser("foo")
            f.set_defaults(fn=foo)
            # no --json flag anywhere
            a = p.parse_args()
            a.fn(a)
  - id: CV-bug-unfixed
    corpus: snap
    expect: fail
    note: "The discount code is ignored in total() → the bug AC is unmet."
    ticket_context: |
      Bug: checkout total ignores discount codes.
      ## Acceptance Criteria
      - [ ] applying a valid discount code reduces the order total
    files:
      app/checkout.py: |
        def total(items, discount_code=None):
            # BUG: discount_code is never applied
            return sum(i["price"] for i in items)
  - id: CV-missing-test
    corpus: rebar
    expect: fail
    note: "add() exists but no tests/test_util.py → the test AC item is unmet."
    ticket_context: |
      ## Acceptance Criteria
      - [ ] add an `add(a, b)` helper
      - [ ] cover it with a unit test in tests/test_util.py
    files:
      src/util.py: |
        def add(a, b):
            return a + b
  - id: CV-complete-feature
    corpus: rebar
    expect: pass
    note: "`bar --json` is fully implemented → both AC items met."
    ticket_context: |
      ## Acceptance Criteria
      - [ ] add a `bar` subcommand
      - [ ] support `--json` output on `bar`
    files:
      src/cli.py: |
        import argparse
        import json

        def bar(args):
            data = {"ok": True}
            print(json.dumps(data) if args.json else data)

        def main():
            p = argparse.ArgumentParser()
            sub = p.add_subparsers()
            b = sub.add_parser("bar")
            b.add_argument("--json", action="store_true")
            b.set_defaults(fn=bar)
            a = p.parse_args()
            a.fn(a)
  - id: CV-complete-bugfix
    corpus: snap
    expect: pass
    note: "Null-guard added → the profile renders without an avatar; AC met."
    ticket_context: |
      Bug: profile page 500s when the user has no avatar.
      ## Acceptance Criteria
      - [ ] the profile page renders for a user with no avatar
    files:
      app/profile.py: |
        def render(user):
            avatar = user.get("avatar")
            return avatar.url if avatar else "/default.png"  # null-guarded
  - id: CV-complete-refactor
    corpus: rebar
    expect: pass
    note: "Helper extracted and both call sites updated → AC met."
    ticket_context: |
      ## Acceptance Criteria
      - [ ] extract the duplicated parsing logic into one helper
      - [ ] update all call sites to use the helper
    files:
      src/parse.py: |
        def parse_line(s):
            return s.strip().split(",")
      src/a.py: |
        from src.parse import parse_line
      src/b.py: |
        from src.parse import parse_line

gold_set:
  - input: "A FAIL finding: 'AC item `--json` unmet — no --json flag in src/cli.py.'"
    label: useful
  - input: "A FAIL finding with no cited file: 'the work seems incomplete.'"
    label: not_useful
  - input: "A PASS verdict on a ticket whose every AC item maps to a cited implementation."
    label: useful
  - input: "A FAIL finding objecting to code style (out of completion scope)."
    label: not_useful
