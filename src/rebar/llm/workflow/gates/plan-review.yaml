schema_version: '3'
name: plan-review
description: >-
  The plan-review gate expressed as a v3 engine workflow (epic B, stories B2 + B5; the SOLE
  plan-review gate since the bespoke driver was retired in B-RETIRE). Its control flow is a
  deterministic Layer-1 floor (P1-P9) that SHORT-CIRCUITS (an exempt ticket type, or a P8-too-big plan,
  yields a terminal verdict with NO LLM call; a P1/P5 DET block does NOT short-circuit — the
  LLM runs and the DET blocks are merged at decide-time), then the four-pass review:
  route_criteria assembles the INCLUDED criteria (proportionate scrutiny + overlay
  triggering) that gate the Pass-1 finder `batch` (driven by the B1 ProductionBatchRunner),
  one aggregate Pass-2 verify, the deterministic Pass-3 decide, and the Pass-4 affirmative
  coach (LLM move picks rendered from locked templates). The Pass-2 verify is DYNAMIC (B5):
  a `code_grounded` branch picks the AGENTIC verifier (re-grounds against real code) when any
  finding cites a code-grounded criterion, else the cheaper single-turn verifier — matching
  bespoke pass2_verify(agentic=grounded). The short-circuit is a `branch` (an if:-skipped
  step's outputs cannot be referenced), so the billable LLM steps run ONLY on the
  precheck-passed arm. It produces a plan_review_verdict; signing is the gate's job (B5).
inputs:
  ticket_id:
    description: The ticket whose plan is reviewed.
    type: string
    required: true
  probe_criteria:
    description: >-
      PROBE MODE (drift-refresh tripwire): when a non-empty id list, the Pass-1 finder runs
      ONLY these criteria (the cheap E4+G1G2 probe) instead of the full routed set. Always
      supplied by the gate dispatcher (``[]`` = normal full review).
    type: array
    required: false
steps:
- id: precheck
  uses: plan_review_precheck
  with:
    ticket_id: ${{ inputs.ticket_id }}
- id: review
  needs:
  - precheck
  branch:
    when: ${{ steps.precheck.outputs.run_llm }}
    then:
    - id: assemble
      uses: plan_review_assemble_criteria
      with:
        ticket_id: ${{ inputs.ticket_id }}
        probe_criteria: ${{ inputs.probe_criteria }}
    - id: finders
      needs:
      - assemble
      batch:
        prompt: plan-review-finder
        model_ladder:
        - claude-haiku-4-5
        - claude-sonnet-4-6
        - claude-opus-4-8
        criteria:
        - prompt: plan-review-A1
          when: '${{ steps.assemble.outputs.include_A1 }}'
        - prompt: plan-review-COH
          when: '${{ steps.assemble.outputs.include_COH }}'
        - prompt: plan-review-E1
          when: '${{ steps.assemble.outputs.include_E1 }}'
        - prompt: plan-review-E2
          when: '${{ steps.assemble.outputs.include_E2 }}'
        - prompt: plan-review-E3
          when: '${{ steps.assemble.outputs.include_E3 }}'
        - prompt: plan-review-E4
          when: '${{ steps.assemble.outputs.include_E4 }}'
        - prompt: plan-review-E5
          when: '${{ steps.assemble.outputs.include_E5 }}'
        - prompt: plan-review-E6
          when: '${{ steps.assemble.outputs.include_E6 }}'
        - prompt: plan-review-F1
          when: '${{ steps.assemble.outputs.include_F1 }}'
        - prompt: plan-review-F4
          when: '${{ steps.assemble.outputs.include_F4 }}'
        - prompt: plan-review-G1G2
          when: '${{ steps.assemble.outputs.include_G1G2 }}'
        - prompt: plan-review-G3
          when: '${{ steps.assemble.outputs.include_G3 }}'
        - prompt: plan-review-G4
          when: '${{ steps.assemble.outputs.include_G4 }}'
        - prompt: plan-review-G5
          when: '${{ steps.assemble.outputs.include_G5 }}'
        - prompt: plan-review-G6
          when: '${{ steps.assemble.outputs.include_G6 }}'
        - prompt: plan-review-G7
          when: '${{ steps.assemble.outputs.include_G7 }}'
        - prompt: plan-review-T1
          when: '${{ steps.assemble.outputs.include_T1 }}'
        - prompt: plan-review-T10
          when: '${{ steps.assemble.outputs.include_T10 }}'
        - prompt: plan-review-T11
          when: '${{ steps.assemble.outputs.include_T11 }}'
        - prompt: plan-review-T12
          when: '${{ steps.assemble.outputs.include_T12 }}'
        - prompt: plan-review-T2
          when: '${{ steps.assemble.outputs.include_T2 }}'
        - prompt: plan-review-T3
          when: '${{ steps.assemble.outputs.include_T3 }}'
        - prompt: plan-review-T4
          when: '${{ steps.assemble.outputs.include_T4 }}'
        - prompt: plan-review-T5a
          when: '${{ steps.assemble.outputs.include_T5a }}'
        - prompt: plan-review-T5b
          when: '${{ steps.assemble.outputs.include_T5b }}'
        - prompt: plan-review-T5c
          when: '${{ steps.assemble.outputs.include_T5c }}'
        - prompt: plan-review-T5d
          when: '${{ steps.assemble.outputs.include_T5d }}'
        - prompt: plan-review-T5e
          when: '${{ steps.assemble.outputs.include_T5e }}'
        - prompt: plan-review-T6
          when: '${{ steps.assemble.outputs.include_T6 }}'
        - prompt: plan-review-T7
          when: '${{ steps.assemble.outputs.include_T7 }}'
        - prompt: plan-review-T8
          when: '${{ steps.assemble.outputs.include_T8 }}'
        - prompt: plan-review-T9
          when: '${{ steps.assemble.outputs.include_T9 }}'
    - id: grounding
      needs:
      - finders
      uses: plan_review_grounding
      with:
        findings: ${{ steps.finders.outputs.findings }}
    # Pass-2 verify is DYNAMIC (B5): branch on `code_grounded` to pick the agentic vs the
    # single-turn verifier (ADR 0001 — execution_mode is fixed per prompt, so two prompts
    # gated by a branch, NOT a dynamic mode). Decide+coach live INSIDE each arm because the
    # interpreter scopes step references to the frame: a `decide` sibling of the branch could
    # not reach a `verify` nested in an arm. The two arms are IDENTICAL except the verify
    # `prompt:` id; they reach the enclosing finders/assemble/precheck outputs.
    - id: verify_branch
      needs:
      - grounding
      branch:
        when: ${{ steps.grounding.outputs.code_grounded }}
        then:
        - id: verify_inputs
          uses: plan_review_verify_inputs
          with:
            ticket_id: ${{ inputs.ticket_id }}
            findings: ${{ steps.finders.outputs.findings }}
        - id: verify
          needs:
          - verify_inputs
          prompt: plan-review-verifier-agentic
          mode: structured
          output_schema: plan_review_verification
          with:
            findings: ${{ steps.finders.outputs.findings }}
            plan: ${{ steps.verify_inputs.outputs.plan }}
            instructions: ${{ steps.verify_inputs.outputs.instructions }}
            # The agentic verifier makes ~1 tool-call cycle per finding; scale this step's budget
            # with the finding count (min = the configured floor) so a finding-rich ticket does
            # not trip the default cap and degrade the whole review (bug 59bc). A `with:` input
            # (the v3 step schema is immutable + closed; `with` is the open extension point).
            step_budget_per_item: 25
            # Scale the per-CALL OUTPUT cap with the finding count too: the structured
            # plan_review_verification grows ~1 verification object per finding, so a fixed cap
            # truncates (finish_reason=length) on a finding-rich plan and collapses the review to
            # INDETERMINATE (bug spy-luge-wool / sole-teal-churn). ~2000 output tokens/finding
            # (raising the cap to max(floor, 2000×findings), ceiling 64000 — the value proven to
            # let a ~30-finding verify complete).
            output_tokens_per_item: 2000
        - id: decide
          needs:
          - verify
          uses: plan_review_decide
          with:
            findings: ${{ steps.finders.outputs.findings }}
            verifications: ${{ steps.verify.outputs.verifications }}
            det_blocking: ${{ steps.precheck.outputs.det_blocking }}
            det_advisory: ${{ steps.precheck.outputs.det_advisory }}
        - id: coach_inputs
          needs:
          - decide
          uses: plan_review_coach_inputs
          with:
            ticket_id: ${{ inputs.ticket_id }}
            surviving: ${{ steps.decide.outputs.surfaced }}
            blocking: ${{ steps.decide.outputs.blocking }}
        # Pass-4 coach is gated on there being a coachable finding — blocking OR surviving
        # advisory (story 8086: blocking findings get coaching too). A clean PASS with zero
        # findings takes the else arm — coach renders with notes:[] and makes NO coach
        # LLM call, matching the bespoke pass4_coach early-return (WS4 crimp-polar-jag).
        - id: coach_gate
          needs:
          - coach_inputs
          branch:
            when: ${{ steps.coach_inputs.outputs.findings }}
            then:
            - id: coach_notes
              prompt: plan-review-coach
              mode: structured
              output_schema: plan_review_coach
              with:
                surviving: ${{ steps.coach_inputs.outputs.findings }}
                plan: ${{ steps.coach_inputs.outputs.plan }}
                instructions: ${{ steps.coach_inputs.outputs.instructions }}
            - id: coach
              needs:
              - coach_notes
              uses: plan_review_coach
              with:
                blocking: ${{ steps.decide.outputs.blocking }}
                surfaced: ${{ steps.decide.outputs.surfaced }}
                overflow: ${{ steps.decide.outputs.overflow }}
                indeterminate: ${{ steps.decide.outputs.indeterminate }}
                dropped: ${{ steps.decide.outputs.dropped }}
                notes: ${{ steps.coach_notes.outputs.notes }}
                det_coverage: ${{ steps.precheck.outputs.det_coverage }}
                routing: ${{ steps.assemble.outputs.routing }}
                canonical_id: ${{ steps.precheck.outputs.canonical_id }}
                ticket_type: ${{ steps.precheck.outputs.ticket_type }}
            else:
            - id: coach
              uses: plan_review_coach
              with:
                blocking: ${{ steps.decide.outputs.blocking }}
                surfaced: ${{ steps.decide.outputs.surfaced }}
                overflow: ${{ steps.decide.outputs.overflow }}
                indeterminate: ${{ steps.decide.outputs.indeterminate }}
                dropped: ${{ steps.decide.outputs.dropped }}
                notes: []
                det_coverage: ${{ steps.precheck.outputs.det_coverage }}
                routing: ${{ steps.assemble.outputs.routing }}
                canonical_id: ${{ steps.precheck.outputs.canonical_id }}
                ticket_type: ${{ steps.precheck.outputs.ticket_type }}
        else:
        - id: verify_inputs
          uses: plan_review_verify_inputs
          with:
            ticket_id: ${{ inputs.ticket_id }}
            findings: ${{ steps.finders.outputs.findings }}
        - id: verify
          needs:
          - verify_inputs
          prompt: plan-review-verifier
          mode: structured
          output_schema: plan_review_verification
          with:
            findings: ${{ steps.finders.outputs.findings }}
            plan: ${{ steps.verify_inputs.outputs.plan }}
            instructions: ${{ steps.verify_inputs.outputs.instructions }}
        - id: decide
          needs:
          - verify
          uses: plan_review_decide
          with:
            findings: ${{ steps.finders.outputs.findings }}
            verifications: ${{ steps.verify.outputs.verifications }}
            det_blocking: ${{ steps.precheck.outputs.det_blocking }}
            det_advisory: ${{ steps.precheck.outputs.det_advisory }}
        - id: coach_inputs
          needs:
          - decide
          uses: plan_review_coach_inputs
          with:
            ticket_id: ${{ inputs.ticket_id }}
            surviving: ${{ steps.decide.outputs.surfaced }}
            blocking: ${{ steps.decide.outputs.blocking }}
        # Pass-4 coach is gated on there being a coachable finding — blocking OR surviving
        # advisory (story 8086: blocking findings get coaching too). A clean PASS with zero
        # findings takes the else arm — coach renders with notes:[] and makes NO coach
        # LLM call, matching the bespoke pass4_coach early-return (WS4 crimp-polar-jag).
        - id: coach_gate
          needs:
          - coach_inputs
          branch:
            when: ${{ steps.coach_inputs.outputs.findings }}
            then:
            - id: coach_notes
              prompt: plan-review-coach
              mode: structured
              output_schema: plan_review_coach
              with:
                surviving: ${{ steps.coach_inputs.outputs.findings }}
                plan: ${{ steps.coach_inputs.outputs.plan }}
                instructions: ${{ steps.coach_inputs.outputs.instructions }}
            - id: coach
              needs:
              - coach_notes
              uses: plan_review_coach
              with:
                blocking: ${{ steps.decide.outputs.blocking }}
                surfaced: ${{ steps.decide.outputs.surfaced }}
                overflow: ${{ steps.decide.outputs.overflow }}
                indeterminate: ${{ steps.decide.outputs.indeterminate }}
                dropped: ${{ steps.decide.outputs.dropped }}
                notes: ${{ steps.coach_notes.outputs.notes }}
                det_coverage: ${{ steps.precheck.outputs.det_coverage }}
                routing: ${{ steps.assemble.outputs.routing }}
                canonical_id: ${{ steps.precheck.outputs.canonical_id }}
                ticket_type: ${{ steps.precheck.outputs.ticket_type }}
            else:
            - id: coach
              uses: plan_review_coach
              with:
                blocking: ${{ steps.decide.outputs.blocking }}
                surfaced: ${{ steps.decide.outputs.surfaced }}
                overflow: ${{ steps.decide.outputs.overflow }}
                indeterminate: ${{ steps.decide.outputs.indeterminate }}
                dropped: ${{ steps.decide.outputs.dropped }}
                notes: []
                det_coverage: ${{ steps.precheck.outputs.det_coverage }}
                routing: ${{ steps.assemble.outputs.routing }}
                canonical_id: ${{ steps.precheck.outputs.canonical_id }}
                ticket_type: ${{ steps.precheck.outputs.ticket_type }}
    else:
    - id: passthrough
      uses: plan_review_passthrough
      with:
        verdict: ${{ steps.precheck.outputs.verdict }}
