schema_version: '3'
name: completion-verification
description: >-
  The completion-verification gate expressed as an engine workflow (epic B, story B3). It mirrors
  rebar.llm.completion.verify_completion's real control flow — a deterministic child-closure precheck
  that SHORT-CIRCUITS to a deterministic FAIL only for an UNCLOSED direct child (no LLM call); a
  closed-but-uncertified child instead sets certifiable=false and still runs the verifier over the
  ticket's own criteria. Then the agentic completion-verifier, then a deterministic reconcile
  (FAIL<->findings invariant + citation downgrade) that also stamps certifiable onto the verdict. The
  short-circuit is a branch (an if:-skipped step's outputs cannot be referenced), so the prompt runs
  ONLY on the precheck-passed arm. It produces a completion_verdict; signing is the close-gate's job
  (and it withholds the signature when certifiable=false).
inputs:
  ticket_id:
    description: The ticket whose completion requirements are verified.
    type: string
    required: true
  graph:
    description: >-
      Whether to inline the ticket's descendant context for the verifier. The close gate passes
      false — an epic close verifies its OWN completion criteria, not its whole descendant subtree
      (children are gated on their own close). Always supplied by the gate dispatcher; when absent
      (a direct workflow invocation) it defaults to false (verify the ticket's own criteria); the
      epic-includes-descendants deep-review default is resolved upstream in verify_completion.
    type: boolean
    required: false
    default: false
steps:
- id: precheck
  uses: completion_precheck
  with:
    ticket_id: ${{ inputs.ticket_id }}
    graph: ${{ inputs.graph }}
- id: decide
  needs:
  - precheck
  branch:
    when: ${{ steps.precheck.outputs.run_verify }}
    then:
    - id: verify
      prompt: completion-verifier
      mode: structured
      output_schema: completion_verdict
      with:
        # The graph-aware, fenced ticket context the precheck assembled (epics carry their
        # descendants) — so the verify step's context matches bespoke verify_completion.
        context: ${{ steps.precheck.outputs.context }}
    - id: reconcile
      needs:
      - verify
      uses: completion_reconcile
      # Only ALWAYS-present agent outputs are wired: the structured runner
      # (findings.finalize_outcome) drops None payload fields via exclude_none, so `summary`
      # is ABSENT whenever the verifier omits it (the common case) and referencing a missing
      # step output raises. verdict/findings are required; runner/model/trace_id are added
      # unconditionally after exclude_none. Carrying an agent-supplied summary (and the
      # epic-graph target) is a known parity gap deferred to B4 (planned-trace parity).
      with:
        ticket_id: ${{ steps.precheck.outputs.canonical_id }}
        raw_verdict: ${{ steps.verify.outputs.verdict }}
        raw_findings: ${{ steps.verify.outputs.findings }}
        raw_criteria: ${{ steps.verify.outputs.criteria }}
        runner: ${{ steps.verify.outputs.runner }}
        model: ${{ steps.verify.outputs.model }}
        trace_id: ${{ steps.verify.outputs.trace_id }}
        # Certification decision from the precheck: false iff a closed-but-uncertified descendant
        # withholds the parent's signature (the parent may close but not certify). Carried onto
        # the verdict; the close gate closes WITHOUT signing when false.
        certifiable: ${{ steps.precheck.outputs.certifiable }}
    else:
    - id: passthrough
      uses: completion_passthrough
      with:
        verdict: ${{ steps.precheck.outputs.verdict }}
